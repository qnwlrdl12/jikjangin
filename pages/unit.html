<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단위 변환기 - 직장인닷컴</title>
  <meta name="description" content="길이, 무게, 온도, 부피, 넓이, 속도, 시간, 데이터 단위 올인원 변환기.">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .cat-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
    .cat-tab{padding:8px 14px;background:var(--card);border:1px solid rgba(255,255,255,0.1);color:var(--text-muted);border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600;transition:all 0.2s}
    .cat-tab.active{background:var(--accent);color:var(--dark);border-color:var(--accent)}
    .convert-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .convert-row input{flex:1}
    .convert-row select{flex:1;max-width:48%}
    .arrow-btn{background:none;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;cursor:pointer;font-size:1.2rem;color:var(--white);transition:all 0.2s}
    .arrow-btn:hover{background:var(--primary);border-color:var(--primary)}
    .result-big{font-size:1.6rem;font-weight:900;color:var(--secondary);margin:16px 0;text-align:center;min-height:2.4rem;word-break:break-all}
    .quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:16px}
    .quick-item{background:rgba(255,255,255,0.04);border-radius:8px;padding:10px;font-size:0.82rem;color:var(--text-muted);cursor:pointer;transition:all 0.15s}
    .quick-item:hover{background:rgba(78,205,196,0.1);color:var(--white)}
    .quick-item .qval{font-weight:700;color:var(--white);font-size:0.88rem}
    @media(max-width:480px){.quick-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav>
  <a href="../index.html" class="logo">💼 <span>직장인</span>닷컴</a>
  <ul class="nav-links">
    <li><a href="../index.html#calculators">계산기</a></li>
    <li><a href="../index.html#tools" class="active">업무도구</a></li>
    <li><a href="../index.html#games">루팡게임</a></li>
    <li><a href="../index.html#tests">테스트</a></li>
    <li><a href="../index.html#info">정보</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">홈</a> › 업무 도구</div>
  <h1>📐 단위 변환기</h1>
  <p>길이·무게·온도·넓이·속도·시간·데이터 등 8가지 단위 변환</p>
</div>
<main>
  <div class="ad-banner">광고 영역 (Google AdSense)</div>
  <div class="tool-card">
    <div class="cat-tabs" id="catTabs"></div>
    <div class="convert-row">
      <input type="number" id="fromVal" placeholder="값 입력" oninput="convert()">
      <select id="fromUnit" onchange="convert()"></select>
    </div>
    <div style="text-align:center;margin:4px 0">
      <button class="arrow-btn" onclick="swapUnits()" title="단위 교환">⇅</button>
    </div>
    <div class="convert-row">
      <input type="text" id="toVal" readonly placeholder="결과">
      <select id="toUnit" onchange="convert()"></select>
    </div>
    <div class="result-big" id="resultBig"></div>
    <div id="quickRef"></div>
  </div>
  <div class="ad-banner" style="margin-top:24px">광고 영역 (Google AdSense)</div>
</main>
<footer><p><strong>직장인닷컴</strong></p></footer>
<script>
const categories = {
  '📏 길이': {
    units: {mm:0.001,cm:0.01,m:1,km:1000,inch:0.0254,ft:0.3048,yd:0.9144,mile:1609.344},
    base:'m',
    quick:[['1 mile','km',1609.344,'m'],['1 ft','cm',30.48,'cm'],['1 inch','mm',25.4,'mm'],['100 km','mile',62.137,'mile']]
  },
  '⚖️ 무게': {
    units: {mg:1e-6,g:0.001,kg:1,t:1000,lb:0.453592,oz:0.0283495,근:0.6},
    base:'kg',
    quick:[['1 lb','g',453.6,'g'],['1 oz','g',28.35,'g'],['1 근','kg',0.6,'kg']]
  },
  '🌡️ 온도': {special:true, quick:[['0°C','°F',32,'°F'],['100°C','°F',212,'°F'],['37°C','°F',98.6,'°F'],['-40°C','°F',-40,'°F (동일)']]} ,
  '📦 부피': {
    units: {ml:0.001,cl:0.01,dl:0.1,L:1,m3:1000,tsp:0.00492892,tbsp:0.0147868,cup:0.236588,pt:0.473176,qt:0.946353,gal:3.78541},
    base:'L',
    quick:[['1 cup','ml',236.6,'ml'],['1 gal','L',3.785,'L'],['1 pt','ml',473.2,'ml']]
  },
  '🗺️ 넓이': {
    units: {mm2:1e-6,cm2:0.0001,m2:1,km2:1e6,평:3.30579,pyeong:3.30579,ha:10000,acre:4046.86,'ft2':0.092903},
    base:'m2',
    quick:[['10평','m2',33.06,'m²'],['100m2','평',30.25,'평'],['1 acre','m2',4046.9,'m²'],['1 ha','평',3025,'평']]
  },
  '🚀 속도': {
    units: {'km/h':1,'m/s':3.6,'mph':1.60934,knot:1.852,'ft/s':1.09728},
    base:'km/h',
    quick:[['60 mph','km/h',96.56,'km/h'],['1 m/s','km/h',3.6,'km/h'],['30 knot','km/h',55.56,'km/h']]
  },
  '⏱️ 시간': {
    units: {ms:1/1000,s:1,min:60,h:3600,day:86400,week:604800,month:2592000,year:31536000},
    base:'s',
    quick:[['1 year','day',365,'일'],['1 month','day',30,'일'],['1 week','h',168,'시간'],['1 day','min',1440,'분']]
  },
  '💾 데이터': {
    units: {bit:1,byte:8,KB:8192,MB:8388608,GB:8589934592,TB:8796093022208,'Kbit':1000,'Mbit':1e6,'Gbit':1e9},
    base:'bit',
    quick:[['1 GB','MB',1024,'MB'],['1 TB','GB',1024,'GB'],['1 MB','KB',1024,'KB'],['100 MB','Gbit',0.8,'Gbit']]
  },
};

let currentCat='📏 길이';

function renderTabs(){
  document.getElementById('catTabs').innerHTML=Object.keys(categories).map(c=>
    `<button class="cat-tab ${c===currentCat?'active':''}" onclick="selectCat('${c}')">${c}</button>`
  ).join('');
}

function selectCat(c){
  currentCat=c; renderTabs(); renderUnits();
  document.getElementById('fromVal').value='';
  document.getElementById('toVal').value='';
  document.getElementById('resultBig').textContent='';
  renderQuick();
}

function renderUnits(){
  const cat=categories[currentCat];
  const opts=cat.special?['°C','°F','K']:Object.keys(cat.units);
  const mk=(sel)=>opts.map(u=>`<option ${u===sel?'selected':''}>${u}</option>`).join('');
  document.getElementById('fromUnit').innerHTML=mk(opts[0]);
  document.getElementById('toUnit').innerHTML  =mk(opts.length>1?opts[1]:opts[0]);
}

function renderQuick(){
  const cat=categories[currentCat];
  if(!cat.quick||!cat.quick.length){document.getElementById('quickRef').innerHTML='';return;}
  const html=`<div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:8px;font-weight:600">⚡ 자주 쓰는 변환</div>
    <div class="quick-grid">${cat.quick.map(([from,to,val,unit])=>
      `<div class="quick-item" onclick="setQuick('${from}','${to}')">
        ${from} = <span class="qval">${typeof val==='number'?val.toLocaleString('ko-KR'):val} ${unit}</span>
      </div>`).join('')}
    </div>`;
  document.getElementById('quickRef').innerHTML=html;
}

function setQuick(from, to){
  const val=from.split(' ')[0];
  const unit=from.replace(val+' ','');
  const fromSel=document.getElementById('fromUnit');
  const toSel=document.getElementById('toUnit');
  for(let o of fromSel.options) if(o.value===unit){fromSel.value=unit;break;}
  for(let o of toSel.options)   if(o.value===to){toSel.value=to;break;}
  document.getElementById('fromVal').value=parseFloat(val);
  convert();
}

function convert(){
  const val  =parseFloat(document.getElementById('fromVal').value);
  const from =document.getElementById('fromUnit').value;
  const to   =document.getElementById('toUnit').value;
  if(isNaN(val)){document.getElementById('toVal').value='';document.getElementById('resultBig').textContent='';return;}

  let result;
  if(currentCat==='🌡️ 온도'){
    if(from==='°C'&&to==='°F')      result=val*9/5+32;
    else if(from==='°F'&&to==='°C') result=(val-32)*5/9;
    else if(from==='°C'&&to==='K')  result=val+273.15;
    else if(from==='K'&&to==='°C')  result=val-273.15;
    else if(from==='°F'&&to==='K')  result=(val-32)*5/9+273.15;
    else if(from==='K'&&to==='°F')  result=(val-273.15)*9/5+32;
    else result=val;
  } else {
    const units=categories[currentCat].units;
    const inBase=val*(units[from]||1);
    result=inBase/(units[to]||1);
  }

  const fmt = result===0 ? '0' :
    Math.abs(result) >= 0.001 && Math.abs(result) < 1e12
      ? parseFloat(result.toPrecision(8)).toLocaleString('ko-KR',{maximumFractionDigits:8})
      : result.toExponential(4);

  document.getElementById('toVal').value=fmt;
  document.getElementById('resultBig').textContent=`${val.toLocaleString('ko-KR')} ${from} = ${fmt} ${to}`;
}

function swapUnits(){
  const f=document.getElementById('fromUnit').value;
  const t=document.getElementById('toUnit').value;
  document.getElementById('fromUnit').value=t;
  document.getElementById('toUnit').value=f;
  const v=document.getElementById('fromVal').value;
  const r=document.getElementById('toVal').value;
  if(r&&r!=='') document.getElementById('fromVal').value=parseFloat(r.replace(/,/g,''))||'';
  convert();
}

renderTabs();
renderUnits();
renderQuick();
</script>
</body>
</html>
