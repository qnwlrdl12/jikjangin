<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업무 메일 템플릿 모음 - 직장인닷컴</title>
  <meta name="description" content="직장인을 위한 업무 메일 템플릿 모음. 연차, 지각사과, 회의, 퇴사인사 등 12가지 전문 메일을 바로 복사하세요.">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .filter-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }
    .filter-btn:hover { background: rgba(255,107,53,0.15); color: var(--white); }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: var(--white); }

    /* ── Template grid ── */
    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .template-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 22px 20px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .template-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--primary);
      transform: scaleX(0);
      transition: transform 0.2s;
    }
    .template-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.14); }
    .template-card:hover::before { transform: scaleX(1); }
    .template-card.hidden { display: none; }

    .tpl-cat {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .cat-leave    { background: rgba(78,205,196,0.15); color: var(--accent); }
    .cat-report   { background: rgba(255,107,53,0.15); color: var(--primary); }
    .cat-meeting  { background: rgba(255,215,0,0.15);  color: var(--secondary); }
    .cat-sorry    { background: rgba(231,76,60,0.15);  color: #e74c3c; }
    .cat-farewell { background: rgba(155,89,182,0.15); color: #9b59b6; }

    .tpl-title { font-size: 1rem; font-weight: 700; color: var(--white); margin-bottom: 6px; }
    .tpl-desc  { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 12px; }
    .tpl-preview {
      font-size: 0.78rem;
      color: rgba(160,160,176,0.6);
      border-left: 2px solid rgba(255,255,255,0.1);
      padding-left: 10px;
      line-height: 1.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tpl-open-btn {
      display: inline-block;
      margin-top: 14px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--dark2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      width: 100%;
      max-width: 680px;
      padding: 32px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
    }
    .modal-close:hover { color: var(--white); }
    .modal h2 { font-size: 1.2rem; font-weight: 800; color: var(--white); margin-bottom: 6px; }
    .modal .modal-cat { margin-bottom: 20px; }

    .var-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .var-field label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
    .var-field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--white);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .var-field input:focus { border-color: var(--primary); }

    .preview-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
    .mail-preview {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 20px;
      font-size: 0.85rem;
      line-height: 1.9;
      color: var(--text);
      white-space: pre-wrap;
      font-family: inherit;
      max-height: 320px;
      overflow-y: auto;
      word-break: break-all;
    }
    .mail-preview .placeholder { color: var(--primary); font-weight: 700; }

    .copy-btn {
      display: block;
      width: 100%;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      transition: opacity 0.2s;
    }
    .copy-btn:hover { opacity: 0.85; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #0f3460;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 24px;
      font-size: 0.9rem;
      z-index: 999;
      transition: transform 0.3s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media(max-width:540px) {
      .var-fields { grid-template-columns: 1fr; }
      .template-grid { grid-template-columns: 1fr; }
      .modal { padding: 20px; }
    }
  </style>
</head>

  <div class="template-grid" id="templateGrid"></div>

  <div class="modal" id="modal">

<script>
const TEMPLATES = [
  {
    id: 1,
    title: '연차 신청',
    category: '휴가/연차',
    catClass: 'cat-leave',
    desc: '연차 사용 사전 통보 메일. 인수인계 담당자 포함.',
    preview: '안녕하세요. [이름]입니다. 연차 사용을 아래와 같이...',
    vars: ['이름','연차시작일','연차종료일','일수','업무인수인계담당자'],
    body: `안녕하세요. [이름]입니다.

다름이 아니라, 아래와 같이 연차 사용을 신청드립니다.

■ 연차 기간: [연차시작일] ~ [연차종료일] ([일수]일)
■ 업무 인수인계: [업무인수인계담당자] 담당자님께 인수인계 완료 예정

부재 기간 중 긴급한 사안이 발생할 경우, [업무인수인계담당자] 담당자님께 연락 주시면 감사하겠습니다.
복귀 후 누락된 업무 없이 신속하게 처리하겠습니다.

불편을 드려 죄송하며, 검토 후 승인 부탁드립니다.

감사합니다.
[이름] 드림`
  },
  {
    id: 2,
    title: '재택근무 신청',
    category: '휴가/연차',
    catClass: 'cat-leave',
    desc: '재택근무 사전 승인 요청 메일.',
    preview: '안녕하세요. [이름]입니다. 재택근무 신청 건으로...',
    vars: ['이름','날짜','사유'],
    body: `안녕하세요. [이름]입니다.

[날짜]에 재택근무를 신청드리고자 합니다.

■ 사유: [사유]

해당 날짜에도 정상 근무 시간 동안 업무에 차질 없이 임하겠습니다.
화상회의 및 메신저를 통해 즉각적인 소통이 가능하며, 당일 업무 결과는 퇴근 전 공유드리겠습니다.

승인 여부 확인 후 그에 맞게 준비하겠습니다.
검토 부탁드립니다.

감사합니다.
[이름] 드림`
  },
  {
    id: 3,
    title: '지각 사과',
    category: '사과/해명',
    catClass: 'cat-sorry',
    desc: '지각 사실을 즉시 알리고 사과하는 메일.',
    preview: '안녕하세요. [이름]입니다. 오늘 [지각시간] 지각한 점...',
    vars: ['이름','지각시간','사유'],
    body: `안녕하세요. [이름]입니다.

오늘 [지각시간] 지각한 점 진심으로 사과드립니다.

■ 사유: [사유]

예기치 못한 상황이었으나, 업무 시간 엄수는 기본 중의 기본이라는 점을 잘 알고 있습니다.
앞으로는 유사한 상황이 발생하지 않도록 미리 대비하겠습니다.
오늘 지각으로 인한 업무 공백은 빠르게 만회하겠습니다.

다시 한번 사과의 말씀을 드립니다.

감사합니다.
[이름] 드림`
  },
  {
    id: 4,
    title: '조퇴 요청',
    category: '휴가/연차',
    catClass: 'cat-leave',
    desc: '불가피한 조기 퇴근 요청 메일.',
    preview: '안녕하세요. [이름]입니다. [조퇴시간]에 조퇴를...',
    vars: ['이름','조퇴시간','사유'],
    body: `안녕하세요. [이름]입니다.

부득이한 사정으로 오늘 [조퇴시간]에 조퇴를 요청드립니다.

■ 사유: [사유]

가능하다면 조퇴 전까지 현재 진행 중인 업무를 최대한 처리하고, 잔여 업무는 내일 오전 중으로 완료하겠습니다.
긴급한 사항은 연락 주시면 외부에서도 빠르게 대응하겠습니다.

갑작스러운 요청으로 불편을 드려 죄송합니다. 검토 부탁드립니다.

감사합니다.
[이름] 드림`
  },
  {
    id: 5,
    title: '회의 초대',
    category: '회의',
    catClass: 'cat-meeting',
    desc: '정식 회의 일정 안내 및 참석 요청 메일.',
    preview: '안녕하세요. [이름]입니다. [회의명] 회의를 아래와...',
    vars: ['이름','회의명','날짜','시간','장소','안건'],
    body: `안녕하세요. [이름]입니다.

[회의명] 관련 회의를 아래와 같이 안내드립니다.
바쁘신 중에 참석 부탁드립니다.

──────────────────────
■ 회의명: [회의명]
■ 일시: [날짜] [시간]
■ 장소: [장소]
■ 안건: [안건]
──────────────────────

사전에 논의하실 내용이 있으시면 회의 전까지 공유해 주시면 더욱 효율적인 회의 진행에 도움이 됩니다.
참석 여부를 [날짜] 오전까지 회신 주시면 감사하겠습니다.

감사합니다.
[이름] 드림`

  {
    id: 6,
    title: '회의 결과 공유',
    category: '보고',
    catClass: 'cat-report',
    desc: '회의 종료 후 결정사항 및 후속 액션 공유 메일.',

    vars: ['이름','회의명','날짜','결정사항','액션아이템'],
    body: `안녕하세요. [이름]입니다.

[날짜]에 진행된 [회의명] 회의 결과를 공유드립니다.

──────────────────────
■ 결정사항
[결정사항]

■ 후속 액션아이템
[액션아이템]
──────────────────────

위 내용 중 수정하거나 추가할 사항이 있으시면 [날짜]로부터 2영업일 이내에 회신 주시기 바랍니다.
이견이 없으시면 해당 내용대로 진행하겠습니다.

감사합니다.
[이름] 드림`

  {
    id: 7,
    title: '업무 진행 보고',
    category: '보고',
    catClass: 'cat-report',
    desc: '프로젝트 진행 현황 및 이슈 사항 정기 보고 메일.',

    vars: ['이름','프로젝트명','진행률','완료내용','예정내용','이슈사항'],

[프로젝트명] 진행 현황을 보고드립니다.

──────────────────────
■ 전체 진행률: [진행률]

■ 완료 내용
[완료내용]

[예정내용]

[이슈사항]

감사합니다.
[이름] 드림`
  },
  {
    id: 8,
    title: '업무 인수인계 요청',
    category: '보고',
    catClass: 'cat-report',
    desc: '업무 인수인계 협조 요청 메일.',

    body: `안녕하세요. [이름]입니다.

업무 인수인계 건으로 메일 드립니다.

[담당자명] 담당자님께서 아래 업무를 [인수인계날짜]까지 인수받아 주실 수 있는지 확인 부탁드립니다.

──────────────────────
■ 인수인계 대상 업무
[업무목록]

■ 인수인계 일정: [인수인계날짜]

관련 자료 및 히스토리는 별도 파일로 정리하여 전달드리겠습니다.

일정 확인 후 회신 부탁드립니다.

감사합니다.
[이름] 드림`
  },
  {
    id: 9,
    title: '퇴사 인사',
    category: '퇴사/인사',
    catClass: 'cat-farewell',
    desc: '재직 기간 감사 인사 및 퇴사 인사 메일.',
    preview: '안녕하세요. [이름]입니다. 갑작스러운 소식을...',
    vars: ['이름','퇴사일','재직기간'],
    body: `안녕하세요. [이름]입니다.

  },

    preview: '안녕하세요. 이번에 [부서]에 합류하게 된 [이름]입니다.',
    vars: ['이름','부서','직무'],
    body: `안녕하세요 :)

  },
  {
    id: 11,
    title: '견적 요청',

    body: `안녕하세요.

위 조건에 맞는 견적서(단가, 총액, 부가세 포함 여부, 납기 일정 포함)를 [납기] 이전까지 보내 주시면 감사하겠습니다.

    vars: ['이름','요청내용','마감일','담당자명'],
    body: `안녕하세요. [이름]입니다.

let currentTemplateId = null;

// ── Category CSS class map ──
const catClassMap = {
  '휴가/연차': 'cat-leave',
  '보고':      'cat-report',
  '회의':      'cat-meeting',
  '사과/해명': 'cat-sorry',
  '퇴사/인사': 'cat-farewell',
};

// ── Render grid ──
function renderGrid() {
  const grid = document.getElementById('templateGrid');
  grid.innerHTML = TEMPLATES.map(t => `
    <div class="template-card" id="card-${t.id}" data-cat="${t.category}" onclick="openModal(${t.id})">
      <span class="tpl-cat ${t.catClass}">${t.category}</span>
      <div class="tpl-title">${t.title}</div>
      <div class="tpl-desc">${t.desc}</div>
      <div class="tpl-preview">${t.preview}</div>
      <span class="tpl-open-btn">템플릿 사용하기 →</span>
    </div>
  `).join('');
}

// ── Filter ──
function setFilter(btn, cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.template-card').forEach(card => {
    if (cat === '전체' || card.dataset.cat === cat) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });
}

// ── Parse variable names from body ──
function parseVars(body) {
  const matches = body.match(/\[([^\]]+)\]/g) || [];
  const unique = [];
  matches.forEach(m => {
    const name = m.slice(1, -1);
    if (!unique.includes(name)) unique.push(name);
  });
  return unique;
}

// ── Open modal ──
function openModal(id) {
  const tpl = TEMPLATES.find(t => t.id === id);
  if (!tpl) return;
  currentTemplateId = id;

  document.getElementById('modalTitle').textContent = tpl.title;
  document.getElementById('modalCat').innerHTML =
    `<span class="tpl-cat ${tpl.catClass}">${tpl.category}</span>`;

  // Build variable input fields
  const varNames = parseVars(tpl.body);
  const fields = document.getElementById('varFields');
  fields.innerHTML = varNames.map(v => `
    <div class="var-field">
      <label>${v}</label>
      <input type="text" data-var="${v}" placeholder="${v}" oninput="updatePreview(${id})">
    </div>
  `).join('');

  updatePreview(id);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

// ── Update preview with current input values ──
function updatePreview(id) {
  const tpl = TEMPLATES.find(t => t.id === id);
  if (!tpl) return;
  let body = tpl.body;

  document.querySelectorAll('#varFields input').forEach(input => {
    const varName = input.dataset.var;
    const val = input.value.trim() || `[${varName}]`;
    // replace all occurrences
    body = body.split(`[${varName}]`).join(val);
  });

  // Highlight remaining placeholders
  const preview = document.getElementById('mailPreview');
  const escaped = body
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
  const highlighted = escaped.replace(
    /\[([^\]]+)\]/g,
    '<span class="placeholder">[$1]</span>'
  );
  preview.innerHTML = highlighted;
}

// ── Close modal ──
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentTemplateId = null;
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ── Copy ──
function copyMail() {
  const tpl = TEMPLATES.find(t => t.id === currentTemplateId);
  if (!tpl) return;
  let body = tpl.body;

  document.querySelectorAll('#varFields input').forEach(input => {
    const varName = input.dataset.var;
    const val = input.value.trim() || `[${varName}]`;
    body = body.split(`[${varName}]`).join(val);
  });

  navigator.clipboard.writeText(body).then(() => {
    showToast();
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = body;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  });
}

function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// Close modal on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Init
renderGrid();
</script>
