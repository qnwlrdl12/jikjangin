    if(!GACHA_BY_GRADE[g])GACHA_BY_GRADE[g]=[];
    GACHA_BY_GRADE[g].push(k);
  }
})();
const GACHA_PROB=[{g:'C',p:0.50},{g:'B',p:0.30},{g:'A',p:0.15},{g:'S',p:0.04},{g:'SS',p:0.01}];

function gradeUpgCost(grade,lvl){return Math.floor((GRADE_UPG[grade]||80)*lvl);}

function gachaDraw(){
  const r=Math.random();let acc=0,grade='C';
  for(const{g,p}of GACHA_PROB){acc+=p;if(r<acc){grade=g;break;}}
  const pool=GACHA_BY_GRADE[grade];
  return pool[Math.floor(Math.random()*pool.length)];
}

// ── WORLD GENERATION ───────────────────────────
function makeWorld(){
  const tiles=Array.from({length:WH},()=>new Uint8Array(WW).fill(T.GRASS));
  const cd=Array.from({length:WH},()=>Array(WW).fill(null)); // crop data

  const set=(r,c,v)=>{if(r>=0&&r<WH&&c>=0&&c<WW)tiles[r][c]=v};
  const fill=(r1,c1,r2,c2,v)=>{for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++)set(r,c,v)};

  // === FARM ZONE (cols 1-36, rows 1-28) ===
  // Perimeter fence
  for(let r=3;r<=27;r++){set(r,2,T.FENCE);set(r,36,T.FENCE)}
  for(let c=2;c<=36;c++){set(3,c,T.FENCE);set(27,c,T.FENCE)}
  set(14,2,T.GATE);set(15,2,T.GATE); // left gate

  // Farmland
  fill(7,4,23,26,T.DIRT);

  // Farm paths
  for(let r=4;r<=26;r++)set(r,3,T.PATH);
  for(let c=3;c<=35;c++)set(6,c,T.PATH);
  for(let c=3;c<=35;c++)set(24,c,T.PATH);
  for(let r=6;r<=24;r++)set(r,27,T.PATH);

  // Player house (top-right of farm)
  fill(4,28,10,35,T.BUILDING);
  fill(10,28,12,35,T.FLOOR);
  set(12,31,T.DOOR);set(12,32,T.DOOR);

  // Barn (bottom-right)
  fill(17,28,23,35,T.BUILDING);
  fill(23,28,24,35,T.FLOOR);
  set(24,31,T.DOOR);set(24,32,T.DOOR);

  // Well
  set(5,4,T.WELL);set(5,5,T.WELL);

  // Decorative farm trees
  [[5,25],[5,26],[25,4],[25,5]].forEach(([r,c])=>set(r,c,T.TREE));
  [[5,28],[5,29],[25,28]].forEach(([r,c])=>set(r,c,T.FLOWER));

  // === PATH TO TOWN (rows 13-16, cols 36-44) ===
  for(let c=36;c<=44;c++){set(13,c,T.PATH);set(14,c,T.PATH);set(15,c,T.PATH)}

  // === TOWN ZONE (cols 44-75, rows 2-30) ===
  // Main roads
  for(let r=2;r<=30;r++){
    set(r,44,T.PATH);set(r,45,T.PATH);
    set(r,66,T.PATH);set(r,67,T.PATH);
  }
  for(let c=44;c<=68;c++){
    set(2,c,T.PATH);set(3,c,T.PATH);
    set(29,c,T.PATH);set(30,c,T.PATH);
  }
  // Town cross paths
  for(let r=2;r<=30;r++){set(r,54,T.PATH);set(r,55,T.PATH)}
  for(let c=44;c<=68;c++){set(15,c,T.PATH);set(16,c,T.PATH)}

  // Town grass blocks
  fill(4,46,13,53,T.GRASS);
  fill(4,56,13,65,T.GRASS);
  fill(17,46,28,53,T.GRASS);
  fill(17,56,28,65,T.GRASS);

  // Shop (top-left town block)
  fill(4,46,10,53,T.BUILDING);
  fill(10,46,12,53,T.FLOOR);
  set(12,49,T.DOOR);set(12,50,T.DOOR);

  // Mayor (top-right town block)
  fill(4,56,10,65,T.BUILDING);
  fill(10,56,12,65,T.FLOOR);
  set(12,60,T.DOOR);set(12,61,T.DOOR);

  // Grandma (bottom-left)
  fill(17,46,23,53,T.BUILDING);
  fill(17,46,18,53,T.FLOOR);
  set(17,49,T.DOOR);set(17,50,T.DOOR);

  // Blacksmith (bottom-right-ish)
  fill(17,56,23,65,T.BUILDING);
  fill(17,56,18,65,T.FLOOR);
  set(17,60,T.DOOR);set(17,61,T.DOOR);

  // Doctor (far right)
  fill(4,68,10,75,T.BUILDING);
  fill(10,68,12,75,T.FLOOR);
  set(12,71,T.DOOR);set(12,72,T.DOOR);

  // Fountain
  set(13,54,T.WATER);set(13,55,T.WATER);
  set(14,54,T.WELL);set(14,55,T.WATER);
  set(15,54,T.WATER);set(15,55,T.WATER);

  // Town flowers/trees
  [[6,54],[6,55],[27,54],[27,55]].forEach(([r,c])=>set(r,c,T.TREE));
  [[13,47],[14,47],[13,64],[14,64]].forEach(([r,c])=>set(r,c,T.FLOWER));

  // === PATH TO FOREST ===
  for(let r=27;r<=32;r++){set(r,14,T.PATH);set(r,15,T.PATH)}
  for(let r=27;r<=32;r++){set(r,54,T.PATH);set(r,55,T.PATH)}

  // === FOREST ZONE (rows 32-57) ===
  const rng=mulberry32(42);
  for(let r=33;r<WH-1;r++){
    for(let c=1;c<WW-1;c++){
      const v=rng();
      if(r===33&&c>=13&&c<=16){tiles[r][c]=T.PATH;continue}
      if(r===33&&c>=53&&c<=56){tiles[r][c]=T.PATH;continue}
      if(c===14||c===15||c===54||c===55){tiles[r][c]=T.PATH;continue}
      if(c>=24&&c<=27){tiles[r][c]=(c===25||c===26)?T.WATER:T.SAND;continue}
      if(c===38||c===39){tiles[r][c]=T.PATH;continue}
      if(v<0.32)tiles[r][c]=T.TREE;
      else if(v<0.37)tiles[r][c]=T.ROCK;
      else if(v<0.41)tiles[r][c]=T.TALL;
      else if(v<0.43)tiles[r][c]=T.FLOWER;
    }
  }
  // Forest clearing with chest
  fill(40,10,44,14,T.GRASS);
  set(42,12,T.CHEST);

  // Mine area (bottom-right)
  fill(47,62,57,77,T.GRASS);
  const rng2=mulberry32(99);
  for(let r=47;r<57;r++)for(let c=62;c<WW-1;c++)if(rng2()<0.55)set(r,c,T.ROCK);

  // Border
  for(let r=0;r<WH;r++){tiles[r][0]=T.VOID;tiles[r][WW-1]=T.VOID}
  for(let c=0;c<WW;c++){tiles[0][c]=T.VOID;tiles[WH-1][c]=T.VOID}

  return {tiles,cd};
}

function makeDefenseWorld(){
  const tiles=Array.from({length:WH},()=>new Uint8Array(WW).fill(T.GRASS));
  const cd=Array.from({length:WH},()=>Array(WW).fill(null));
  const set=(r,c,v)=>{if(r>=0&&r<WH&&c>=0&&c<WW)tiles[r][c]=v};
  const fill=(r1,c1,r2,c2,v)=>{for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++)set(r,c,v)};

  // Border
  for(let r=0;r<WH;r++){tiles[r][0]=T.VOID;tiles[r][WW-1]=T.VOID}
  for(let c=0;c<WW;c++){tiles[0][c]=T.VOID;tiles[WH-1][c]=T.VOID}

  // Decorative trees along map edges
  const rng=mulberry32(42);
  for(let r=2;r<WH-2;r++){
    if(rng()<0.18){set(r,2,T.TREE);set(r,3,T.TREE)}
    if(rng()<0.18){set(r,WW-3,T.TREE);set(r,WW-2,T.TREE)}
  }
  for(let c=4;c<WW-4;c++){
    if(rng()<0.18){set(2,c,T.TREE);set(3,c,T.TREE)}
    if(rng()<0.18){set(WH-3,c,T.TREE);set(WH-2,c,T.TREE)}
  }
  // Scattered rocks and flowers
  for(let r=5;r<WH-5;r++)for(let c=5;c<WW-5;c++){
    const v=rng();
    if(v<0.018)set(r,c,T.ROCK);
    else if(v<0.032)set(r,c,T.FLOWER);
  }

  // Cross paths from edges to castle (placed last, overrides decorations)
  for(let r=0;r<WH;r++){set(r,39,T.PATH);set(r,40,T.PATH);set(r,41,T.PATH)}
  for(let c=0;c<WW;c++){set(29,c,T.PATH);set(30,c,T.PATH);set(31,c,T.PATH)}

  // Castle walls (rows 25-35, cols 35-45), floor inside
  fill(25,35,35,45,T.BUILDING);
  fill(26,36,34,44,T.FLOOR);
  // Four gates (cut through outer walls)
  for(let c=39;c<=41;c++){set(25,c,T.PATH);set(35,c,T.PATH)} // N/S gates
  for(let r=29;r<=31;r++){set(r,35,T.PATH);set(r,45,T.PATH)} // W/E gates

  return {tiles,cd};
}

function mulberry32(a){
  return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

function buildDailyOrders(){
  const rng=mulberry32(GS.day*1337+GS.season*111+GS.year*7);
  const copy=[...ORDER_TEMPLATES];
  const result=[];
  for(let i=0;i<3&&copy.length>0;i++){
    const idx=Math.floor(rng()*copy.length);
    const t=copy.splice(idx,1)[0];
    result.push({...t,done:false});
  }
  return result;
}

const KEYS={};
const JUST={};
const JUST_PREV={};
window.addEventListener('keydown',e=>{
  if(!KEYS[e.code]){JUST[e.code]=true}
  KEYS[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab'].includes(e.code))e.preventDefault();
});
window.addEventListener('keyup',e=>delete KEYS[e.code]);

function justPressed(k){return JUST[k]&&!JUST_PREV[k]}

// ── DRAWING UTILITIES ──────────────────────────
function rr(x,y,w,h,r,col){
  ctx.fillStyle=col;ctx.beginPath();
  ctx.roundRect(x,y,w,h,r);ctx.fill();
}
function circ(x,y,r,col){
  ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
}
function txt(s,x,y,size,col,align='left',font='Malgun Gothic'){
  ctx.font=`${size}px "${font}"`;ctx.fillStyle=col;ctx.textAlign=align;
  ctx.fillText(s,x,y);
}
function txtShadow(s,x,y,size,col,sha='rgba(0,0,0,0.7)',align='left'){
  ctx.font=`bold ${size}px "Malgun Gothic"`;
  ctx.textAlign=align;
  ctx.fillStyle=sha;ctx.fillText(s,x+1,y+2);
  ctx.fillStyle=col;ctx.fillText(s,x,y);
}
function icon(s,x,y,size){
  ctx.font=`${size}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(s,x,y);ctx.textBaseline='alphabetic';
}

// ── TILE RENDERING ─────────────────────────────
function drawTile(r,c,sx,sy,season){
  const p=SPAL[season];
  const t=world.tiles[r][c];
  const A=animFrame;

  const mx=sx+TILE/2, my=sy+TILE/2;
  switch(t){
    case T.VOID:
      ctx.fillStyle='#2a1a2e';ctx.fillRect(sx,sy,TILE,TILE);break;

    case T.GRASS:{
      // Soft pastel grass with tiny clover/flower dots
      ctx.fillStyle=p.grass;ctx.fillRect(sx,sy,TILE,TILE);
      const seed=(r*73+c*37);
      // Gentle texture dots
      ctx.fillStyle=p.grass2;
      if(seed%7<3){ctx.beginPath();ctx.ellipse(sx+8+(seed%3)*14,sy+28,3,2,0,0,Math.PI*2);ctx.fill()}
      if(seed%5===0){
        // Tiny heart-shaped 4-leaf clover
        const cx2=sx+20+(seed%20),cy2=sy+14+(seed%20);
        ctx.fillStyle='rgba(255,255,255,0.35)';
        for(let i=0;i<4;i++){const a=i*Math.PI/2;circ(cx2+Math.cos(a)*3,cy2+Math.sin(a)*3,3,'rgba(255,255,255,0.35)')}
      }
      break;}

    case T.DIRT:
      ctx.fillStyle=p.dirt||'#d4b8a0';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='rgba(0,0,0,0.08)';
      for(let i=0;i<3;i++)ctx.fillRect(sx+6+i*13,sy+10+i*10,8,3);
      break;

    case T.TILLED:{
      ctx.fillStyle=p.tilled||'#c4a08c';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='rgba(0,0,0,0.12)';
      for(let i=0;i<3;i++){ctx.fillRect(sx+2,sy+8+i*14,TILE-4,3)}
      // Tiny sparkle dot
      ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillRect(sx+4,sy+4,3,3);
      break;}

    case T.WET:{
      ctx.fillStyle=p.tilled||'#c4a08c';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='rgba(0,0,0,0.12)';
      for(let i=0;i<3;i++){ctx.fillRect(sx+2,sy+8+i*14,TILE-4,3)}
      // Sparkly water sheen
      ctx.fillStyle='rgba(150,210,255,0.4)';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='rgba(255,255,255,0.6)';
      circ(sx+8,sy+8,2,'rgba(255,255,255,0.6)');circ(sx+30,sy+20,1.5,'rgba(255,255,255,0.6)');
      break;}

    case T.PATH:
      // Cute cobblestone path
      ctx.fillStyle=p.path;ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle=p.path2;
      ctx.beginPath();ctx.roundRect(sx+3,sy+3,TILE/2-5,TILE/2-5,4);ctx.fill();
      ctx.beginPath();ctx.roundRect(sx+TILE/2+2,sy+3,TILE/2-5,TILE/2-5,4);ctx.fill();
      ctx.beginPath();ctx.roundRect(sx+3,sy+TILE/2+2,TILE/2-5,TILE/2-5,4);ctx.fill();
      ctx.beginPath();ctx.roundRect(sx+TILE/2+2,sy+TILE/2+2,TILE/2-5,TILE/2-5,4);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.2)';
      ctx.beginPath();ctx.roundRect(sx+4,sy+4,8,5,2);ctx.fill();
      break;

    case T.WATER:{
      // Sparkly kawaii water
      const wg=ctx.createLinearGradient(sx,sy,sx,sy+TILE);
      wg.addColorStop(0,p.water);wg.addColorStop(1,p.water2);
      ctx.fillStyle=wg;ctx.fillRect(sx,sy,TILE,TILE);
      const sh=Math.sin(A*0.05+(r+c)*0.6)*3;
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.fillRect(sx+6+sh,sy+10,16,2);ctx.fillRect(sx+20-sh,sy+22,12,2);
      ctx.fillRect(sx+8+sh*0.5,sy+34,14,2);
      // Sparkles
      ctx.fillStyle='rgba(255,255,255,0.8)';
      if((A+r+c)%20<5){circ(sx+12,sy+8,1.5,'rgba(255,255,255,0.8)')}
      if((A+r+c*2)%18<4){circ(sx+32,sy+28,1.5,'rgba(255,255,255,0.8)')}
      break;}

    case T.DEEP:
      ctx.fillStyle=p.water2;ctx.fillRect(sx,sy,TILE,TILE);break;
    case T.SAND:
      ctx.fillStyle='#f5e0c0';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(sx+6,sy+6,8,3);ctx.fillRect(sx+28,sy+20,6,3);
      break;

    case T.FENCE:
      ctx.fillStyle=p.grass;ctx.fillRect(sx,sy,TILE,TILE);
      // Cute white picket fence
      ctx.fillStyle='#ffffff';
      ctx.beginPath();ctx.roundRect(sx+TILE/2-4,sy+2,8,TILE-4,4);ctx.fill();
      ctx.fillStyle='#f0f0f0';
      ctx.beginPath();ctx.roundRect(sx+2,sy+10,TILE-4,6,3);ctx.fill();
      ctx.beginPath();ctx.roundRect(sx+2,sy+30,TILE-4,6,3);ctx.fill();
      ctx.fillStyle='rgba(200,150,180,0.3)';ctx.fillRect(sx+2,sy+10,TILE-4,6);
      break;

    case T.GATE:
      ctx.fillStyle=p.grass;ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='#fff0f8';
      ctx.beginPath();ctx.roundRect(sx+4,sy+10,16,6,3);ctx.fill();
      ctx.beginPath();ctx.roundRect(sx+4,sy+30,16,6,3);ctx.fill();
      ctx.fillStyle='#f8a0c8';ctx.fillRect(sx+4,sy+10,4,26);
      break;

    case T.BUILDING:
      // Cozy cottage wall — pastel pink bricks
      ctx.fillStyle='#f8d0e0';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='rgba(220,150,180,0.25)';
      for(let bri=0;bri<3;bri++){
        const off=(bri%2)*12;
        for(let brj=0;brj<3;brj++)ctx.fillRect(sx+off+brj*16,sy+bri*14+2,14,10);
      }
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(sx+2,sy+2,TILE-4,4);
      break;

    case T.FLOOR:
      // Warm wood floor with pastel grain
      ctx.fillStyle='#f5e0c8';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='rgba(200,150,100,0.2)';
      ctx.fillRect(sx,sy,TILE,2);ctx.fillRect(sx,sy+TILE/2,TILE,1);
      ctx.fillStyle='rgba(200,150,100,0.12)';
      ctx.fillRect(sx,sy,2,TILE);ctx.fillRect(sx+TILE/2,sy,1,TILE);
      break;

    case T.DOOR:
      ctx.fillStyle='#f5e0c8';ctx.fillRect(sx,sy,TILE,TILE);
      // Cute round-top door
      ctx.fillStyle='#e0908c';
      ctx.beginPath();ctx.roundRect(sx+8,sy+4,TILE-16,TILE-6,12);ctx.fill();
      ctx.fillStyle='#c87070';ctx.fillRect(sx+8,sy+16,TILE-16,TILE-22);
      // Heart on door
      ctx.fillStyle='#f8c0c0';
      ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('♡',mx,my-2);ctx.textBaseline='alphabetic';
      // Gold knob
      circ(mx+7,my+6,3,'#FFD700');
      break;

    case T.TREE:{
      ctx.fillStyle=p.grass;ctx.fillRect(sx,sy,TILE,TILE);
      // Cute round trunk
      ctx.fillStyle='#c49870';ctx.beginPath();ctx.roundRect(mx-5,sy+26,10,TILE-26,4);ctx.fill();
      // Fluffy crown — season-colored
      const tc1=p.tree,tc2=p.tree2;
      // Big pom-pom tree top
      circ(mx,sy+18,16,tc1);
      circ(mx-11,sy+26,12,tc2);
      circ(mx+11,sy+26,12,tc2);
      circ(mx,sy+12,12,tc1);
      // Tiny flowers on spring tree
      if(GS&&GS.season===0){
        ctx.fillStyle='#FFE0F0';
        for(let i=0;i<5;i++){const a=i*Math.PI*2/5;circ(mx+Math.cos(a)*12,sy+18+Math.sin(a)*10,4,'#FFE0F0')}
        circ(mx,sy+18,4,'#FFE8E0');
      }
      break;}

    case T.STUMP:
      ctx.fillStyle=p.grass;ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='#c49870';ctx.beginPath();ctx.roundRect(sx+10,sy+26,28,16,3);ctx.fill();
      ctx.fillStyle='#d4a880';ctx.beginPath();ctx.ellipse(mx,sy+26,14,5,0,0,Math.PI*2);ctx.fill();
      // Ring
      ctx.strokeStyle='rgba(160,120,80,0.3)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.ellipse(mx,sy+26,8,3,0,0,Math.PI*2);ctx.stroke();
      break;

    case T.ROCK:{
      ctx.fillStyle=p.grass;ctx.fillRect(sx,sy,TILE,TILE);
      // Cute chibi rock
      ctx.fillStyle='#c8d0d8';ctx.beginPath();ctx.ellipse(mx,my+4,15,11,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#dce4e8';ctx.beginPath();ctx.ellipse(mx-2,my,13,9,0,0,Math.PI*2);ctx.fill();
      // Shine
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.ellipse(mx-5,my-4,5,3,-0.4,0,Math.PI*2);ctx.fill();
      // Little face (kawaii rock!)
      circ(mx-4,my+2,1.5,'#a0a8b0');circ(mx+2,my+2,1.5,'#a0a8b0');
      ctx.strokeStyle='#a0a8b0';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(mx-1,my+5,3,0.2,Math.PI-0.2);ctx.stroke();
      break;}

    case T.FLOWER:{
      ctx.fillStyle=p.grass;ctx.fillRect(sx,sy,TILE,TILE);
      const fc=p.flower;
      ctx.fillStyle='#80c060';ctx.fillRect(mx-2,my+2,4,14);
      // Cute rounded petals
      for(let a=0;a<6;a++){
        const ang=a*Math.PI*2/6;
        ctx.fillStyle=fc;
        ctx.beginPath();ctx.ellipse(mx+Math.cos(ang)*9,my+Math.sin(ang)*9,5,5,0,0,Math.PI*2);ctx.fill();
      }
      circ(mx,my,6,'#FFF8A0');
      // Shine dot
      circ(mx-2,my-2,2,'rgba(255,255,255,0.7)');
      break;}

    case T.TALL:
      ctx.fillStyle=p.grass;ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle=p.grass2;
      // Wispy grass blades
      for(let i=0;i<4;i++){
        const gx=sx+6+i*11;
        const wave=Math.sin(A*0.04+i)*2;
        ctx.fillRect(gx+wave,sy+14,4,TILE-14);
        ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(gx+wave,sy+14,2,6);
        ctx.fillStyle=p.grass2;
      }
      break;

    case T.WELL:
      ctx.fillStyle=p.grass;ctx.fillRect(sx,sy,TILE,TILE);
      // Cute round well with pastel stone
      ctx.fillStyle='#e0d0f0';ctx.beginPath();ctx.arc(mx,my+4,13,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#d0c0e0';ctx.beginPath();ctx.arc(mx,my+4,9,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=p.water;ctx.beginPath();ctx.arc(mx,my+4,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.ellipse(mx-2,my+2,3,2,0,0,Math.PI*2);ctx.fill();
      // Wooden arch
      ctx.fillStyle='#d4a870';ctx.fillRect(mx-2,sy+2,4,TILE/2-4);
      ctx.beginPath();ctx.roundRect(sx+4,sy+8,TILE-8,6,3);ctx.fill();
      // Cute heart
      ctx.fillStyle='#f8a0c0';ctx.font='10px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('♡',mx,sy+12);ctx.textBaseline='alphabetic';
      break;

    case T.CHEST:
      ctx.fillStyle=p.grass;ctx.fillRect(sx,sy,TILE,TILE);
      // Kawaii treasure chest
      ctx.fillStyle='#f0c878';ctx.beginPath();ctx.roundRect(sx+6,sy+18,TILE-12,TILE-22,4);ctx.fill();
      ctx.fillStyle='#e8a840';ctx.beginPath();ctx.roundRect(sx+6,sy+18,TILE-12,8,4);ctx.fill();
      // Cute bow ribbon
      ctx.fillStyle='#f87090';
      ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx-8,my-6);ctx.lineTo(mx-6,my+2);ctx.fill();
      ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx+8,my-6);ctx.lineTo(mx+6,my+2);ctx.fill();
      circ(mx,my,4,'#ff90a8');
      // Shine
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.roundRect(sx+8,sy+20,10,4,2);ctx.fill();
      break;
  }

  // Crop overlay
  const cr=world.cd[r][c];
  if(cr){drawCropOnTile(cr,sx,sy)}
}

function drawCropOnTile(cr,sx,sy){
  const def=CROPS[cr.key];
  const progress=cr.stage/def.days;
  const mx=sx+TILE/2, cy=sy+TILE-8;

  if(progress>=1){
    // Fully grown — pastel glow + big icon
    const glowC=def.color+'40';
    ctx.fillStyle=glowC;ctx.beginPath();ctx.arc(mx,cy-12,20,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=def.color+'25';ctx.beginPath();ctx.arc(mx,cy-12,26,0,Math.PI*2);ctx.fill();
    icon(def.icon,mx,cy-12,32);
    // Sparkle stars
    ctx.fillStyle='rgba(255,230,100,0.9)';
    const sp=[[mx-16,cy-28],[mx+16,cy-26],[mx,cy-32],[mx-10,cy-34],[mx+12,cy-30]];
    sp.forEach(([x,y],i)=>{if((animFrame+i*7)%30<8){ctx.font='10px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✦',x,y);ctx.textBaseline='alphabetic'}});
  } else if(progress>0.6){
    // Mid — cute round plant
    ctx.fillStyle='#80c060';ctx.beginPath();ctx.roundRect(mx-3,cy-20,6,20,3);ctx.fill();
    circ(mx,cy-24,10,def.color);
    circ(mx-6,cy-20,7,def.color+'cc');
    circ(mx+6,cy-20,7,def.color+'cc');
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.ellipse(mx-2,cy-28,3,2,0,0,Math.PI*2);ctx.fill();
  } else if(progress>0.3){
    // Small — two leaves
    ctx.fillStyle='#88c868';ctx.fillRect(mx-2,cy-12,4,12);
    ctx.beginPath();ctx.ellipse(mx-5,cy-12,6,4,-0.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(mx+5,cy-10,6,4,0.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.ellipse(mx-6,cy-14,3,2,-0.5,0,Math.PI*2);ctx.fill();
  } else {
    // Sprout — tiny cute
    ctx.fillStyle='#a0d870';ctx.fillRect(mx-2,cy-8,4,8);
    ctx.beginPath();ctx.ellipse(mx+3,cy-8,5,4,0.4,0,Math.PI*2);ctx.fill();

  if(cr.watered){

}

// ── PLAYER RENDERING — Kawaii Chibi Girl ───────
function drawPlayer(px,py,dir,moving,frame){
  const x=Math.round(px),y=Math.round(py);
  const bob=moving?Math.sin(frame*0.22)*3:0;
  const legSwing=moving?Math.sin(frame*0.28)*4:0;
  const S=GS;

  ctx.save();
  ctx.translate(x,y+bob);

  // Shadow
  ctx.fillStyle='rgba(180,120,160,0.18)';ctx.beginPath();ctx.ellipse(0,18,14,5,0,0,Math.PI*2);ctx.fill();

  // === LEGS / SKIRT ===
  // Skirt (A-line, very cute)
  ctx.fillStyle='#f8a0c0';ctx.beginPath();ctx.moveTo(-12,2);ctx.lineTo(12,2);ctx.lineTo(14,16);ctx.lineTo(-14,16);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ffc0d8';ctx.beginPath();ctx.moveTo(-12,2);ctx.lineTo(12,2);ctx.lineTo(11,9);ctx.lineTo(-11,9);ctx.closePath();ctx.fill();
  // Skirt frill
  ctx.fillStyle='#fff0f8';ctx.beginPath();
  for(let i=0;i<7;i++){const fx=-13+i*4.2;ctx.moveTo(fx,14);ctx.quadraticCurveTo(fx+2,12,fx+4.2,14)}
  ctx.fill();ctx.fillRect(-14,13,28,4);

  // Legs
  ctx.fillStyle='#ffe8f0';
  ctx.beginPath();ctx.roundRect(-8+legSwing,14,7,10,3);ctx.fill();
  ctx.beginPath();ctx.roundRect(1-legSwing,14,7,10,3);ctx.fill();
  // Shoes — cute round pink shoes
  ctx.fillStyle='#e06090';
  ctx.beginPath();ctx.ellipse(-5+legSwing,24,6,4,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(5-legSwing,24,6,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();ctx.ellipse(-7+legSwing,22,3,2,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(3-legSwing,22,3,2,0,0,Math.PI*2);ctx.fill();

  // === BODY ===
  // Blouse
  ctx.fillStyle='#ffffff';ctx.beginPath();ctx.roundRect(-10,-4,20,14,6);ctx.fill();
  // Collar / ribbon bow
  ctx.fillStyle='#f8a0c0';ctx.beginPath();ctx.roundRect(-4,-4,8,6,3);ctx.fill();
  // Bow
  ctx.fillStyle='#f870a0';
  ctx.beginPath();ctx.moveTo(0,-1);ctx.lineTo(-8,-6);ctx.lineTo(-6,0);ctx.fill();
  ctx.beginPath();ctx.moveTo(0,-1);ctx.lineTo(8,-6);ctx.lineTo(6,0);ctx.fill();
  circ(0,-1,3,'#ff90b8');
  // Apron
  ctx.fillStyle='rgba(255,240,248,0.7)';ctx.beginPath();ctx.roundRect(-6,0,12,8,4);ctx.fill();

  // === ARMS ===
  const armAng=moving?Math.sin(frame*0.25)*0.35:0;
  // Left arm
  ctx.save();ctx.translate(-12,1);ctx.rotate(-armAng);
  ctx.fillStyle='#fde0e8';ctx.beginPath();ctx.roundRect(-4,0,8,11,4);ctx.fill();
  // Glove/cuff
  ctx.fillStyle='#f8a0c0';ctx.beginPath();ctx.roundRect(-4,0,8,4,3);ctx.fill();
  ctx.restore();
  // Right arm
  ctx.save();ctx.translate(12,1);ctx.rotate(armAng);
  ctx.fillStyle='#fde0e8';ctx.beginPath();ctx.roundRect(-4,0,8,11,4);ctx.fill();
  ctx.fillStyle='#f8a0c0';ctx.beginPath();ctx.roundRect(-4,0,8,4,3);ctx.fill();
  ctx.restore();

  // Tool in right hand
  const tool=S.bar[S.slot];
  if(tool){
    const ticons={'hoe':'⛏️','watering_can':'🪣','sickle':'🌾','axe':'🪓','pickaxe':'⛏','fishing_rod':'🎣'};
    const ti=ticons[tool]||'🌱';
    ctx.save();ctx.translate(18,4);ctx.rotate(0.3);
    icon(ti,0,0,16);ctx.restore();
  }

  // === HEAD (big chibi style) ===
  // Hair back
  ctx.fillStyle='#8B4513';
  if(dir===0){
    // Facing away — show pigtails from back
    circ(-10,-28,8,'#8B4513');circ(10,-28,8,'#8B4513');
    circ(0,-28,16,'#9B5523');
  } else {
    // Side pigtails
    if(dir===3){ctx.beginPath();ctx.ellipse(-16,-26,7,10,0.3,0,Math.PI*2);ctx.fill()}
    else if(dir===1){ctx.beginPath();ctx.ellipse(16,-26,7,10,-0.3,0,Math.PI*2);ctx.fill()}
    else{ctx.beginPath();ctx.ellipse(-16,-26,7,10,0.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(16,-26,7,10,-0.3,0,Math.PI*2);ctx.fill()}
  }

  // Head circle — big chibi (head=1.4x body)
  circ(0,-22,17,'#fde8d8');
  // Cheek blush (always visible)
  circ(-11,-20,6,'rgba(255,160,180,0.5)');
  circ(11,-20,6,'rgba(255,160,180,0.5)');

  if(dir!==0){
    // Big sparkly eyes
    const eyeOff=dir===3?-3:dir===1?3:0;
    // Eye whites
    ctx.fillStyle='white';
    ctx.beginPath();ctx.ellipse(eyeOff-5,-24,4,5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(eyeOff+5,-24,4,5,0,0,Math.PI*2);ctx.fill();
    // Iris (large, colorful)
    ctx.fillStyle='#6060c0';
    ctx.beginPath();ctx.ellipse(eyeOff-5,-24,3,4,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(eyeOff+5,-24,3,4,0,0,Math.PI*2);ctx.fill();
    // Pupil
    ctx.fillStyle='#101030';
    ctx.beginPath();ctx.ellipse(eyeOff-5,-24,1.5,2,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(eyeOff+5,-24,1.5,2,0,0,Math.PI*2);ctx.fill();
    // Eye shine (twin sparkle)
    ctx.fillStyle='white';
    circ(eyeOff-6,-25.5,1.5,'white');circ(eyeOff-3.5,-23.5,1,'white');
    circ(eyeOff+4,-25.5,1.5,'white');circ(eyeOff+6.5,-23.5,1,'white');
    // Lashes
    ctx.strokeStyle='#101030';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(eyeOff-9,-22);ctx.lineTo(eyeOff-10,-20);ctx.stroke();
    ctx.beginPath();ctx.moveTo(eyeOff+9,-22);ctx.lineTo(eyeOff+10,-20);ctx.stroke();
    // Tiny nose
    circ(eyeOff,-20,1.5,'rgba(200,120,120,0.5)');
    // Smile
    ctx.strokeStyle='#c07080';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(eyeOff,-18,4,0.15,Math.PI-0.15);ctx.stroke();
  } else {
    // Facing up — show back of head, hair ribbon
    circ(0,-22,17,'#9B5523');
  }

  // === HAIR (front, over head) ===
  ctx.fillStyle='#9B5523';
  if(dir!==0){
    // Bangs / fringe
    ctx.beginPath();ctx.ellipse(-4,-35,10,8,0.15,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(6,-35,10,8,-0.15,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#8B4513';ctx.beginPath();ctx.ellipse(1,-34,8,6,0,0,Math.PI*2);ctx.fill();
  }

  // Hair ribbon bow on top
  ctx.fillStyle='#f860a0';
  ctx.beginPath();ctx.moveTo(0,-38);ctx.lineTo(-10,-44);ctx.lineTo(-8,-36);ctx.fill();
  ctx.beginPath();ctx.moveTo(0,-38);ctx.lineTo(10,-44);ctx.lineTo(8,-36);ctx.fill();
  circ(0,-38,4,'#ff90c0');

  ctx.restore();
}

// ── DEFENSE RENDERING ──────────────────────────
function drawDefense(d){
  const x=Math.round(d.x-camX()),y=Math.round(d.y-camY());
  if(x<-80||x>W+80||y<-80||y>H+80)return;
  const def=DEFENSE_DEFS[d.type];
  ctx.save();ctx.translate(x,y);
  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.beginPath();ctx.ellipse(0,14,14,4,0,0,Math.PI*2);ctx.fill();
  switch(d.type){
    case 'wall':
      ctx.fillStyle='#b08050';ctx.beginPath();ctx.roundRect(-14,-22,28,34,4);ctx.fill();
      ctx.fillStyle='#c89060';
      for(let i=0;i<4;i++){const off=(i%2)*8;
        ctx.beginPath();ctx.roundRect(-12,-20+i*9+off*0.3,24,7,2);ctx.fill()}
      ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.roundRect(-12,-20,24,4,2);ctx.fill();
      break;
    case 'scarecrow':
      // Slow aura when monsters in range
      {const hasTarget=GS.monsters&&GS.monsters.some(m2=>Math.hypot(d.x-m2.x,d.y-m2.y)<def.range);
      if(hasTarget){
        const pulse=0.35+0.25*Math.sin(animFrame*0.16);
        // range ring
        ctx.strokeStyle=`rgba(80,180,255,${pulse*0.9})`;ctx.lineWidth=2;
        ctx.setLineDash([7,6]);
        ctx.beginPath();ctx.arc(0,-20,def.range,0,Math.PI*2);ctx.stroke();
        ctx.setLineDash([]);
        // inner fill
        ctx.fillStyle=`rgba(80,160,255,${pulse*0.08})`;
        ctx.beginPath();ctx.arc(0,-20,def.range,0,Math.PI*2);ctx.fill();
        // orbiting snowflakes

      ctx.fillStyle='#505060';ctx.beginPath();ctx.ellipse(0,6,17,8,0,0,Math.PI*2);ctx.fill();

      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.roundRect(4,-5,22,5,3);ctx.fill();
      ctx.restore();
      break;
    case 'magetower':
      ctx.fillStyle='#7060a0';ctx.beginPath();ctx.roundRect(-13,2,26,20,4);ctx.fill();
      ctx.fillStyle='#8070b8';ctx.beginPath();ctx.roundRect(-11,-32,22,36,6);ctx.fill();
      ctx.fillStyle='#604880';ctx.beginPath();ctx.moveTo(0,-54);ctx.lineTo(-11,-32);ctx.lineTo(11,-32);ctx.closePath();ctx.fill();
      const glow=ctx.createRadialGradient(0,-24,0,0,-24,9);
      glow.addColorStop(0,'rgba(200,140,255,0.9)');glow.addColorStop(1,'rgba(120,60,220,0)');
      ctx.fillStyle=glow;ctx.beginPath();ctx.arc(0,-24,9,0,Math.PI*2);ctx.fill();

      ctx.fillStyle='rgba(220,200,255,0.7)';
      ctx.beginPath();ctx.ellipse(-4,-18,3,4,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(4,-18,3,4,0,0,Math.PI*2);ctx.fill();
      // Sparkles animated
      ctx.fillStyle='rgba(255,255,255,0.7)';
      for(let i=0;i<4;i++){const a=animFrame*0.06+i*Math.PI/2;circ(Math.cos(a)*8,-24+Math.sin(a)*8,1.5,'rgba(255,255,255,0.7)')}
      break;
    default:{
      // Generic gacha crystal tower
      const gc=GRADE_COLOR[def?.grade]||'#90c8ff';
      const pulse=0.7+0.3*Math.sin(animFrame*0.1);
      // Slow-aura ring
      if(def?.special==='slow_aura'){
        const ht=GS.monsters&&GS.monsters.some(m2=>Math.hypot(d.x-m2.x,d.y-m2.y)<def.range);
        if(ht){ctx.strokeStyle=`rgba(80,180,255,${pulse*0.7})`;ctx.lineWidth=1.5;ctx.setLineDash([6,5]);ctx.beginPath();ctx.arc(0,-10,def.range,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
      }
      // Base platform
      ctx.fillStyle='#706080';ctx.beginPath();ctx.roundRect(-14,6,28,14,3);ctx.fill();
      // Crystal obelisk
      ctx.fillStyle=gc+'cc';
      ctx.beginPath();ctx.moveTo(0,-44);ctx.lineTo(-8,-18);ctx.lineTo(-10,6);ctx.lineTo(10,6);ctx.lineTo(8,-18);ctx.closePath();ctx.fill();

      ctx.fillStyle='rgba(255,255,255,0.22)';
      ctx.beginPath();ctx.moveTo(0,-44);ctx.lineTo(-5,-18);ctx.lineTo(-7,6);ctx.lineTo(-4,6);ctx.closePath();ctx.fill();
      // Glow
      const cg=ctx.createRadialGradient(0,-32,0,0,-32,11);
      cg.addColorStop(0,gc+'ee');cg.addColorStop(1,gc+'00');
      ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,-32,11,0,Math.PI*2);ctx.fill();
      // Icon + grade
      ctx.globalAlpha=pulse;
      ctx.font='13px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(def?.icon||'💎',0,-34);
      ctx.globalAlpha=1;ctx.textBaseline='alphabetic';
      ctx.font='bold 8px "Malgun Gothic"';ctx.fillStyle=gc;
      ctx.fillText(def?.grade||'?',0,3);
      // Attack flash beam
      if(d.atkFlash>0){
        const fl=d.atkFlash/0.35;
        ctx.save();ctx.rotate(d.atkAng||0);
        ctx.globalAlpha=fl*0.75;
        ctx.strokeStyle=gc;ctx.lineWidth=3+fl*3;ctx.lineCap='round';
        ctx.shadowBlur=10+fl*8;ctx.shadowColor=gc;
        ctx.beginPath();ctx.moveTo(0,-30);ctx.lineTo(def.range||100,0);ctx.stroke();
        ctx.shadowBlur=0;ctx.restore();
        ctx.globalAlpha=1;
      }
      break;
    }
  }
  // HP bar (always show during wave, otherwise when damaged)
  const effMaxHp=def.maxHp*(d.level||1);
  if(GS.waveActive||d.hp<effMaxHp){
    const bw=34,bh=4,by2=18;
    ctx.fillStyle='rgba(0,0,0,0.45)';ctx.beginPath();ctx.roundRect(-bw/2,by2,bw,bh,2);ctx.fill();
    const hr2=Math.min(1,d.hp/effMaxHp);
    ctx.fillStyle=hr2>0.5?'#60e060':hr2>0.25?'#e0c030':'#e03030';
    ctx.beginPath();ctx.roundRect(-bw/2,by2,bw*hr2,bh,2);ctx.fill();
  }
  // Level badge
  if((d.level||1)>1){
    ctx.fillStyle='rgba(30,10,60,0.82)';ctx.beginPath();ctx.roundRect(8,-40,22,14,5);ctx.fill();
    ctx.fillStyle='#c0e0ff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
    ctx.fillText(`Lv.${d.level}`,20,-29);
  }
  ctx.restore();
}

// ── MONSTER RENDERING ──────────────────────────
function drawMonster(m){
  const x=Math.round(m.x-camX()),y=Math.round(m.y-camY());
  if(x<-80||x>W+80||y<-80||y>H+80)return;
  ctx.save();ctx.translate(x,y);
  const bob=Math.sin(animFrame*0.15+m.id*0.5)*2;
  const atkProg=Math.max(0,m.atkAnim/0.45);
  const shake=atkProg>0?Math.sin(animFrame*0.8)*4*atkProg:0;
  ctx.translate(shake,bob);
  const sl=m.slowed>0;
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(0,m.size+2,m.size*0.8,m.size*0.28,0,0,Math.PI*2);ctx.fill();
  switch(m.type){
    case 'slime':{
      const sc=0.92+Math.sin(animFrame*0.1)*0.07;
      ctx.save();ctx.scale(sc,1/sc);
      ctx.fillStyle=sl?'#98c898':'#58d858';
      ctx.beginPath();ctx.ellipse(0,-2,14,12,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.28)';ctx.beginPath();ctx.ellipse(-4,-6,5,4,0.3,0,Math.PI*2);ctx.fill();
      ctx.restore();
      circ(-5,-5,3,'white');circ(5,-5,3,'white');
      circ(-5,-5,2,'#1a2a1a');circ(5,-5,2,'#1a2a1a');
      circ(-5.9,-5.8,0.9,'white');circ(4.1,-5.8,0.9,'white');
      ctx.strokeStyle='#1a3a1a';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.arc(0,-2,3.5,0.2,Math.PI-0.2);ctx.stroke();
      break;}
    case 'bat':{
      const wf=Math.sin(animFrame*0.28)*0.65;
      ctx.fillStyle=sl?'#b0a0c0':'#705888';
      ctx.save();ctx.rotate(wf);ctx.beginPath();ctx.ellipse(-11,0,13,6,-0.3,0,Math.PI*2);ctx.fill();ctx.restore();
      ctx.save();ctx.rotate(-wf);ctx.beginPath();ctx.ellipse(11,0,13,6,0.3,0,Math.PI*2);ctx.fill();ctx.restore();
      circ(0,0,9,'#806898');
      circ(-3,-2,3,'#ff3030');circ(3,-2,3,'#ff3030');
      circ(-3,-2,1.2,'white');circ(3,-2,1.2,'white');
      ctx.fillStyle='#705888';
      ctx.beginPath();ctx.moveTo(-4,-9);ctx.lineTo(-8,-18);ctx.lineTo(-1,-11);ctx.fill();
      ctx.beginPath();ctx.moveTo(4,-9);ctx.lineTo(8,-18);ctx.lineTo(1,-11);ctx.fill();
      break;}
    case 'goblin':{
      ctx.fillStyle=sl?'#90c090':'#58a848';
      ctx.beginPath();ctx.ellipse(0,4,12,14,0,0,Math.PI*2);ctx.fill();
      circ(0,-14,13,'#68b858');
      ctx.beginPath();ctx.ellipse(-13,-14,6,9,0.3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(13,-14,6,9,-0.3,0,Math.PI*2);ctx.fill();
      circ(-4,-16,3.5,'#ff3030');circ(4,-16,3.5,'#ff3030');
      circ(-4,-16,1.8,'#100000');circ(4,-16,1.8,'#100000');
      ctx.strokeStyle='#203010';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(-6,-22);ctx.lineTo(6,-22);ctx.stroke();
      ctx.fillStyle='white';ctx.beginPath();ctx.moveTo(-2,-10);ctx.lineTo(0,-5);ctx.lineTo(2,-10);ctx.fill();
      break;}
    case 'skeleton':{
      ctx.fillStyle=sl?'#d0d8c8':'#ccd8dc';
      ctx.beginPath();ctx.ellipse(0,2,10,13,0,0,Math.PI*2);ctx.fill();

      circ(-5,-21,4,'#2a2a3a');circ(5,-21,4,'#2a2a3a');

      ctx.fillStyle='white';
      ctx.beginPath();ctx.roundRect(-7,-10,4,6,1);ctx.fill();
      ctx.beginPath();ctx.roundRect(-2,-10,4,6,1);ctx.fill();
      ctx.beginPath();ctx.roundRect(3,-10,4,6,1);ctx.fill();

      ctx.beginPath();ctx.moveTo(10,-40);ctx.lineTo(17,-60);ctx.lineTo(3,-42);ctx.fill();
      circ(-8,-24,6,'#ffee00');circ(8,-24,6,'#ffee00');
      circ(-8,-24,4,'#ff8800');circ(8,-24,4,'#ff8800');
      circ(-8,-24,2,'#180000');circ(8,-24,2,'#180000');
      ctx.strokeStyle='#600010';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(-5,-34);ctx.lineTo(2,-12);ctx.stroke();
      ctx.fillStyle='white';
      ctx.beginPath();ctx.moveTo(-7,-10);ctx.lineTo(-5,-3);ctx.lineTo(-3,-10);ctx.fill();
      ctx.beginPath();ctx.moveTo(1,-10);ctx.lineTo(3,-3);ctx.lineTo(5,-10);ctx.fill();
      break;}
    case 'troll':{
      // 몸통 — 크고 거대한 녹색 체형
      ctx.fillStyle=sl?'#8aaa6a':'#6a8a3a';
      ctx.beginPath();ctx.ellipse(0,6,22,18,0,0,Math.PI*2);ctx.fill();

      ctx.beginPath();ctx.ellipse(-26,-2,10,7,0.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(26,-2,10,7,-0.5,0,Math.PI*2);ctx.fill();

      ctx.beginPath();ctx.moveTo(1,-14);ctx.lineTo(3,-8);ctx.lineTo(5,-14);ctx.fill();
      break;}
    case 'darkelf':{
      // 몸통 — 날씬한 보라색
      ctx.fillStyle=sl?'#b080f0':'#9040e0';
      ctx.beginPath();ctx.ellipse(0,2,8,11,0,0,Math.PI*2);ctx.fill();
      // 머리
      circ(0,-15,10,'#a050d8');

      ctx.fillStyle='#a050d8';
      ctx.beginPath();ctx.moveTo(-10,-18);ctx.lineTo(-20,-30);ctx.lineTo(-5,-20);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(10,-18);ctx.lineTo(20,-30);ctx.lineTo(5,-20);ctx.closePath();ctx.fill();
      // 눈 (빛나는)
      circ(-3,-17,3,'#ff00ff');circ(3,-17,3,'#ff00ff');
      circ(-3,-17,1.5,'white');circ(3,-17,1.5,'white');
      // 망토
      ctx.fillStyle='rgba(60,0,100,0.6)';
      ctx.beginPath();ctx.moveTo(-10,0);ctx.lineTo(-14,18);ctx.lineTo(0,12);ctx.lineTo(14,18);ctx.lineTo(10,0);ctx.closePath();ctx.fill();
      break;}
    case 'wraith':{
      // 망령 — 반투명 청록 유령 형태
      ctx.globalAlpha=0.82;
      ctx.fillStyle=sl?'#80e0e0':'#40c0c0';
      // 유령 몸통 (아래가 흐릿하게 퍼지는)
      const grd=ctx.createLinearGradient(0,-30,0,20);
      grd.addColorStop(0,'rgba(60,200,200,0.9)');
      grd.addColorStop(1,'rgba(60,200,200,0)');
      ctx.fillStyle=grd;
      ctx.beginPath();ctx.ellipse(0,-5,16,24,0,0,Math.PI*2);ctx.fill();
      // 물결치는 아랫부분
      ctx.fillStyle='rgba(40,180,180,0.5)';
      const wv=Math.sin(animFrame*0.12)*3;
      ctx.beginPath();ctx.moveTo(-16,10);
      for(let xi=-16;xi<=16;xi+=4){ctx.lineTo(xi,14+Math.sin((xi+animFrame*2)*0.4)*wv);}
      ctx.lineTo(16,24);ctx.lineTo(-16,24);ctx.closePath();ctx.fill();
      // 눈 (텅 빈 구멍)
      ctx.globalAlpha=1;
      circ(-5,-12,4,'rgba(0,0,0,0.8)');circ(5,-12,4,'rgba(0,0,0,0.8)');
      circ(-5,-12,2,'rgba(0,220,255,0.5)');circ(5,-12,2,'rgba(0,220,255,0.5)');
      ctx.globalAlpha=1;
      break;}
    case 'demon':{
      // 몸통 — 크고 강렬한 붉은색
      ctx.fillStyle=sl?'#e06060':'#c01020';
      ctx.beginPath();ctx.ellipse(0,8,28,22,0,0,Math.PI*2);ctx.fill();
      // 날개
      ctx.fillStyle='rgba(100,0,0,0.7)';
      ctx.beginPath();ctx.moveTo(-28,0);ctx.lineTo(-50,-30);ctx.lineTo(-36,-10);ctx.lineTo(-20,4);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(28,0);ctx.lineTo(50,-30);ctx.lineTo(36,-10);ctx.lineTo(20,4);ctx.closePath();ctx.fill();
      // 머리
      circ(0,-26,24,sl?'#e06060':'#d01828');
      // 뿔
      ctx.fillStyle='#800000';
      ctx.beginPath();ctx.moveTo(-12,-44);ctx.lineTo(-18,-72);ctx.lineTo(-5,-46);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(12,-44);ctx.lineTo(18,-72);ctx.lineTo(5,-46);ctx.closePath();ctx.fill();
      // 눈
      circ(-9,-28,7,'#ffcc00');circ(9,-28,7,'#ffcc00');
      circ(-9,-28,5,'#ff6600');circ(9,-28,5,'#ff6600');
      circ(-9,-28,2.5,'#0a0000');circ(9,-28,2.5,'#0a0000');
      // 이빨
      ctx.fillStyle='#ffffdd';
      ctx.beginPath();ctx.moveTo(-10,-12);ctx.lineTo(-7,-4);ctx.lineTo(-4,-12);ctx.fill();
      ctx.beginPath();ctx.moveTo(-2,-12);ctx.lineTo(1,-4);ctx.lineTo(4,-12);ctx.fill();
      ctx.beginPath();ctx.moveTo(6,-12);ctx.lineTo(9,-4);ctx.lineTo(12,-12);ctx.fill();
      // 꼬리
      ctx.strokeStyle='#800000';ctx.lineWidth=4;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(20,16);ctx.quadraticCurveTo(38,30,30,46);ctx.stroke();
      break;}
  }
  // Slow indicator — orbiting snowflakes
  if(m.slowed>0){
    const sf=animFrame*0.09;
    ctx.font='11px serif';ctx.textAlign='center';
    for(let si=0;si<3;si++){
      const sa=sf+si*Math.PI*2/3;
      const sr=m.size+5;
      ctx.globalAlpha=Math.min(1,m.slowed/0.4)*0.85;
      ctx.fillText('❄',Math.cos(sa)*sr,Math.sin(sa)*sr-m.size*0.3);
    }
    ctx.globalAlpha=1;
  }
  // Attack flash & slash arc
  if(atkProg>0){
    const ang=Math.atan2(curHY-m.y,curHX-m.x);
    // body glow
    ctx.fillStyle=`rgba(255,80,0,${atkProg*0.38})`;
    ctx.beginPath();ctx.ellipse(0,-m.size*0.3,m.size*1.4,m.size*1.4,0,0,Math.PI*2);ctx.fill();
    // slash arc
    ctx.save();ctx.rotate(ang);
    ctx.strokeStyle=`rgba(255,${160-atkProg*100|0},30,${atkProg*0.9})`;
    ctx.lineWidth=3+atkProg*3;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(m.size*0.85,0,m.size*1.5,-0.55,0.55);ctx.stroke();
    ctx.restore();
  }
  // HP bar
  const bw=m.size*2.8,bh=4;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(-bw/2,-m.size-12,bw,bh,2);ctx.fill();
  const hr=m.hp/m.maxHp;
  ctx.fillStyle=hr>0.6?'#60e060':hr>0.3?'#e0c030':'#e03030';
  ctx.beginPath();ctx.roundRect(-bw/2,-m.size-12,bw*hr,bh,2);ctx.fill();
  ctx.restore();
}

// ── PROJECTILE RENDERING ───────────────────────
function drawProjectile(p){
  const x=p.x-camX(),y=p.y-camY();
  ctx.save();ctx.translate(x,y);ctx.globalAlpha=p.life;
  if(p.type==='archer'){
    const ang=Math.atan2(p.ty-p.y,p.tx-p.x);
    ctx.rotate(ang);
    ctx.fillStyle='#804020';ctx.beginPath();ctx.moveTo(9,0);ctx.lineTo(-4,-3);ctx.lineTo(-4,3);ctx.fill();
    ctx.strokeStyle='#a06030';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-4,0);ctx.lineTo(-14,0);ctx.stroke();
  } else if(p.type==='cannon'){
    circ(0,0,7,'#303040');circ(-2,-2,2.5,'rgba(255,255,255,0.22)');
    const ang=Math.atan2(p.ty-p.y,p.tx-p.x);
    for(let i=1;i<=3;i++)circ(-Math.cos(ang)*i*8,-Math.sin(ang)*i*8,3+i,'rgba(140,140,150,0.2)');
  } else if(p.type==='magetower'){
    const mg=ctx.createRadialGradient(0,0,0,0,0,9);
    mg.addColorStop(0,'rgba(225,180,255,0.95)');mg.addColorStop(1,'rgba(140,70,255,0)');
    ctx.fillStyle=mg;ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.fill();
    for(let i=0;i<4;i++){const a=animFrame*0.18+i*Math.PI/2;circ(Math.cos(a)*7,Math.sin(a)*7,2,'rgba(255,255,255,0.85)')}
  } else {
    // Gacha tower projectile — dispatch on special
    const def2=DEFENSE_DEFS[p.type];
    const sp2=def2?.special||'';
    const gc2=GRADE_COLOR[def2?.grade]||'#90c8ff';
    const ang=Math.atan2(p.ty-p.y,p.tx-p.x);
    if(sp2.includes('burn')){
      const fg=ctx.createRadialGradient(0,0,0,0,0,9);
      fg.addColorStop(0,'rgba(255,255,200,0.95)');fg.addColorStop(0.45,'rgba(255,110,20,0.9)');fg.addColorStop(1,'rgba(200,30,0,0)');
      ctx.fillStyle=fg;ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,130,30,0.35)';
      ctx.beginPath();ctx.ellipse(-Math.cos(ang)*9,-Math.sin(ang)*9,13,4,ang,0,Math.PI*2);ctx.fill();
    } else if(sp2==='chain'||sp2.includes('chain')){
      // Lightning spark
      ctx.strokeStyle='rgba(255,255,120,0.95)';ctx.lineWidth=2.5;
      ctx.shadowBlur=10;ctx.shadowColor='#ffff00';
      ctx.beginPath();ctx.moveTo(-8*Math.cos(ang),-8*Math.sin(ang));ctx.lineTo(8*Math.cos(ang),8*Math.sin(ang));ctx.stroke();
      ctx.shadowBlur=0;
      circ(0,0,3,'rgba(255,255,220,0.95)');
    } else if(sp2.includes('poison')){
      const pg=ctx.createRadialGradient(0,0,0,0,0,8);
      pg.addColorStop(0,'rgba(200,255,80,0.95)');pg.addColorStop(1,'rgba(30,160,10,0)');
      ctx.fillStyle=pg;ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();
      circ(0,0,3,'rgba(100,220,40,0.9)');
    } else if(sp2.includes('slow')){
      ctx.save();ctx.rotate(ang);
      ctx.fillStyle='rgba(130,215,255,0.92)';
      ctx.beginPath();ctx.moveTo(11,0);ctx.lineTo(-5,-4);ctx.lineTo(-5,4);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(200,240,255,0.65)';ctx.beginPath();ctx.moveTo(-5,-2);ctx.lineTo(-13,0);ctx.lineTo(-5,2);ctx.closePath();ctx.fill();
      ctx.restore();
    } else if(sp2.includes('holy')){
      const hg=ctx.createRadialGradient(0,0,0,0,0,9);
      hg.addColorStop(0,'rgba(255,255,230,0.98)');hg.addColorStop(0.5,'rgba(255,220,60,0.85)');hg.addColorStop(1,'rgba(255,200,0,0)');
      ctx.fillStyle=hg;ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,255,180,0.8)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(0,-11);ctx.lineTo(0,11);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-11,0);ctx.lineTo(11,0);ctx.stroke();
    } else if(sp2.includes('drain')){
      const dg=ctx.createRadialGradient(0,0,0,0,0,8);
      dg.addColorStop(0,'rgba(220,130,255,0.95)');dg.addColorStop(1,'rgba(70,0,140,0)');
      ctx.fillStyle=dg;ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();
      circ(0,0,3,'rgba(180,60,255,0.85)');
    } else if(sp2.includes('pierce')){
      ctx.save();ctx.rotate(ang);
      ctx.fillStyle='rgba(190,170,150,0.92)';
      ctx.beginPath();ctx.moveTo(13,0);ctx.lineTo(-5,-3);ctx.lineTo(-4,0);ctx.lineTo(-5,3);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.moveTo(11,-1);ctx.lineTo(-3,-2);ctx.lineTo(-2,0);ctx.closePath();ctx.fill();
      ctx.restore();
    } else if(sp2.includes('push')){
      ctx.save();ctx.rotate(ang);
      ctx.strokeStyle='rgba(90,215,255,0.88)';ctx.lineWidth=2.5;ctx.lineCap='round';
      ctx.beginPath();ctx.arc(0,0,8,-0.8,0.8);ctx.stroke();
      ctx.beginPath();ctx.arc(0,0,13,-0.6,0.6);ctx.stroke();
      ctx.restore();
    } else {
      const cg=ctx.createRadialGradient(0,0,0,0,0,7);
      cg.addColorStop(0,gc2);cg.addColorStop(1,gc2.slice(0,7)+'00');
      ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalAlpha=1;ctx.restore();
}

// ── SACRED STATUE ──────────────────────────────
function drawStatue(){
  const sx=curHX-camX(), sy=curHY-camY();
  if(sx<-80||sx>W+80||sy<-80||sy>H+80)return;
  const hp=GS.farmHP/GS.farmMaxHP;
  const pulse=0.72+0.28*Math.sin(animFrame*0.09);
  ctx.save();ctx.translate(sx,sy);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();ctx.ellipse(0,18,16,5,0,0,Math.PI*2);ctx.fill();

  // Stone pedestal
  const baseCol=hp>0.5?'#a8b4cc':'#907880';
  ctx.fillStyle=baseCol;
  ctx.beginPath();ctx.roundRect(-14,6,28,15,3);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.18)';ctx.beginPath();ctx.roundRect(-13,7,26,5,2);ctx.fill();

  // Obelisk body
  ctx.fillStyle=hp>0.5?'#c8d2e4':'#a09098';
  ctx.beginPath();ctx.moveTo(-8,6);ctx.lineTo(8,6);ctx.lineTo(4,-20);ctx.lineTo(-4,-20);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.beginPath();ctx.moveTo(-6,4);ctx.lineTo(-4,4);ctx.lineTo(-5,-18);ctx.closePath();ctx.fill();

  // Cracks when HP low
  if(hp<0.65){
    const cr=Math.min(1,(0.65-hp)/0.65);
    ctx.strokeStyle=`rgba(60,25,25,${cr*0.9})`;ctx.lineWidth=1.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-4,-1);ctx.lineTo(2,6);ctx.lineTo(-1,12);ctx.stroke();
    if(hp<0.35){
      ctx.beginPath();ctx.moveTo(3,-16);ctx.lineTo(0,-9);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-3,-12);ctx.lineTo(3,-6);ctx.stroke();
    }
  }

  // Crystal orb glow aura
  const gc=hp>0.6?`rgba(120,80,255,${pulse*0.42})`
           :hp>0.3?`rgba(255,130,50,${pulse*0.55})`
           :`rgba(255,40,40,${pulse*0.65})`;
  const glow=ctx.createRadialGradient(0,-24,0,0,-24,20);
  glow.addColorStop(0,gc);glow.addColorStop(1,'rgba(120,80,255,0)');
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(0,-24,20,0,Math.PI*2);ctx.fill();

  // Orb body
  const oc=hp>0.6?['#ece0ff','#8055e0','#3010b0']
           :hp>0.3?['#ffe8c0','#e07820','#804000']
           :['#ffb0b0','#e02020','#800000'];
  const orbR=(7+Math.sin(animFrame*0.11)*0.8);
  const orb=ctx.createRadialGradient(-3,-27,1,-1,-25,orbR);
  orb.addColorStop(0,oc[0]);orb.addColorStop(0.6,oc[1]);orb.addColorStop(1,oc[2]);
  ctx.fillStyle=orb;ctx.beginPath();ctx.arc(0,-24,orbR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath();ctx.ellipse(-2,-27,2.5,1.8,-0.4,0,Math.PI*2);ctx.fill();

  // HP mini-bar (always visible, not just during wave)
  if(GS.farmHP<GS.farmMaxHP||GS.waveActive){
    const bw=36,bh=4;
    ctx.fillStyle='rgba(0,0,0,0.45)';ctx.beginPath();ctx.roundRect(-bw/2,22,bw,bh,2);ctx.fill();
    const bc=hp>0.6?'#60e060':hp>0.3?'#e0c030':'#ff3030';
    ctx.fillStyle=bc;ctx.beginPath();ctx.roundRect(-bw/2,22,Math.max(0,bw*hp),bh,2);ctx.fill();
  }

  ctx.restore();
}

// ── MONSTER PATH VISUALIZATION ─────────────────
function drawMonsterPaths(){
  if(!GS.waveActive&&!GS.buildMenuOpen&&!GS.buildSelected)return;
  const cx=camX(),cy=camY();
  const hx=curHX-cx,hy=curHY-cy;
  const pulse=0.55+0.3*Math.sin(animFrame*0.1);
  ctx.save();
  ctx.font='bold 12px sans-serif';ctx.textAlign='center';

  if(gameMode==='defense'){
    // Four cross-path corridors → castle
    const pathX=DEF_HX-cx, pathY=DEF_HY-cy;
    const corners=[
      {sx:pathX,       sy:2*TILE-cy,         mx:pathX,        my:pathY,    label:'북쪽'},
      {sx:pathX,       sy:(WH-3)*TILE-cy,    mx:pathX,        my:pathY,    label:'남쪽'},
      {sx:2*TILE-cx,   sy:pathY,             mx:pathX,        my:pathY,    label:'서쪽'},
      {sx:(WW-3)*TILE-cx,sy:pathY,           mx:pathX,        my:pathY,    label:'동쪽'},
    ];
    ctx.lineWidth=3;ctx.setLineDash([14,10]);ctx.lineDashOffset=-(animFrame*1.3%24);
    for(const s of corners){
      // Leg 1: spawn edge → cross join
      const ang1=Math.atan2(s.my-s.sy,s.mx-s.sx);
      ctx.strokeStyle=`rgba(255,70,50,${pulse*0.7})`;
      ctx.beginPath();ctx.moveTo(s.sx,s.sy);ctx.lineTo(s.mx,s.my);ctx.stroke();
      // Arrow at midpoint of leg
      const ax=(s.sx+s.mx)*0.5,ay=(s.sy+s.my)*0.5;
      ctx.setLineDash([]);
      ctx.save();ctx.translate(ax,ay);ctx.rotate(ang1);
      ctx.fillStyle=`rgba(255,100,60,${pulse})`;
      ctx.beginPath();ctx.moveTo(13,0);ctx.lineTo(-8,-7);ctx.lineTo(-8,7);ctx.closePath();ctx.fill();
      ctx.restore();
      ctx.setLineDash([14,10]);ctx.lineDashOffset=-(animFrame*1.3%24);
      // Spawn zone glow
      const rg=ctx.createRadialGradient(s.sx,s.sy,0,s.sx,s.sy,TILE*2.5);
      rg.addColorStop(0,`rgba(255,50,30,${pulse*0.25})`);rg.addColorStop(1,'rgba(255,50,30,0)');
      ctx.setLineDash([]);ctx.fillStyle=rg;ctx.beginPath();ctx.arc(s.sx,s.sy,TILE*2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=`rgba(255,210,190,${pulse})`;ctx.fillText(`⚠ ${s.label}`,s.sx,s.sy-TILE*1.8+4);
      ctx.setLineDash([14,10]);ctx.lineDashOffset=-(animFrame*1.3%24);
    }
    ctx.setLineDash([]);
  } else {
    // Farm mode spawn zones
    const spawns=[
      {wx:41*TILE,wy:16*TILE,label:'동쪽 출현'},
      {wx:19*TILE,wy:TILE,   label:'북쪽 출현'},
      {wx:19*TILE,wy:29*TILE,label:'남쪽 출현'},
    ];
    if(GS.waveNum>=10)spawns.push({wx:TILE,wy:16*TILE,label:'서쪽 출현'});
    for(const s of spawns){
      const sx=s.wx-cx,sy=s.wy-cy;
      const ang=Math.atan2(hy-sy,hx-sx);
      ctx.strokeStyle=`rgba(255,70,50,${pulse*0.7})`;
      ctx.lineWidth=2.5;ctx.setLineDash([14,10]);ctx.lineDashOffset=-(animFrame*1.3%24);
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(hx,hy);ctx.stroke();
      ctx.setLineDash([]);
      const ax=sx+(hx-sx)*0.62,ay=sy+(hy-sy)*0.62;
      ctx.save();ctx.translate(ax,ay);ctx.rotate(ang);
      ctx.fillStyle=`rgba(255,100,60,${pulse})`;
      ctx.beginPath();ctx.moveTo(13,0);ctx.lineTo(-8,-7);ctx.lineTo(-8,7);ctx.closePath();ctx.fill();
      ctx.restore();
      const rg=ctx.createRadialGradient(sx,sy,0,sx,sy,TILE*2.8);
      rg.addColorStop(0,`rgba(255,50,30,${pulse*0.28})`);rg.addColorStop(1,'rgba(255,50,30,0)');
      ctx.fillStyle=rg;ctx.beginPath();ctx.arc(sx,sy,TILE*2.8,0,Math.PI*2);ctx.fill();
      const lx=sx+Math.cos(ang+Math.PI)*TILE*3.2,ly=sy+Math.sin(ang+Math.PI)*TILE*3.2;
      ctx.fillStyle=`rgba(255,210,190,${pulse})`;ctx.fillText(`⚠ ${s.label}`,lx,ly+4);
    }
  }

  // Castle/statue target ring
  ctx.strokeStyle=`rgba(200,150,255,${pulse*0.85})`;
  ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(hx,hy,TILE*1.5,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=`rgba(200,150,255,${pulse*0.12})`;ctx.fill();
  ctx.fillStyle=`rgba(240,220,255,${pulse*0.9})`;
  ctx.font='bold 12px sans-serif';ctx.textAlign='center';
  ctx.fillText(gameMode==='defense'?'🏰 성채':'💎 석상',hx,hy-TILE*1.8);
  ctx.restore();
}

// ── PARTICLE SYSTEM ────────────────────────────
function spawnParticles(wx,wy,col,n=8){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=1+Math.random()*3;
    GS.parts.push({x:wx,y:wy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,life:1,col,size:3+Math.random()*4});
  }
}
function updateParticles(dt){
  GS.parts=GS.parts.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=dt*2;return p.life>0;
  });
}
function drawParticles(){
  GS.parts.forEach(p=>{
    ctx.globalAlpha=p.life;
    circ(p.x-camX(),p.y-camY(),p.size,p.col);
    ctx.globalAlpha=1;
  });
}

// ── WAVE SYSTEM ────────────────────────────────
function buildWave(n){
  const q=[];let t=0;
  function add(type,count,interval){for(let i=0;i<count;i++){q.push({type,delay:t});t+=interval;}}

  if(n<11){
    // 1~10웨이브: 기존 난이도
    add('slime',Math.min(3+n*2,18),2.5);
    if(n>=2)add('bat',Math.min(n,6),1.8);
    if(n>=4)add('goblin',Math.min(Math.floor(n/2),5),3);
    if(n>=7)add('skeleton',Math.min(Math.floor(n/3),4),4);
    if(n%5===0)q.push({type:'boss',delay:t+5});
  }else{
    // 11웨이브 이후: 대폭 강화
    const ex=n-10; // 초과 웨이브 수 (1부터)
    // 슬라임 — 계속 다수 스폰
    add('slime',Math.min(12+ex*2,30),1.8);
    // 박쥐 — 빠르게 다수
    add('bat',Math.min(6+ex,18),1.2);
    // 고블린
    add('goblin',Math.min(4+ex,14),2.2);
    // 해골
    add('skeleton',Math.min(2+Math.floor(ex*0.8),10),3);
    // 트롤 — 11웨이브부터
    add('troll',Math.min(1+Math.floor(ex/2),6),5);
    // 암흑 요정 — 13웨이브부터
    if(n>=13)add('darkelf',Math.min(Math.floor((n-12)*1.5),10),1.5);
    // 망령 — 15웨이브부터
    if(n>=15)add('wraith',Math.min(Math.floor((n-14)*1.2),8),3.5);
    // 보스 (5의 배수)
    if(n%5===0)q.push({type:'boss',delay:t+3});
    // 악마 — 20웨이브부터, 5의 배수마다
    if(n>=20&&n%5===0)q.push({type:'demon',delay:t+8});
  }
  return q;
}

function wavePreview(n){
  const q=buildWave(n);
  const counts={};
  for(const m of q)counts[m.type]=(counts[m.type]||0)+1;
  return Object.entries(counts).map(([t,c])=>`${MONSTER_TYPES[t].name}×${c}`).join('  ');
}

function startWave(){
  if(GS.waveActive||GS.waveTriggeredToday)return;
  GS.waveNum++;
  GS.waveActive=true;GS.waveTriggeredToday=true;
  GS.waveQueue=buildWave(GS.waveNum);
  GS.waveSpawnAcc=0;GS.waveAnnounce=3;
  notify(`⚔️ ${GS.waveNum}웨이브! 몬스터가 침략합니다!`,'#FF4060');
}

function spawnMonster(type){
  const def=MONSTER_TYPES[type];
  let sx,sy,wps=[];
  if(gameMode==='defense'){
    const side=Math.floor(Math.random()*4);
    if(side===0){sx=(2+Math.random()*(WW-4))*TILE;sy=2*TILE;       wps=[{x:DEF_HX,y:2*TILE}]}          // 북쪽
    else if(side===1){sx=(2+Math.random()*(WW-4))*TILE;sy=(WH-3)*TILE;wps=[{x:DEF_HX,y:(WH-3)*TILE}]} // 남쪽
    else if(side===2){sx=2*TILE;sy=(2+Math.random()*(WH-4))*TILE;  wps=[{x:2*TILE,y:DEF_HY}]}          // 서쪽
    else{sx=(WW-3)*TILE;sy=(2+Math.random()*(WH-4))*TILE;          wps=[{x:(WW-3)*TILE,y:DEF_HY}]}     // 동쪽
  } else {
    const sides=GS.waveNum>=11?4:3; // 11웨이브부터 서쪽 스폰 추가
    const side=Math.floor(Math.random()*sides);
    if(side===0){sx=(38+Math.random()*6)*TILE;sy=(4+Math.random()*24)*TILE}
    else if(side===1){sx=(4+Math.random()*34)*TILE;sy=1*TILE}
    else if(side===2){sx=(4+Math.random()*34)*TILE;sy=29*TILE}
    else{sx=1*TILE;sy=(4+Math.random()*24)*TILE}
  }
  const hpScale=GS.waveNum<11?1+GS.waveNum*0.15:1+GS.waveNum*0.22;
  const hp=Math.round(def.hp*hpScale);
  const n=GS.waveNum;
  const spdScale=n<11?1+n*0.04:1+n*0.07;
  const dmgScale=n<11?1+n*0.08:1+n*0.13;
  GS.monsters.push({
    type,x:sx,y:sy,hp,maxHp:hp,
    spd:def.spd*spdScale,
    dmg:def.dmg*dmgScale,
    reward:def.reward,col:def.col,size:def.size,
    id:Math.random()*9999|0,slowed:0,atkCd:0,atkAnim:0,houseAtkCd:0,
    waypoints:wps
  });
}

function updateWave(dt){
  if(GS.gameOver||GS.sleeping)return;
  // Wave trigger
  if(GS.day>=2&&GS.hour>=20&&!GS.waveActive&&!GS.waveTriggeredToday)startWave();
  if(!GS.waveActive)return;
  // Announce pause
  if(GS.waveAnnounce>0){GS.waveAnnounce-=dt;return}
  // Spawn queue
  GS.waveSpawnAcc+=dt;
  while(GS.waveQueue.length>0&&GS.waveSpawnAcc>=GS.waveQueue[0].delay){
    spawnMonster(GS.waveQueue.shift().type);
  }
  // Update monsters
  for(let i=GS.monsters.length-1;i>=0;i--){
    const m=GS.monsters[i];
    if(m.hp<=0){
      GS.money+=m.reward;
      spawnParticles(m.x,m.y,m.col,8);
      if(defSpeedMult===1){notify(`+${m.reward}G 👾`,'#FFD700');}
      else{GS._killGoldAcc=(GS._killGoldAcc||0)+m.reward;}
      GS.monsters.splice(i,1);continue;
    }
    const dx=curHX-m.x,dy=curHY-m.y,dist=Math.hypot(dx,dy);
    // Burn / poison DoT
    if(m.burn>0){m.hp-=8*dt;m.burn-=dt;}
    if(m.poison>0){m.hp-=5*dt;m.poison-=dt;}
    // Wall check
    let blockedByWall=false;
    for(let wi=GS.defenses.length-1;wi>=0;wi--){
      const d=GS.defenses[wi];
      if(d.type!=='wall'&&DEFENSE_DEFS[d.type]?.special!=='wall')continue;
      const wd=Math.hypot(d.x-m.x,d.y-m.y);
      if(wd<TILE*1.1){
        blockedByWall=true;
        m.atkCd-=dt;
        if(m.atkCd<=0){d.hp-=m.dmg;m.atkCd=1;m.atkAnim=0.45;}
        if(d.hp<=0){GS.defenses.splice(wi,1);notify('목책이 파괴되었습니다!','#FF8040')}
        break;
      }
    }
    if(!blockedByWall&&dist>2){
      const spd=m.spd*(m.slowed>0?0.45:1)*dt;
      // Waypoint navigation: align to cross path first
      let mvdx=dx,mvdy=dy,mvdist=dist;
      if(m.waypoints&&m.waypoints.length>0){
        const wp=m.waypoints[0];
        const wdx=wp.x-m.x,wdy=wp.y-m.y,wdist=Math.hypot(wdx,wdy);
        if(wdist<TILE*0.6){m.waypoints.shift();}
        else{mvdx=wdx;mvdy=wdy;mvdist=wdist;}
      }
      // Steer around walls
      let steerX=0,steerY=0;
      for(const wd of GS.defenses){
        if(wd.type!=='wall'&&DEFENSE_DEFS[wd.type]?.special!=='wall')continue;
        const wdx=m.x-wd.x,wdy=m.y-wd.y,wdist=Math.hypot(wdx,wdy);
        if(wdist>0&&wdist<TILE*2.2){
          const push=(TILE*2.2-wdist)/(TILE*2.2);
          steerX+=wdx/wdist*push;
          steerY+=wdy/wdist*push;
        }
      }
      const mvx=mvdx/(mvdist||1)+steerX*0.9;
      const mvy=mvdy/(mvdist||1)+steerY*0.9;
      const mvLen=Math.hypot(mvx,mvy)||1;
      m.x+=(mvx/mvLen)*spd;
      m.y+=(mvy/mvLen)*spd;
      // Trample crops
      m.trampleCd=(m.trampleCd||0)-dt;
      if(m.trampleCd<=0){
        const cr2=Math.floor(m.y/TILE),cc2=Math.floor(m.x/TILE);
        if(cr2>=0&&cr2<WH&&cc2>=0&&cc2<WW&&world.cd[cr2]&&world.cd[cr2][cc2]){
          world.cd[cr2][cc2]=null;
          m.trampleCd=0.6;
          notify('작물이 짓밟혔습니다! 🌾','#FF8040');
        }else{m.trampleCd=0.2;}
      }
    }
    if(m.slowed>0)m.slowed-=dt;
    if(m.atkAnim>0)m.atkAnim-=dt;
    // Reach house
    if(dist<TILE*1.6){
      GS.farmHP=Math.max(0,GS.farmHP-m.dmg*dt);
      m.houseAtkCd-=dt;
      if(m.houseAtkCd<=0){m.houseAtkCd=0.7;m.atkAnim=0.45;GS.statueHit=Math.min(1,GS.statueHit+0.35);}
      if(GS.farmHP<=0&&!GS.gameOver){
        GS.gameOver=true;
        notify('💎 석상이 파괴되었습니다!','#FF0000');
      }
    }
  }
  // Update defenses — auto attack
  for(let di=GS.defenses.length-1;di>=0;di--){
    const d=GS.defenses[di];
    if(d.hp<=0){GS.defenses.splice(di,1);continue}
    const def=DEFENSE_DEFS[d.type];
    if(!d.atkCd)d.atkCd=0;
    d.atkCd-=dt;
    if(d.atkFlash>0)d.atkFlash-=dt;
    const sp=def.special||'';
    if(d.type==='scarecrow'||sp==='slow_aura'){
      const lvl=d.level||1;
      const effAtk=def.atk*(1+(lvl-1)*0.4)*(1+GS.waveNum*0.05);
      for(const m of GS.monsters){
        if(Math.hypot(d.x-m.x,d.y-m.y)<def.range){
          m.slowed=0.6;
          m.hp-=effAtk*dt;
        }
      }
    } else if(sp==='wall'){
      // wall type: handled by monster collision above
    } else if(def.atk>0&&d.atkCd<=0){
      const lvl=d.level||1;
      const effRange=def.range*(1+(lvl-1)*0.12);
      const effAtk=def.atk*(1+(lvl-1)*0.4)*(1+GS.waveNum*0.05);
      let nearest=null,nearDist=Infinity;
      for(const m of GS.monsters){const md=Math.hypot(d.x-m.x,d.y-m.y);if(md<effRange&&md<nearDist){nearest=m;nearDist=md}}
      if(nearest){
        d.atkCd=Math.max(0.4,def.delay*(1-(lvl-1)*0.1));
        d.atkFlash=0.35;d.atkAng=Math.atan2(nearest.y-d.y,nearest.x-d.x);
        const isAoE=d.type==='cannon'||d.type==='magetower'||sp.includes('aoe');
        const DARK_TYPES=['demon','boss','skeleton','wraith'];
        const holyMult=(sp.includes('holy')&&DARK_TYPES.includes(nearest.type))?1.8:1;
        const pierceMult=sp==='pierce'||sp==='pierce_aoe'?1.4:1;
        const finalAtk=effAtk*holyMult*pierceMult;
        if(isAoE){
          const aoeR=TILE*(d.type==='cannon'?1.8:d.type==='magetower'?2.5:def.range*0.4/TILE)*(1+(lvl-1)*0.15);
          GS.monsters.forEach(m=>{
            if(Math.hypot(nearest.x-m.x,nearest.y-m.y)<aoeR){
              const hm=(sp.includes('holy')&&DARK_TYPES.includes(m.type))?1.8:1;
              m.hp-=finalAtk*hm/holyMult; // re-apply per-monster holy mult
              if(sp.includes('burn'))m.burn=Math.max(m.burn||0,2.5);
              if(sp.includes('poison'))m.poison=Math.max(m.poison||0,3);
              if(sp.includes('push')){const pdx=m.x-d.x,pdy=m.y-d.y,pl=Math.hypot(pdx,pdy)||1;m.x+=pdx/pl*TILE*1.5;m.y+=pdy/pl*TILE*1.5;}
            }
          });
          if(sp.includes('drain'))GS.farmHP=Math.min(GS.farmMaxHP,GS.farmHP+finalAtk*0.1);
        } else {
          nearest.hp-=finalAtk;
          if(sp.includes('burn'))nearest.burn=Math.max(nearest.burn||0,2.5);
          if(sp.includes('poison'))nearest.poison=Math.max(nearest.poison||0,3);
          if(sp==='push'){{const pdx=nearest.x-d.x,pdy=nearest.y-d.y,pl=Math.hypot(pdx,pdy)||1;nearest.x+=pdx/pl*TILE*2;nearest.y+=pdy/pl*TILE*2;}}
          if(sp.includes('drain'))GS.farmHP=Math.min(GS.farmMaxHP,GS.farmHP+finalAtk*0.18);
          // Chain lightning
          if(sp==='chain'){
            let cc=def.chainCount||2,last=nearest;
            const visited=new Set([nearest]);
            while(cc-->0){
              let ct=null,cd2=Infinity;
              for(const m of GS.monsters){if(visited.has(m))continue;const d2=Math.hypot(m.x-last.x,m.y-last.y);if(d2<TILE*5&&d2<cd2){ct=m;cd2=d2;}}
              if(!ct)break;
              visited.add(ct);
              ct.hp-=finalAtk*0.55;
              if(sp.includes('burn'))ct.burn=Math.max(ct.burn||0,1.5);
              GS.projectiles.push({x:last.x,y:last.y,tx:ct.x,ty:ct.y,type:d.type,life:0.5,spd:14});
              last=ct;
            }
          }
        }
        const pSpd=d.type==='archer'?11:sp==='chain'?18:sp.includes('push')?13:9;
        GS.projectiles.push({x:d.x,y:d.y,tx:nearest.x,ty:nearest.y,type:d.type,life:1,spd:pSpd});
      }
    }
  }
  // Projectile movement
  for(let i=GS.projectiles.length-1;i>=0;i--){
    const p=GS.projectiles[i];
    const dx=p.tx-p.x,dy=p.ty-p.y,dist=Math.hypot(dx,dy);
    if(dist<p.spd||p.life<=0){GS.projectiles.splice(i,1);continue}
    p.x+=dx/dist*p.spd;p.y+=dy/dist*p.spd;p.life-=0.018;
  }
  // Wave complete
  if(GS.waveQueue.length===0&&GS.monsters.length===0){
    GS.waveActive=false;
    GS.wavesCleared=(GS.wavesCleared||0)+1;
    checkQuestProgress();
    const bonus=GS.waveNum*80;
    GS.money+=bonus;
    // Restore statue HP: 5HP per wave, max up to 40HP
    const healAmt=Math.min(GS.farmMaxHP-GS.farmHP, Math.min(40, GS.waveNum*5));
    if(healAmt>0) GS.farmHP=Math.min(GS.farmMaxHP,GS.farmHP+healAmt);
    const healMsg=healAmt>0?` | 석상 +${Math.floor(healAmt)}HP`:'';
    notify(`✨ ${GS.waveNum}웨이브 클리어! +${bonus}G${healMsg}`,'#FFD700');
    if(gameMode==='defense'){
      GS.waveTriggeredToday=false; // allow next wave via N key
      notify('N키로 다음 웨이브를 시작하세요.','#c080ff');
    } else {
      const seedBonus=(['parsnip_seed','turnip_seed','potato_seed','corn_seed','strawberry_seed'])[GS.waveNum%5];
      const seedQty=1+Math.floor(GS.waveNum/4);
      addItem(seedBonus,seedQty);
      notify(`🎁 씨앗 보너스: ${ITEM_META[seedBonus]?.name||seedBonus} ×${seedQty}`,'#90EE90');
    }
    spawnParticles(GS.px,GS.py,'#FFD700',30);
  }
}

function canPlaceDefense(wx,wy){
  const c=Math.floor(wx/TILE),r=Math.floor(wy/TILE);
  if(r<1||r>=WH-1||c<1||c>=WW-1)return false;
  const t=world.tiles[r][c];
  return [T.GRASS,T.DIRT,T.PATH,T.TILLED,T.WET,T.FLOOR,T.SAND].includes(t);
}

// ── RAIN PARTICLES ─────────────────────────────
const RAIN=[];
function updateRain(){
  if(GS.weather!=='rain')return;
  while(RAIN.length<120)RAIN.push({x:Math.random()*W,y:Math.random()*H,s:2+Math.random()*3});
  RAIN.forEach(r=>{r.x-=0.5;r.y+=6+r.s;if(r.y>H){r.y=0;r.x=Math.random()*W}});
}
function drawRain(){
  if(GS.weather!=='rain')return;
  ctx.strokeStyle='rgba(150,200,255,0.4)';ctx.lineWidth=1.2;
  RAIN.forEach(r=>{ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x-3,r.y-10);ctx.stroke()});
}

// ── CAMERA ─────────────────────────────────────
let camTX=0,camTY=0,camCX=0,camCY=0;
function camX(){return camCX}
function camY(){return camCY}
function updateCam(){
  const tx=GS.px-W/2,ty=GS.py-H/2;
  const maxX=WW*TILE-W,maxY=WH*TILE-H;
  camTX=Math.max(0,Math.min(maxX,tx));
  camTY=Math.max(0,Math.min(maxY,ty));
  camCX+=(camTX-camCX)*0.12;
  camCY+=(camTY-camCY)*0.12;
}

// ── FACING TILE ────────────────────────────────
function facingTile(){
  const tc=Math.floor(GS.px/TILE),tr=Math.floor(GS.py/TILE);
  const D=[[0,-1],[1,0],[0,1],[-1,0]]; // up right down left
  const [dc,dr]=D[GS.dir]||[0,1];
  return {r:tr+dr,c:tc+dc};
}

// ── TOOLS ──────────────────────────────────────
function useTool(){
  if(GS.energy<=0){notify('에너지가 부족합니다!','#FF6B6B');return}
  const tool=GS.bar[GS.slot];
  if(!tool)return;
  const {r,c}=facingTile();
  if(r<0||r>=WH||c<0||c>=WW)return;
  const t=world.tiles[r][c];
  const cr=world.cd[r][c];

  if(tool==='hoe'){
    if(t===T.DIRT){
      world.tiles[r][c]=T.TILLED;
      costEnergy(2);spawnHoeEffect(c,r);
      notify('땅을 갈았습니다.','#A0C870');
    } else if(t===T.GRASS){
      world.tiles[r][c]=T.DIRT;
      costEnergy(2);spawnHoeEffect(c,r);
    }
  } else if(tool==='watering_can'){
    if(GS.waterCan<=0){notify('물통이 비었습니다! 우물에서 채우세요.','#6BC4FF');return}
    if(t===T.TILLED&&!cr){
      world.tiles[r][c]=T.WET;
      GS.waterCan--;costEnergy(2);
      notify('물을 주었습니다.','#6BC4FF');
      GS.watered++;checkQuestProgress();
    } else if(cr&&!cr.watered){
      cr.watered=true;GS.waterCan--;costEnergy(2);
      notify('작물에 물을 주었습니다.','#6BC4FF');
      GS.watered++;checkQuestProgress();
    } else if(t===T.WELL||t===T.WATER){
      GS.waterCan=GS.maxWater;
      notify('물통을 채웠습니다! 💧','#6BC4FF');
    }
  } else if(tool==='sickle'){
    if(t===T.TALL){
      // Herb collection from tall grass
      world.tiles[r][c]=T.GRASS;
      const herbQty=1+(Math.random()<0.4?1:0);
      addItem('herb',herbQty);addItem('fiber',1);
      costEnergy(2);spawnParticles(c*TILE+TILE/2,r*TILE+TILE/2,'#90EE90',6);
      notify(`약초 ${herbQty}개 채집! 🌿`,'#90EE90');
    } else if(cr&&cr.stage>=CROPS[cr.key].days){
      const def=CROPS[cr.key];
      const qty=1+(GS.energy>50?Math.random()<0.3?1:0:0);
      addItem(cr.key,qty);
      spawnParticles(c*TILE+TILE/2,r*TILE+TILE/2,def.color,10);
      world.cd[r][c]=null;
      const wet=world.tiles[r][c]===T.TILLED||world.tiles[r][c]===T.WET;
      world.tiles[r][c]=wet?T.TILLED:T.DIRT;
      costEnergy(1);
      notify(`${def.name} 수확! +${qty}개 🌾`,'#FFD700');
      GS.harvested+=qty;checkQuestProgress();
    } else if(!cr){
      notify('수확할 작물이 없습니다.','#999');
    } else {
      notify('아직 다 자라지 않았습니다.','#FFB300');
    }
  } else if(tool==='fertilizer'){
    // Apply fertilizer: advance crop stage +1, or wet a tilled tile
    if(cr&&cr.stage<CROPS[cr.key].days){
      cr.stage=Math.min(cr.stage+1,CROPS[cr.key].days);
      removeItem('fertilizer',1);
      spawnParticles(c*TILE+TILE/2,r*TILE+TILE/2,'#8BC34A',8);
      notify('비료 사용! 작물 성장 +1 🌿','#8BC34A');
    } else if(t===T.TILLED||t===T.WET){
      world.tiles[r][c]=T.WET;
      removeItem('fertilizer',1);
      notify('비료로 땅을 비옥하게 했습니다 🌿','#8BC34A');
    } else {
      notify('작물이 심긴 곳에 사용하세요.','#FFB300');
    }
  } else if(tool==='energy_potion'){
    GS.energy=Math.min(GS.maxEnergy,GS.energy+40);
    removeItem('energy_potion',1);
    spawnParticles(GS.px,GS.py,'#90EE90',10);
    notify('에너지 포션 사용! +40 에너지 🧪','#90EE90');
  } else if(tool==='axe'){
    if(t===T.TREE){
      world.tiles[r][c]=T.STUMP;
      addItem('wood',2+Math.floor(Math.random()*3));
      costEnergy(5);spawnParticles(c*TILE+TILE/2,r*TILE+TILE/2,'#8B5230',6);
      notify('나무를 베었습니다. 🪵','#8B5230');
    } else if(t===T.STUMP){
      world.tiles[r][c]=T.GRASS;
      addItem('wood',1);costEnergy(3);
    }
  } else if(tool==='pickaxe'){
    if(t===T.ROCK){
      world.tiles[r][c]=T.GRASS;
      const stoneQty=2+Math.floor(Math.random()*3);
      addItem('stone',stoneQty);
      // Low chance for iron ore in forest/mine area (rows 33+)
      if(r>=33&&Math.random()<0.25){addItem('iron_ore',1);notify('철광석 발견! ⛏️','#C0C0C0')}
      costEnergy(5);spawnParticles(c*TILE+TILE/2,r*TILE+TILE/2,'#A0B0C0',6);
      notify(`돌 ${stoneQty}개 채취 🪨`,'#A0B0C0');
    }
  } else if(tool==='fishing_rod'){
    if(t===T.WATER||t===T.DEEP){
      doFish();
    } else {
      notify('물가에서 사용하세요. 🎣','#6BC4FF');
    }
  } else if(tool.endsWith('_seed')){
    const key=tool.replace('_seed','');
    if(!CROPS[key]){return}
    if((GS.inv[tool]||0)<=0){notify('씨앗이 없습니다!','#FF9800');return}
    if(t===T.TILLED||t===T.WET){
      if(cr){notify('이미 작물이 있습니다.','#FF9800');return}
      const def=CROPS[key];
      if(!def.seasons.includes(GS.season)){
        notify(`${SEASONS[GS.season]}에는 심을 수 없는 작물입니다.`,'#FF6B6B');return}
      world.cd[r][c]={key,stage:0,watered:t===T.WET};
      world.tiles[r][c]=T.TILLED;
      removeItem(tool,1);costEnergy(1);
      notify(`${def.name} 씨앗을 심었습니다! 🌱`,'#8BC34A');
    } else {
      notify('갈아놓은 땅에 심으세요.','#FFB300');
    }
  }
}

function spawnHoeEffect(c,r){
  spawnParticles(c*TILE+TILE/2,r*TILE+TILE/2,'#8B6914',6);
}

const FISH_TABLE=[
  {name:'잉어',icon:'🐟',weight:0.5,sell:30},{name:'붕어',icon:'🐡',weight:0.25,sell:70},
  {name:'메기',icon:'🦈',weight:0.1,sell:200},{name:'뱀장어',icon:'🐍',weight:0.1,sell:85},

  setTimeout(()=>{

      GS.fishedCount=(GS.fishedCount||0)+1;checkQuestProgress();
      notify(`${f.icon} ${f.name} 낚았다! (${f.sell}G)`,'#6BC4FF');
      spawnParticles(GS.px,GS.py,'#6BC4FF',6);return}}
    notify('이번엔 놓쳤어요...','#999');
  },800);
  notify('낚시 중... 🎣','#6BC4FF');
}

function addItem(key,qty=1,meta=null){
  if(meta&&!ITEM_META[key])ITEM_META[key]=meta;
  GS.inv[key]=(GS.inv[key]||0)+qty;
}
function removeItem(key,qty=1){
  GS.inv[key]=Math.max(0,(GS.inv[key]||0)-qty);
  if(GS.inv[key]===0)delete GS.inv[key];
}
function costEnergy(n){
  GS.energy=Math.max(0,GS.energy-n);
}
function notify(txt,col='#FFE08A'){
  GS.notes.push({txt,timer:3,col});
  if(GS.notes.length>4)GS.notes.shift();
}

// ── INTERACTION ────────────────────────────────
function interact(){
  // Check NPC proximity
  for(let i=0;i<GS.npcs.length;i++){
    const npc=GS.npcs[i];
    const nx=npc.ox*TILE+24,ny=npc.oy*TILE+24;
    const dist=Math.hypot(GS.px-nx,GS.py-ny);
    if(dist<TILE*1.5){
      if(npc.isShop){openShop(i);return}
      if(npc.isSmith){GS.smithOpen=true;GS.smithIdx=0;return}
      if(npc.isClinic){GS.clinicOpen=true;GS.clinicIdx=0;return}
      if(npc.isMayor){
        // Refresh daily orders if needed
        if(GS.dailyOrderDay!==GS.day){GS.dailyOrders=buildDailyOrders();GS.dailyOrderDay=GS.day}
        GS.mayorOpen=true;GS.mayorIdx=0;return;
      }
      openDialog(i);return;
    }
  }
  // Check barn door
  const barnDoor=Math.hypot(GS.px-31*TILE,GS.py-24*TILE);
  if(barnDoor<TILE*2){openBarn();return}
  // Check chest
  const {r,c}=facingTile();
  if(world.tiles[r][c]===T.CHEST&&!GS.chestLooted){
    GS.chestLooted=true;
    addItem('parsnip_seed',5);addItem('turnip_seed',3);addItem('wood',8);
    notify('상자를 열었습니다! 씨앗과 나무를 얻었습니다. 🎁','#FFD700');
    spawnParticles(c*TILE+24,r*TILE+24,'#FFD700',14);
    world.tiles[r][c]=T.GRASS;
  }
}

function tryCompleteNpcQuest(npc,quest,lines){
  if(!quest||!quest.given||quest.done)return false;
  const canDo=Object.entries(quest.need).every(([k,v])=>(GS.inv[k]||0)>=v);
  if(canDo){
    Object.entries(quest.need).forEach(([k,v])=>removeItem(k,v));
    GS.money+=quest.reward.money;
    if(quest.reward.item){addItem(quest.reward.item,quest.reward.qty||1);}
    quest.done=true;
    const extra=quest.reward.item?` + ${ITEM_META[quest.reward.item]?.name||quest.reward.item} ×${quest.reward.qty||1}`:'';
    lines.push(`고마워요! 보상으로 ${quest.reward.money}G${extra}를 드릴게요!`);
    spawnParticles(npc.ox*TILE+24,npc.oy*TILE+24,'#FFD700',14);
    return true;
  }
  return false;
}

function openDialog(i){
  const npc=GS.npcs[i];
  const lines=[npc.lines[npc.lineIdx%npc.lines.length]];
  npc.lineIdx++;

  // Chain quests: q1 → q2 → q3 for 할머니
  const quests=[npc.quest,npc.quest2,npc.quest3].filter(Boolean);
  let questHandled=false;
  for(const q of quests){
    if(q.done)continue;
    if(!q.given){
      q.given=true;
      lines.push(`[의뢰] ${q.title}`);
      lines.push(q.desc);
      lines.push('도와줄 수 있겠니?');
      questHandled=true;break;
    } else {
      const done=tryCompleteNpcQuest(npc,q,lines);
      if(!done){
        // Check partial progress
        const prog=Object.entries(q.need).map(([k,v])=>`${ITEM_META[k]?.name||k}: ${GS.inv[k]||0}/${v}`).join(', ');
        lines.push(`아직 다 모으지 못했구나. (${prog})`);
      }
      questHandled=true;break;
    }
  }
  GS.dialog={lines,page:0,npcIdx:i};
}

function openShop(i){GS.shopOpen=true;GS.shopTab='buy';GS.dialog=null}

function openBarn(){GS.barnOpen=true;GS.barnIdx=0;GS.dialog=null}

function collectBarnProduct(a){
  if(!a.product)return false;
  const key=a.type==='chicken'?'egg':a.type==='cow'?'milk':'wool';
  addItem(key,1);a.product=false;
  GS.animalProductCount=(GS.animalProductCount||0)+1;
  checkQuestProgress();
  return true;
}

// ── QUEST PROGRESS ─────────────────────────────
function checkQuestProgress(){
  GS.quests.forEach(q=>{
    if(q.done)return;
    let prog=0;
    if(q.type==='harvest')prog=GS.harvested;
    if(q.type==='water')prog=GS.watered;
    if(q.type==='money')prog=GS.money;
    if(q.type==='fish')prog=GS.fishedCount||0;
    if(q.type==='wave')prog=GS.wavesCleared||0;
    if(q.type==='animal')prog=GS.animalProductCount||0;
    if(q.type==='craft')prog=GS.craftedCount||0;
    q.prog=prog;
    if(prog>=q.target){
      q.done=true;GS.money+=q.reward.money;
      notify(`퀘스트 완료: ${q.title}! +${q.reward.money}G 🏆`,'#FFD700');
      spawnParticles(GS.px,GS.py,'#FFD700',16);
    }
  });
}

// ── DAY SYSTEM ─────────────────────────────────
function advanceDay(){
  GS.sleeping=true;GS.sleepT=0;
}

function doSleep(){
  // Grow crops
  for(let r=0;r<WH;r++){
    for(let c=0;c<WW;c++){
      const cr=world.cd[r][c];
      if(!cr)continue;
      if(cr.watered){cr.stage++;cr.watered=false}
      // Reset wet tile to tilled
      if(world.tiles[r][c]===T.WET)world.tiles[r][c]=T.TILLED;
    }
  }
  // Animals produce (only if fed)
  GS.animals.forEach(a=>{
    if(a.fed!==false){
      a.dayTimer--;
      if(a.dayTimer<=0){
        a.product=true;
        a.dayTimer={chicken:1,cow:2,sheep:3}[a.type]||2;
      }
    }
    a.fed=false; // reset for new day
  });
  // Advance time
  GS.day++;
  if(GS.day>28){
    GS.day=1;GS.season=(GS.season+1)%4;
    if(GS.season===0)GS.year++;
    // Kill out-of-season crops
    for(let r=0;r<WH;r++){
      for(let c=0;c<WW;c++){
        const cr=world.cd[r][c];
        if(cr&&!CROPS[cr.key].seasons.includes(GS.season)){
          world.cd[r][c]=null;world.tiles[r][c]=T.DIRT;
        }
      }
    }
    notify(`${SEASONS[GS.season]}이 시작되었습니다! 🌿`,'#FFE08A');
  }
  // Weather
  GS.weather=Math.random()<0.3?'rain':'sunny';
  // Reset wave trigger for new day
  GS.waveTriggeredToday=false;
  GS.monsters=[];GS.projectiles=[];
  // Restore
  GS.energy=GS.maxEnergy;GS.waterCan=GS.maxWater;
  GS.hour=6;GS.minute=0;GS.days++;
  checkQuestProgress();
  // Auto-save on sleep
  saveGame(true);
  notify('💾 자동저장 완료','#4CAF50');
}

    const hasProduct=a.product;
    const isFed=a.fed!==false;
    const hasFeed=(GS.inv['animal_feed']||0)>0;

    // Row background (draw first, then text, then buttons on top — keep text on LEFT only)
    ctx.fillStyle=focused?'rgba(255,210,140,0.9)':'rgba(255,230,180,0.7)';
    ctx.beginPath();ctx.roundRect(ROW_X,by,ROW_W,ROW_H,12);ctx.fill();
    ctx.strokeStyle=focused?'#c98040':'rgba(180,130,60,0.3)';
    ctx.lineWidth=focused?2:1;
    ctx.beginPath();ctx.roundRect(ROW_X,by,ROW_W,ROW_H,12);ctx.stroke();

    // Animal emoji (leftmost)
    ctx.font='32px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(EMOJI[a.type]||'🐾',ROW_X+28,by+ROW_H/2);
    ctx.textBaseline='alphabetic';

    // Text block — constrained to left 230px to never reach button zone
    const TXT_X=ROW_X+58;
    txt(LABEL[a.type]||a.type, TXT_X, by+28, 16, '#5a2a00');
    txt(isFed?'🍽️ 먹이 OK':'⚠️ 굶주림', TXT_X, by+48, 12, isFed?'#2e7d32':'#c62828');
    const dayInfo=hasProduct?'수집 대기 중!':isFed?`${a.dayTimer||0}일 후 생산`:'먹이 필요';
    txt(dayInfo, TXT_X, by+66, 11, hasProduct?'#f8a030':isFed?'#7b5500':'#999');

    // Button zone — right side, starts at ROW_X+270 = px+284
    const BTN_RIGHT=ROW_X+ROW_W-8; // px+518
    const BTN_Y=by+(ROW_H-42)/2;   // vertically centered, height=42

    // Feed button (68px wide) — shown when not fed
    if(!isFed){
      const fbx=BTN_RIGHT-68;
      rr(fbx,BTN_Y,68,42,21,hasFeed?'#6aad3d':'#bbb');
      txt(hasFeed?'🌾 먹이':'먹이없음',fbx+34,BTN_Y+27,12,hasFeed?'#fff':'#888','center');
      if(hasFeed)GS._barnBtns.push({type:'feed',animalIdx:i,x:fbx,y:BTN_Y,w:68,h:42});
    }

    // Collect button (118px wide) — shown when product ready
    // Placed left of feed button (or right-aligned if no feed)
    if(hasProduct){
      const cbx=isFed ? BTN_RIGHT-118 : BTN_RIGHT-68-10-118;
      rr(cbx,BTN_Y,118,42,21,'#f8a030');
      txt(PROD_NAME[a.type]+' 수집',cbx+59,BTN_Y+27,12,'#fff','center');
      GS._barnBtns.push({type:'collect',animalIdx:i,x:cbx,y:BTN_Y,w:118,h:42});
    }
  });

  // Buy animals
  const ownsCow=GS.animals.some(a=>a.type==='cow');
  const ownsSheep=GS.animals.some(a=>a.type==='sheep');
  const buys=[];
  if(!ownsCow)buys.push({type:'cow',label:'🐄 소 구입',cost:2000});
  if(!ownsSheep)buys.push({type:'sheep',label:'🐑 양 구입',cost:1500});
  if(buys.length>0){
    const shopY=ROW_TOP+GS.animals.length*(ROW_H+ROW_GAP)+4;
    txt('── 동물 구입 ──',px+pw/2,shopY+18,13,'#8b6010','center');
    buys.forEach((b,i)=>{
      const bbx=px+20+i*250,bby=shopY+26;
      const canAfford=GS.money>=b.cost;
      rr(bbx,bby,228,44,22,canAfford?'#6b8c3a':'#aaa');
      txt(`${b.label} (${b.cost.toLocaleString()}G)`,bbx+114,bby+28,13,'#fff','center');
      GS._barnBtns.push({type:'buy',animalType:b.type,cost:b.cost,x:bbx,y:bby,w:228,h:44});
    });
  }

  ctx.fillStyle='rgba(200,160,80,0.7)';ctx.beginPath();ctx.roundRect(px,py+ph-38,pw,38,12);ctx.fill();
  ctx.fillStyle='#5a3800';ctx.font='12px "Malgun Gothic"';ctx.textAlign='center';
  ctx.fillText('먹이를 주면 다음날 산물 생산   |   먹이 없으면 생산 없음',px+pw/2,py+ph-14);

}

// ── DIALOG UI ──────────────────────────────────
function renderDialog(){
  const d=GS.dialog;if(!d)return;
  const npc=GS.npcs[d.npcIdx];
  const style=NPC_STYLES[d.npcIdx];
  const pw=W*0.55,ph=136;
  const dpx=(W-pw)/2,dpy=H-ph-18;

  // Main bubble
  ctx.fillStyle='rgba(255,240,250,0.97)';ctx.beginPath();ctx.roundRect(dpx,dpy,pw,ph,18);ctx.fill();
  ctx.strokeStyle=style.bow+'90';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(dpx,dpy,pw,ph,18);ctx.stroke();

  // Name badge — use npc.color (always dark enough for white text)
  ctx.fillStyle=npc.color;ctx.beginPath();ctx.roundRect(dpx+14,dpy-14,90,28,14);ctx.fill();
  ctx.strokeStyle=style.bow;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(dpx+14,dpy-14,90,28,14);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 14px "Malgun Gothic"';ctx.textAlign='left';ctx.fillText(npc.name,dpx+22,dpy+6);

  // Hint
  ctx.font='11px "Malgun Gothic"';ctx.fillStyle='rgba(180,120,160,0.7)';ctx.textAlign='right';
  ctx.fillText('Space / Enter 다음',dpx+pw-14,dpy+20);

  // Dialog text
  const line=d.lines[d.page]||'';
  ctx.fillStyle='#604060';ctx.font='15px "Malgun Gothic"';ctx.textAlign='left';
  // Word wrap basic
  const words=line.split('');let row='';let rowY=dpy+62;
  for(const ch of words){
    const test=row+ch;
    if(ctx.measureText(test).width>pw-36){ctx.fillText(row,dpx+18,rowY);row=ch;rowY+=24}
    else row=test;
  }
  ctx.fillText(row,dpx+18,rowY);

  // Next arrow
  if(d.page<d.lines.length-1){
    ctx.fillStyle=style.bow;ctx.font='20px serif';ctx.textAlign='right';ctx.fillText('▶',dpx+pw-14,dpy+ph-14);
  } else {
    ctx.fillStyle='rgba(180,120,160,0.5)';ctx.font='12px "Malgun Gothic"';ctx.textAlign='right';
    ctx.fillText('[ 닫기 ]',dpx+pw-14,dpy+ph-14);
  }
}

    ctx.fillStyle='#ffe0f8';ctx.textAlign='center';ctx.fillText(hint,W/2,hy+16);
  }

  // Notifications
  // (notifications rendered globally via renderNotifications)

  // Sleep hint
  if(GS.hour%24>=20&&!GS.sleeping){
    const sw=190;

    ctx.fillText('Z — 수면하기 💤',W-sw/2-14,H-38);
  }

  // Quest panel — QUEST_DEFS + NPC quests
  const defQuests=GS.quests.filter(q=>!q.done).slice(0,2);
  const npcQuests=[];GS.npcs.forEach(n=>{[n.quest,n.quest2,n.quest3].forEach(q=>{if(q&&q.given&&!q.done)npcQuests.push(q)})});
  const allActiveQ=[...defQuests,...npcQuests].slice(0,3);
  if(allActiveQ.length>0){
    const qw=230;
