      ctx.fillStyle='#b03080';ctx.font='bold 12px "Malgun Gothic"';ctx.textAlign='left';ctx.fillText('📋 '+q.title,W-qw-6,qy+18);
      ctx.fillStyle='#808090';ctx.font='11px "Malgun Gothic"';ctx.fillText(q.desc||'',W-qw-6,qy+34);
      // progress bar — QUEST_DEFS use prog/target; NPC quests use need dict
      let prog=0,total=1;
      if(q.need){
        // NPC quest
        const entries=Object.entries(q.need);
        total=entries.reduce((s,[,v])=>s+v,0);
        prog=entries.reduce((s,[k,v])=>s+Math.min(GS.inv[k]||0,v),0);
      } else if(q.target!==undefined){
        prog=Math.min(q.prog||0,q.target);total=q.target;
      }
      const qpW=qw-16;
      ctx.fillStyle='rgba(220,180,220,0.4)';ctx.beginPath();ctx.roundRect(W-qw-6,qy+42,qpW,8,4);ctx.fill();
      if(total>0){
        ctx.fillStyle='#f060a0';ctx.beginPath();ctx.roundRect(W-qw-6,qy+42,qpW*(Math.min(prog,total)/total),8,4);ctx.fill();
      }
      ctx.fillStyle='#b03080';ctx.font='10px "Malgun Gothic"';ctx.fillText(`${prog}/${total}`,W-qw-6+qpW+4,qy+50);
    });
  }
}

  // Farm HP bar
  const bw=160,bh=14,bx=10,by=58;

  if(GS.waveNum>0||GS.waveActive){

    const ws=GS.waveActive?`⚔️ 웨이브 ${GS.waveNum}  👾×${GS.monsters.length}`:

  // Next wave preview (when wave not active and before wave starts today)
  if(!GS.waveActive&&!GS.waveTriggeredToday&&GS.day>=1){

      ctx.fillStyle='#e0c0ff';ctx.textAlign='center';ctx.fillText(hs,14+hw/2,H-88);
    }

  // Placement mode hint
  if(GS.buildSelected&&!GS.buildMenuOpen){
    const hs='F: 바라보는 곳에 건설  |  클릭: 원하는 위치  |  Esc: 취소';
    ctx.font='bold 12px "Malgun Gothic"';
    const hw=ctx.measureText(hs).width+28;
    ctx.fillStyle='rgba(80,50,180,0.9)';ctx.beginPath();ctx.roundRect(W/2-hw/2,H-72,hw,34,17);ctx.fill();
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText(hs,W/2,H-49);
  }

  // Wave announce banner
  if(GS.waveAnnounce>0){
    const alpha=Math.min(1,GS.waveAnnounce);
    ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(70,0,10,0.75)';ctx.fillRect(0,H/2-64,W,128);
    txtShadow(`⚔️ 웨이브 ${GS.waveNum}`,W/2,H/2-12,38,'#FF8080','rgba(0,0,0,0.5)','center');
    txtShadow('석상을 노린 몬스터가 나타났습니다!',W/2,H/2+32,22,'#FFCCCC','rgba(0,0,0,0.5)','center');
    ctx.globalAlpha=1;
  }
}

  GS._speedBtn={x:248,y:10,w:64,h:36};

  ctx.font='11px "Malgun Gothic"';ctx.textAlign='left';ctx.fillStyle='rgba(180,150,255,0.8)';

}

// ── WORLD RENDERER ─────────────────────────────
function renderWorld(){
  const cx=camX(),cy=camY();
  const startC=Math.max(0,Math.floor(cx/TILE)-1);
  const endC=Math.min(WW-1,startC+Math.ceil(W/TILE)+2);
  const startR=Math.max(0,Math.floor(cy/TILE)-1);
  const endR=Math.min(WH-1,startR+Math.ceil(H/TILE)+2);

  for(let r=startR;r<=endR;r++){
    for(let c=startC;c<=endC;c++){
      const sx=c*TILE-cx,sy=r*TILE-cy;
      drawTile(r,c,sx,sy,GS.season);
    }
  }
}

// ── SKY BACKGROUND — Kawaii Pastel ─────────────
function renderSky(){
  const p=SPAL[GS.season];
  const h=GS.hour%24;

  // Gradient sky by time
  const SKY={
    day:p.sky, dawn:p.sky2, dusk:'#f8c0d8', night:'#2a1a3e'
  };
  let skyTop,skyBot;
  if(h>=6&&h<8){skyTop=SKY.dawn;skyBot=p.sky2}
  else if(h>=8&&h<18){skyTop=p.sky;skyBot=p.sky+'cc'}
  else if(h>=18&&h<20){skyTop='#f8a0c0';skyBot='#f0c0e0'}
  else{skyTop='#2a1a3e';skyBot='#3a2050'}

  const skyG=ctx.createLinearGradient(0,0,0,H*0.7);
  skyG.addColorStop(0,skyTop);skyG.addColorStop(1,skyBot);
  ctx.fillStyle=skyG;ctx.fillRect(0,0,W,H);

  // Stars / sparkles at night
  if(h<6||h>=20){
    for(let i=0;i<100;i++){
      const sx=(i*173+31)%W,sy=(i*97+17)%(H*0.65);
      const pulse=Math.sin(animFrame*0.04+i*0.7)*0.4+0.6;
      ctx.globalAlpha=pulse*0.9;
      // Cute star shape
      if(i%4===0){ctx.fillStyle='#ffe8ff';ctx.font='10px serif';ctx.textAlign='center';ctx.fillText('✦',sx,sy)}
      else{ctx.fillStyle='#ffffff';ctx.fillRect(sx,sy,1.5,1.5)}
    }
    ctx.globalAlpha=1;
    // Moon — cute crescent with face
    const moonX=W*0.82,moonY=H*0.14;
    circ(moonX,moonY,18,'#fff8d0');
    circ(moonX+7,moonY-4,14,'#2a1a3e'); // crescent cut
    ctx.fillStyle='rgba(255,220,100,0.6)';
    circ(moonX-4,moonY+6,2,'rgba(200,180,80,0.5)');// face dot
    ctx.strokeStyle='rgba(200,180,80,0.6)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(moonX-6,moonY+8,3,0.2,Math.PI-0.2);ctx.stroke();
  } else {
    // Sun — cute round with rays
    const sunX=W*(h-6)/14,sunY=H*0.14-Math.sin(Math.PI*(h-6)/14)*H*0.06;
    // Glow
    const sg=ctx.createRadialGradient(sunX,sunY,8,sunX,sunY,40);
    sg.addColorStop(0,'rgba(255,230,100,0.6)');sg.addColorStop(1,'rgba(255,200,80,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sunX,sunY,40,0,Math.PI*2);ctx.fill();
    circ(sunX,sunY,18,'#FFE050');
    circ(sunX,sunY,14,'#FFF080');
    // Cute sun rays
    ctx.strokeStyle='#FFD030';ctx.lineWidth=3;ctx.lineCap='round';
    for(let i=0;i<8;i++){
      const a=i*Math.PI/4+animFrame*0.01;
      ctx.beginPath();ctx.moveTo(sunX+Math.cos(a)*22,sunY+Math.sin(a)*22);
      ctx.lineTo(sunX+Math.cos(a)*30,sunY+Math.sin(a)*30);ctx.stroke();
    }
    ctx.lineCap='butt';
    // Cute sun face
    circ(sunX-5,sunY-3,2.5,'#b06000');circ(sunX+5,sunY-3,2.5,'#b06000');
    ctx.strokeStyle='#b06000';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(sunX,sunY+3,4,0.1,Math.PI-0.1);ctx.stroke();
  }

  // Clouds — fluffy kawaii
  const nc=GS.weather==='rain'?8:4;
  const cloudCol=GS.weather==='rain'?'rgba(160,140,200,0.75)':'rgba(255,255,255,0.78)';
  for(let i=0;i<nc;i++){
    const spd=(i%2===0?0.25:-0.18)*(1+i*0.05);
    const cx2=((i*340+animFrame*spd)%( W+120))-60;
    const cy2=50+i*22+(i%2)*12;
    const puffs=[0,22,40,56,70,84];
    const hs=[0,12,6,-2,9,4];
    puffs.forEach((ox,j)=>circ(cx2+ox,cy2+hs[j],22-j%3*2,cloudCol));
    // Cute face on one cloud per group
    if(i===0){
      ctx.fillStyle='rgba(180,140,200,0.5)';
      circ(cx2+20,cy2,2,'rgba(180,140,200,0.5)');circ(cx2+36,cy2,2,'rgba(180,140,200,0.5)');
      ctx.strokeStyle='rgba(180,140,200,0.5)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(cx2+28,cy2+4,4,0.1,Math.PI-0.1);ctx.stroke();
    }
  }

  // Rain drops (kawaii teardrop shape)
  if(GS.weather==='rain'){
    ctx.fillStyle='rgba(180,210,255,0.55)';
    RAIN.forEach(r=>{
      ctx.beginPath();ctx.moveTo(r.x,r.y-8);ctx.quadraticCurveTo(r.x+3,r.y-3,r.x,r.y+2);
      ctx.quadraticCurveTo(r.x-3,r.y-3,r.x,r.y-8);ctx.fill();
    });
  }

  // Sakura petals (spring only, always)
  if(GS.season===0){
    ctx.fillStyle='rgba(255,180,210,0.6)';
    for(let i=0;i<20;i++){
      const px2=((i*217+animFrame*(0.5+i*0.03))%(W+60))-30;
      const py2=((i*113+animFrame*(1+i*0.02))%(H*0.8));
      const pa=Math.sin(animFrame*0.03+i)*0.5;
      ctx.save();ctx.translate(px2,py2);ctx.rotate(pa);
      ctx.beginPath();ctx.ellipse(0,0,5,3,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }

  // Snowflakes (winter)
  if(GS.season===3){
    ctx.fillStyle='rgba(220,230,255,0.7)';ctx.font='12px serif';ctx.textAlign='center';
    for(let i=0;i<15;i++){
      const px2=((i*197+animFrame*(0.4+i*0.02))%(W+60))-30;
      const py2=((i*131+animFrame*(0.8+i*0.015))%(H*0.8));
      ctx.globalAlpha=0.5+Math.sin(animFrame*0.04+i)*0.3;
      ctx.fillText('❄',px2,py2);
    }
    ctx.globalAlpha=1;
  }
}

// ── MAIN RENDER ────────────────────────────────
function render(){
  ctx.clearRect(0,0,W,H);
  renderSky();
  renderWorld();

  // Monster path arrows (shown during wave or while placing defenses)
  drawMonsterPaths();

  // Draw defenses (behind animals/NPCs)
  GS.defenses.forEach(d=>drawDefense(d));

  // Sacred statue inside house
  drawStatue();

  // Draw animals
  GS.animals.forEach(a=>drawAnimal(a,animFrame));

  // Draw NPCs
  GS.npcs.forEach((n,i)=>drawNPC(n,NPC_STYLES[i],animFrame));

  // Draw monsters
  GS.monsters.forEach(m=>drawMonster(m));

  // Draw projectiles
  GS.projectiles.forEach(p=>drawProjectile(p));

  // Draw player
  drawPlayer(GS.px-camX(),GS.py-camY(),GS.dir,GS.moving,animFrame);

  // Draw particles
  drawParticles();

  // Existing defense ranges shown during placement mode (comparison)
  if(GS.buildSelected&&!GS.buildMenuOpen){
    ctx.save();
    ctx.setLineDash([5,5]);ctx.lineWidth=1.5;
    for(const edef of GS.defenses){
      const edefDef=DEFENSE_DEFS[edef.type]||{};
      if(edefDef.range<=0)continue;
      const ex=edef.x-camX(),ey=edef.y-camY();
      const lvl=edef.level||1;
      const er=edefDef.range*(1+(lvl-1)*0.12);
      ctx.strokeStyle='rgba(180,180,255,0.3)';
      ctx.beginPath();ctx.arc(ex,ey,er,0,Math.PI*2);ctx.stroke();
    }
    ctx.setLineDash([]);ctx.restore();
  }

  // Statue hit vignette
  if(GS.statueHit>0){
    const vg=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.82);
    vg.addColorStop(0,'rgba(180,0,0,0)');
    vg.addColorStop(1,`rgba(200,0,0,${GS.statueHit*0.72})`);
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    GS.statueHit=Math.max(0,GS.statueHit-0.025);
  }

  // Facing tile highlight / build placement preview
  if(!GS.dialog&&!GS.shopOpen&&!GS.invOpen&&!GS.buildMenuOpen){
    const {r,c}=facingTile();
    const fx=c*TILE-camX(),fy=r*TILE-camY();
    if(GS.buildSelected){
      // Build preview: colored tile + defense icon + canPlace indicator
      const selDef=DEFENSE_DEFS[GS.buildSelected];
      const placeable=canPlaceDefense(c*TILE+TILE/2,r*TILE+TILE/2);
      const pulse=0.7+0.3*Math.sin(animFrame*0.14);
      ctx.fillStyle=placeable?`rgba(80,200,120,${pulse*0.25})`:`rgba(220,60,60,${pulse*0.25})`;
      ctx.beginPath();ctx.roundRect(fx+2,fy+2,TILE-4,TILE-4,4);ctx.fill();
      ctx.strokeStyle=placeable?`rgba(80,220,120,${pulse})`:`rgba(220,80,80,${pulse})`;
      ctx.lineWidth=2.5;ctx.beginPath();ctx.roundRect(fx+2,fy+2,TILE-4,TILE-4,4);ctx.stroke();
      // Defense icon
      ctx.font=`${TILE*0.55}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.globalAlpha=pulse*0.85;
      ctx.fillText(selDef.icon,fx+TILE/2,fy+TILE/2);
      ctx.globalAlpha=1;ctx.textBaseline='alphabetic';
      // Range circle centered on facing tile
      if(selDef.range>0){
        const tcx=fx+TILE/2,tcy=fy+TILE/2;
        ctx.save();
        ctx.strokeStyle=`rgba(100,210,255,${pulse*0.7})`;ctx.lineWidth=2;ctx.setLineDash([8,6]);
        ctx.beginPath();ctx.arc(tcx,tcy,selDef.range,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle=`rgba(100,210,255,0.06)`;ctx.fill();
        ctx.setLineDash([]);ctx.restore();
      }
    } else {
      ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(fx+2,fy+2,TILE-4,TILE-4,4);ctx.stroke();
    }
  }

  // UI layers
  if(GS.gameOver){renderGameOver()}
  else if(GS.gachaOpen){renderGachaMenu()}
  else if(GS.buildMenuOpen){renderBuildMenu()}
  else if(GS.shopOpen){renderShop()}
  else if(GS.barnOpen){renderBarn()}
  else if(GS.smithOpen){renderSmith()}
  else if(GS.clinicOpen){renderClinic()}
  else if(GS.mayorOpen){renderMayor()}
  else if(GS.invOpen){renderInventory()}
  else if(GS.dialog){renderDialog()}
  else if(gameMode==='defense'){renderDefenseHUD();renderWaveHUD()}
  else{renderHUD();renderWaveHUD()}

  // 알림은 항상 최상단에 렌더 (패널 위에도 표시)
  renderNotifications();

  if(GS.sleeping)renderSleep();
}

// ── UPDATE ─────────────────────────────────────
function clearJust(){
  // Fix: clear JUST_PREV completely each frame so keys don't stay "already pressed" forever
  Object.keys(JUST_PREV).forEach(k=>delete JUST_PREV[k]);
  Object.assign(JUST_PREV,JUST);
  Object.keys(JUST).forEach(k=>delete JUST[k]);
}

function update(dt){

  // Game over — only restart button works
  if(GS.gameOver){
    GS.notes=GS.notes.filter(n=>{n.timer-=dt/defSpeedMult;return n.timer>0});
    if(justPressed('Enter')||justPressed('Space')){
      GS.farmHP=GS.farmMaxHP;GS.monsters=[];GS.defenses=[];GS.projectiles=[];
      GS.gameOver=false;GS.waveNum=0;GS.waveActive=false;GS.waveQueue=[];
      GS.waveTriggeredToday=false;GS.money=gameMode==='defense'?1000:500;GS.day=1;defSpeedMult=1;
    }
    clearJust();return;
  }

  if(GS.sleeping){
    GS.sleepT+=dt;
    if(GS.sleepT>=1.5){doSleep();GS.sleeping=false;GS.sleepT=0}
    clearJust();return;
  }

  // Time — hours go 6→26 (26=2AM next day), display as %24 (farm mode only)
  if(gameMode==='farm'){
    timeAcc+=dt;
    if(timeAcc>=0.25){
      timeAcc-=0.25;
      GS.minute+=1;
      if(GS.minute>=60){GS.minute=0;GS.hour++}
      if(GS.hour>=26){GS.hour=26}
      if(GS.hour===22&&GS.minute===0&&!GS.sleeping){
        notify('밤이 깊었습니다. Z키로 수면하세요. 💤','#A0C4FF');
      }
    }
  }

  // Always update these regardless of UI state
  // Use real-time delta for notifications so they don't expire too fast at high speed
  const noteDt=dt/defSpeedMult;
  GS.notes=GS.notes.filter(n=>{n.timer-=noteDt;return n.timer>0});
  // Aggregate kill-gold notifications at 2x/3x speed
  if(defSpeedMult>1&&GS._killGoldAcc>0){
    GS._killGoldFlush=(GS._killGoldFlush||0)-noteDt;
    if(GS._killGoldFlush<=0){
      notify(`+${GS._killGoldAcc}G 👾`,'#FFD700');
      GS._killGoldAcc=0;GS._killGoldFlush=0.8;
    }
  } else if(defSpeedMult===1){GS._killGoldAcc=0;GS._killGoldFlush=0;}
  updateParticles(dt);
  updateRain();
  updateCam();
  updateWave(dt);

  // Build menu keyboard nav
  // Gacha menu keyboard
  if(GS.gachaOpen){
    if(justPressed('Escape')||justPressed('KeyG')){GS.gachaOpen=false;}
    if(justPressed('Digit1')&&GS.money>=200){
      GS.money-=200;const k=gachaDraw();GS.hand.push(k);GS._lastGachaResults=[k];
      const d=DEFENSE_DEFS[k];notify(`✨ ${d.grade}급 [${d.attr}] ${d.name}!`,GRADE_COLOR[d.grade]);
    }
    if(justPressed('Digit0')&&GS.money>=1800){
      GS.money-=1800;const res=[];for(let i=0;i<10;i++){const k=gachaDraw();GS.hand.push(k);res.push(k);}
      GS._lastGachaResults=res;
      const ss=res.filter(k=>DEFENSE_DEFS[k]?.grade==='SS'),s=res.filter(k=>DEFENSE_DEFS[k]?.grade==='S');
      if(ss.length)notify(`🌟 SS급 ${DEFENSE_DEFS[ss[0]].name} 등장!`,GRADE_COLOR.SS);
      else if(s.length)notify(`✨ S급 ${DEFENSE_DEFS[s[0]].name} 등장!`,GRADE_COLOR.S);
      else notify(`10뽑기 완료! 패 +10장`,'#c080ff');
    }
    clearJust();return;
  }

  if(GS.buildMenuOpen){
    const defKeys=gameMode==='defense'
      ?[...new Set(GS.hand)]
      :Object.keys(DEFENSE_DEFS).filter(k=>!DEFENSE_DEFS[k].gacha);
    const kLen=Math.max(1,defKeys.length);
    if(justPressed('ArrowUp')||justPressed('KeyW'))GS.buildMenuIdx=(GS.buildMenuIdx-1+kLen)%kLen;
    if(justPressed('ArrowDown')||justPressed('KeyS'))GS.buildMenuIdx=(GS.buildMenuIdx+1)%kLen;
    if(justPressed('Enter')||justPressed('Space')){
      const key=defKeys[GS.buildMenuIdx];
      if(key){
        const def=DEFENSE_DEFS[key];
        if(gameMode==='defense'){GS.buildSelected=key;GS.buildMenuOpen=false;}
        else if(GS.money>=def.cost){GS.buildSelected=key;GS.buildMenuOpen=false;}
        else notify('돈이 부족합니다!','#E53935');
      }
    }
    if(justPressed('Escape')||justPressed('KeyB')){GS.buildMenuOpen=false;GS.buildSelected=null;}
    clearJust();return;
  }

  // Dialog: handle keyboard here before early return
  if(GS.dialog){
    const d=GS.dialog;
    if(justPressed('Space')||justPressed('Enter')||justPressed('KeyE')){
      if(d.page<d.lines.length-1)d.page++;
      else GS.dialog=null;
    }
    clearJust();return;
  }

  // Shop keyboard nav
  if(GS.shopOpen){
    if(justPressed('Escape')){GS.shopOpen=false;GS.shopIdx=0}
    else if(justPressed('Tab')||justPressed('KeyQ')){
      GS.shopTab=GS.shopTab==='buy'?'sell':'buy';GS.shopIdx=0;
    } else if(justPressed('ArrowUp')||justPressed('KeyW')){
      GS.shopIdx=Math.max(0,GS.shopIdx-1);
    } else if(justPressed('ArrowDown')||justPressed('KeyS')){
      GS.shopIdx++;
    } else if(justPressed('Enter')||justPressed('Space')){
      if(GS.shopTab==='buy'&&GS._shopBtns&&GS._shopBtns[GS.shopIdx]){
        const b=GS._shopBtns[GS.shopIdx];const meta=ITEM_META[b.key];const cost=b.buy||meta?.buy||0;
        if(GS.money>=cost){GS.money-=cost;addItem(b.key,1);notify(`${meta?.name} 구매! (-${cost}G)`,'#4CAF50')}
        else notify('돈이 부족합니다!','#E53935');
      } else if(GS.shopTab==='sell'){
        const sl=Object.entries(GS.inv).filter(([k,q])=>{const m=ITEM_META[k];return m&&m.sell&&q>0});
        const item=sl[GS.shopIdx];
        if(item){const[key]=item;const meta=ITEM_META[key];
          const earn=meta.sell;GS.money+=earn;removeItem(key,1);GS.earned+=earn;
          notify(`${meta.name} 1개 판매! +${earn}G`,'#FFD700');checkQuestProgress()}
      }
    } else if(justPressed('KeyX')){
      if(GS.shopTab==='sell'){
        const sl=Object.entries(GS.inv).filter(([k,q])=>{const m=ITEM_META[k];return m&&m.sell&&q>0});
        const item=sl[GS.shopIdx];
        if(item){const[key,qty]=item;const meta=ITEM_META[key];
          const earn=meta.sell*qty;GS.money+=earn;removeItem(key,qty);GS.earned+=earn;
          notify(`${meta.name} ${qty}개 전부 판매! +${earn}G`,'#FFD700');checkQuestProgress()}
      }
    }
    clearJust();return;
  }
  // Inventory keyboard nav + hotbar registration
  if(GS.invOpen){
    const invItems=Object.entries(GS.inv).filter(([k,v])=>v>0&&ITEM_META[k]);
    GS.invIdx=Math.max(0,Math.min(GS.invIdx,invItems.length-1));
    if(justPressed('Escape')||justPressed('KeyI')){GS.invOpen=false;}
    else if(justPressed('ArrowLeft')||justPressed('KeyA'))GS.invIdx=Math.max(0,GS.invIdx-1);
    else if(justPressed('ArrowRight')||justPressed('KeyD'))GS.invIdx=Math.min(invItems.length-1,GS.invIdx+1);
    else if(justPressed('ArrowUp')||justPressed('KeyW'))GS.invIdx=Math.max(0,GS.invIdx-6);
    else if(justPressed('ArrowDown')||justPressed('KeyS'))GS.invIdx=Math.min(invItems.length-1,GS.invIdx+6);
    else{
      for(let s=0;s<GS.bar.length;s++){
        if(justPressed(`Digit${s+1}`)&&invItems[GS.invIdx]){
          const key=invItems[GS.invIdx][0];
          GS.bar[s]=key;
          notify(`${ITEM_META[key].name} → 단축키 ${s+1} 등록!`,'#4CAF50');
          break;
        }
      }
    }
    clearJust();return;
  }

  // Barn UI keyboard nav
  if(GS.barnOpen){
    if(justPressed('Escape')){GS.barnOpen=false;}
    else if(justPressed('ArrowUp')||justPressed('KeyW'))GS.barnIdx=Math.max(0,GS.barnIdx-1);
    else if(justPressed('ArrowDown')||justPressed('KeyS'))GS.barnIdx=Math.min(GS.animals.length-1,GS.barnIdx+1);
    else if(justPressed('Enter')||justPressed('Space')){
      const a=GS.animals[GS.barnIdx];
      if(a){
        if(collectBarnProduct(a)){notify(`${a.type==='chicken'?'달걀':a.type==='cow'?'우유':'양털'} 수집! 🐾`,'#FFD700');}
        else notify('아직 산물이 없습니다.','#999');
      }
    }
    else if(justPressed('KeyF')){
      const a=GS.animals[GS.barnIdx];
      if(a){
        if(a.fed){notify('이미 먹이를 줬습니다.','#999');}
        else if((GS.inv['animal_feed']||0)>0){removeItem('animal_feed',1);a.fed=true;notify('동물에게 먹이를 줬습니다! 🌾','#8BC34A');}
        else notify('동물 먹이가 없습니다.','#E53935');
      }
    }
    else if(justPressed('Digit1')||justPressed('Digit2')){
      const idx=justPressed('Digit1')?0:1;
      const ownsCow=GS.animals.some(a=>a.type==='cow');
      const ownsSheep=GS.animals.some(a=>a.type==='sheep');
      const buys=[];
      if(!ownsCow)buys.push({type:'cow',cost:2000});
      if(!ownsSheep)buys.push({type:'sheep',cost:1500});
      const b=buys[idx];
      if(b){
        if(GS.money>=b.cost){GS.money-=b.cost;GS.animals.push({type:b.type,fed:true,product:false,daysToProduct:b.type==='cow'?2:3,dayTimer:b.type==='cow'?2:3});notify(`${b.type==='cow'?'소':'양'} 구입! (-${b.cost}G) 🐾`,'#8BC34A');}
        else notify('골드가 부족합니다!','#E53935');
      }
    }
    clearJust();return;
  }

  // Smith UI keyboard nav
  if(GS.smithOpen){
    if(justPressed('Escape')){GS.smithOpen=false;}
    else if(justPressed('ArrowUp')||justPressed('KeyW'))GS.smithIdx=Math.max(0,GS.smithIdx-1);
    else if(justPressed('ArrowDown')||justPressed('KeyS'))GS.smithIdx=Math.min(SMITH_RECIPES.length-1,GS.smithIdx+1);
    else if(justPressed('Enter')||justPressed('Space')){
      const rec=SMITH_RECIPES[GS.smithIdx];
      if(rec){
        const alreadyDone=rec.onlyOnce&&GS[rec.doneKey];
        const canAfford=GS.money>=rec.cost&&Object.entries(rec.need).every(([k,v])=>(GS.inv[k]||0)>=v);
        if(alreadyDone)notify('이미 완료한 제작입니다!','#999');
        else if(canAfford){GS.money-=rec.cost;Object.entries(rec.need).forEach(([k,v])=>removeItem(k,v));rec.effect();}
        else notify('재료 또는 골드가 부족합니다!','#E53935');
      }
    }
    clearJust();return;
  }

  // Clinic UI keyboard nav
  if(GS.clinicOpen){
    if(justPressed('Escape')){GS.clinicOpen=false;}
    else if(justPressed('ArrowUp')||justPressed('KeyW'))GS.clinicIdx=Math.max(0,GS.clinicIdx-1);
    else if(justPressed('ArrowDown')||justPressed('KeyS'))GS.clinicIdx=Math.min(CLINIC_SERVICES.length-1,GS.clinicIdx+1);
    else if(justPressed('Enter')||justPressed('Space')){
      const svc=CLINIC_SERVICES[GS.clinicIdx];
      if(svc){
        if(GS.money>=svc.cost){GS.money-=svc.cost;svc.effect();}
        else notify('골드가 부족합니다!','#E53935');
      }
    }
    clearJust();return;
  }

  // Mayor/Order board keyboard nav
  if(GS.mayorOpen){
    const orders=GS.dailyOrders||[];
    if(justPressed('Escape')){GS.mayorOpen=false;}
    else if(justPressed('ArrowUp')||justPressed('KeyW'))GS.mayorIdx=Math.max(0,GS.mayorIdx-1);
    else if(justPressed('ArrowDown')||justPressed('KeyS'))GS.mayorIdx=Math.min(orders.length-1,GS.mayorIdx+1);
    else if(justPressed('Enter')||justPressed('Space')){
      const order=orders[GS.mayorIdx];
      if(order&&!order.done){
        const canSubmit=Object.entries(order.need).every(([k,v])=>(GS.inv[k]||0)>=v);
        if(canSubmit){
          Object.entries(order.need).forEach(([k,v])=>removeItem(k,v));
          GS.money+=order.reward;
          order.done=true;
          notify(`의뢰 완료: ${order.title}! +${order.reward}G 📋`,'#FFD700');
          spawnParticles(GS.px,GS.py,'#FFD700',14);
        } else notify('납품 재료가 부족합니다!','#E53935');
      }
    }
    clearJust();return;
  }

  // Movement (Shift = sprint)
  const sprint=(KEYS['ShiftLeft']||KEYS['ShiftRight'])?1.85:1;
  const spd=SPEED*sprint;
  let dx=0,dy=0;
  if(KEYS['ArrowUp']||KEYS['KeyW'])dy=-spd;
  if(KEYS['ArrowDown']||KEYS['KeyS'])dy=spd;
  if(KEYS['ArrowLeft']||KEYS['KeyA'])dx=-spd;
  if(KEYS['ArrowRight']||KEYS['KeyD'])dx=spd;

  if(dx!==0&&dy!==0){dx*=0.707;dy*=0.707}
  GS.moving=dx!==0||dy!==0;

  if(dx<0)GS.dir=3;
  else if(dx>0)GS.dir=1;
  else if(dy<0)GS.dir=0;
  else if(dy>0)GS.dir=2;

  // Collision
  const margin=10;
  if(dx!==0&&canWalk(GS.px+dx,GS.py,margin))GS.px+=dx;
  if(dy!==0&&canWalk(GS.px,GS.py+dy,margin))GS.py+=dy;

  // Clamp to world
  GS.px=Math.max(TILE,Math.min((WW-1)*TILE-TILE/2,GS.px));
  GS.py=Math.max(TILE,Math.min((WH-1)*TILE-TILE/2,GS.py));

  // Actions
  if(justPressed('KeyE'))useTool();
  if(justPressed('Space')||justPressed('Enter'))interact();
  if(gameMode==='farm'&&justPressed('KeyZ')&&!GS.waveActive&&(GS.hour>=20||GS.waveTriggeredToday))advanceDay();
  if(justPressed('KeyI'))GS.invOpen=!GS.invOpen;
  if(justPressed('KeyB')&&!GS.waveActive){GS.buildMenuOpen=true;GS.buildSelected=null;}
  if(gameMode==='defense'&&justPressed('KeyG'))GS.gachaOpen=true;
  if(gameMode==='defense'&&justPressed('Tab')){defSpeedMult=defSpeedMult>=3?1:defSpeedMult+1;notify(`배속: ${defSpeedMult}x`,'#80ffcc');}

  // N key: start wave immediately
  if(justPressed('KeyN')&&!GS.waveActive&&!GS.waveTriggeredToday){
    if(GS.day<2)GS.day=2;
    startWave();
  }

  // F key: place selected defense at FACING tile (matches preview highlight)
  if(GS.buildSelected&&!GS.buildMenuOpen){
    if(justPressed('KeyF')){
      const {r:pfr,c:pfc}=facingTile();
      const pfx=pfc*TILE+TILE/2,pfy=pfr*TILE+TILE/2;
      if(canPlaceDefense(pfx,pfy)){
        const def=DEFENSE_DEFS[GS.buildSelected];
        if(GS.money>=def.cost){
          GS.money-=def.cost;
          GS.defenses.push({type:GS.buildSelected,x:pfx,y:pfy,hp:def.maxHp,atkCd:0,level:1});
          if(gameMode==='defense'){const hi=GS.hand.indexOf(GS.buildSelected);if(hi>=0)GS.hand.splice(hi,1);}
          notify(`${def.name} 건설! (-${def.cost}G)`,'#80c0ff');
          spawnParticles(pfx,pfy,'#80c0ff',8);
          GS.buildSelected=null;
        } else notify('돈이 부족합니다!','#E53935');
      } else notify('이곳에는 건설할 수 없습니다.','#FF8040');
    }
    if(justPressed('Escape')){GS.buildSelected=null;}
  }

  if(justPressed('Escape')){GS.shopOpen=false;GS.invOpen=false;GS.dialog=null;GS.buildMenuOpen=false;GS.buildSelected=null;GS.barnOpen=false;GS.smithOpen=false;GS.clinicOpen=false;GS.mayorOpen=false;}

  // Hotbar 1~7
  for(let i=0;i<GS.bar.length;i++){
    if(justPressed(`Digit${i+1}`))GS.slot=i;
  }

  // Well/water refill via E
  const {r:fr,c:fc}=facingTile();
  if(world.tiles[fr]&&(world.tiles[fr][fc]===T.WELL||world.tiles[fr][fc]===T.WATER)){
    if(justPressed('KeyE')){GS.waterCan=GS.maxWater;notify('물통을 채웠습니다! 💧','#6BC4FF');}
  }

  // U키 — 바라보는 타일의 방어시설 업그레이드
  if(justPressed('KeyU')){
    const wx=(fc+0.5)*TILE, wy=(fr+0.5)*TILE;
    let upgraded=false;
    for(const d of GS.defenses){
      if(Math.hypot(wx-d.x,wy-d.y)<TILE*0.9){
        const def=DEFENSE_DEFS[d.type];
        const lvl=d.level||1;
        if(lvl>=5){notify('최대 레벨입니다! (Lv.5)','#FFD700');}
        else{
          const upgCost=def.gacha?gradeUpgCost(def.grade,lvl):Math.floor(def.cost*1.4*lvl);
          if(GS.money>=upgCost){
            GS.money-=upgCost;d.level=lvl+1;
            d.hp=Math.min(d.hp+Math.floor(def.maxHp*0.6),def.maxHp*d.level);
            notify(`${def.name} Lv.${d.level} 업그레이드! (-${upgCost}G)`,'#80ffff');
            spawnParticles(d.x,d.y,'#80ffff',10);
          }else{
            notify(`업그레이드 비용: ${upgCost}G (${lvl}→${lvl+1}레벨)  부족!`,'#FF8040');
          }
        }
        upgraded=true;break;
      }
    }
    if(!upgraded)notify('방향 앞에 방어시설이 없습니다.','#999');
  }

  clearJust();
}

function canWalk(px,py,m){
  const corners=[
    [px-m,py-m],[px+m,py-m],
    [px-m,py+m],[px+m,py+m]
  ];
  return corners.every(([cx,cy])=>{
    const c=Math.floor(cx/TILE),r=Math.floor(cy/TILE);
    if(r<0||r>=WH||c<0||c>=WW)return false;
    return WALK.has(world.tiles[r][c]);
  });
}

// ── CLICK HANDLING ─────────────────────────────
CV.addEventListener('click',e=>{
  if(!gameRunning||!GS)return;
  const x=e.clientX,y=e.clientY;

  // Game over restart
  if(GS.gameOver){
    if(GS._gameOverRestartBtn&&inRect(x,y,GS._gameOverRestartBtn)){
      GS.farmHP=GS.farmMaxHP;GS.monsters=[];GS.defenses=[];GS.projectiles=[];
      GS.gameOver=false;GS.waveNum=0;GS.waveActive=false;GS.waveQueue=[];
      GS.waveTriggeredToday=false;GS.money=gameMode==='defense'?1000:500;GS.day=1;defSpeedMult=1;
    }
    return;
  }

  // Speed button click (defense HUD)
  if(gameMode==='defense'&&!GS.gachaOpen&&!GS.buildMenuOpen&&GS._speedBtn&&inRect(x,y,GS._speedBtn)){
    defSpeedMult=defSpeedMult>=3?1:defSpeedMult+1;
    notify(`배속: ${defSpeedMult}x`,'#80ffcc');return;
  }

  // Gacha menu clicks
  if(GS.gachaOpen){
    if(GS._gachaCloseBtn&&inRect(x,y,GS._gachaCloseBtn)){GS.gachaOpen=false;return}
    if(GS._gacha1Btn&&inRect(x,y,GS._gacha1Btn)){
      if(GS.money>=200){GS.money-=200;const k=gachaDraw();GS.hand.push(k);GS._lastGachaResults=[k];const d=DEFENSE_DEFS[k];notify(`✨ ${d.grade}급 [${d.attr}] ${d.name}!`,GRADE_COLOR[d.grade]);}
      else notify('골드가 부족합니다!','#E53935');
      return;
    }
    if(GS._gacha10Btn&&inRect(x,y,GS._gacha10Btn)){
      if(GS.money>=1800){GS.money-=1800;const res=[];for(let i=0;i<10;i++){const k=gachaDraw();GS.hand.push(k);res.push(k);}
        GS._lastGachaResults=res;
        const ss=res.filter(k=>DEFENSE_DEFS[k]?.grade==='SS'),s=res.filter(k=>DEFENSE_DEFS[k]?.grade==='S');
        if(ss.length)notify(`🌟 SS급 ${DEFENSE_DEFS[ss[0]].name} 등장!`,GRADE_COLOR.SS);
        else if(s.length)notify(`✨ S급 ${DEFENSE_DEFS[s[0]].name} 등장!`,GRADE_COLOR.S);
        else notify(`10뽑기 완료! 패 +${res.length}장`,'#c080ff');
      } else notify('골드가 부족합니다!','#E53935');
      return;
    }
    return;
  }

  // Build menu clicks
  if(GS.buildMenuOpen){
    if(GS._closeBuildBtn&&inRect(x,y,GS._closeBuildBtn)){GS.buildMenuOpen=false;GS.buildSelected=null;return}
    if(GS._buildBtns){
      for(const b of GS._buildBtns){
        if(inRect(x,y,b)){
          const def=DEFENSE_DEFS[b.key];
          if(gameMode==='defense'){
            // From hand — free placement
            GS.buildSelected=b.key;GS.buildMenuOpen=false;
          } else if(GS.money>=def.cost){
            GS.buildSelected=b.key;GS.buildMenuOpen=false;
          } else {notify('돈이 부족합니다!','#E53935')}
          return;
        }
      }
    }
    return;
  }

  // Defense upgrade (click existing defense when not in build mode)
  if(!GS.buildSelected&&!GS.buildMenuOpen&&!GS.shopOpen&&!GS.invOpen&&!GS.dialog&&!GS.barnOpen&&!GS.smithOpen&&!GS.clinicOpen&&!GS.mayorOpen){
    const wx=x+camX(),wy=y+camY();
    for(const d of GS.defenses){
      if(Math.hypot(wx-d.x,wy-d.y)<TILE*0.75){
        const def=DEFENSE_DEFS[d.type];
        const lvl=d.level||1;
        if(lvl>=5){notify('최대 레벨입니다! (Lv.5)','#FFD700');return;}
        const upgCost=def.gacha?gradeUpgCost(def.grade,lvl):Math.floor(def.cost*1.4*lvl);
        if(GS.money>=upgCost){
          GS.money-=upgCost;
          d.level=lvl+1;
          d.hp=Math.min(d.hp+Math.floor(def.maxHp*0.6),def.maxHp*d.level);
          notify(`${def.name} Lv.${d.level} 업그레이드! (-${upgCost}G)`,'#80ffff');
          spawnParticles(d.x,d.y,'#80ffff',10);
        }else{
          notify(`업그레이드 비용: ${upgCost}G (${lvl}→${lvl+1}레벨)  부족!`,'#FF8040');
        }
        return;
      }
    }
  }

  // Defense placement (build selected, menu closed)
  if(GS.buildSelected){
    const wx=x+camX(),wy=y+camY();
    const def=DEFENSE_DEFS[GS.buildSelected];
    if(canPlaceDefense(wx,wy)){
      GS.money-=def.cost;
      GS.defenses.push({type:GS.buildSelected,x:wx,y:wy,hp:def.maxHp,atkCd:0,level:1});
      if(gameMode==='defense'){const hi=GS.hand.indexOf(GS.buildSelected);if(hi>=0)GS.hand.splice(hi,1);}
      const costMsg=def.cost>0?` (-${def.cost}G)`:'';
      notify(`${def.name} 건설!${costMsg}`,'#80c0ff');
      spawnParticles(wx,wy,'#80c0ff',8);
      GS.buildSelected=null;
    } else {
      notify('이곳에는 건설할 수 없습니다.','#FF8040');
    }
    return;
  }

  // Dialog advance
  if(GS.dialog){
    const d=GS.dialog;
    if(d.page<d.lines.length-1)d.page++;
    else GS.dialog=null;
    return;
  }

  // Close buttons
  if(GS.shopOpen){
    if(GS._closeShopBtn&&inRect(x,y,GS._closeShopBtn)){GS.shopOpen=false;return}
    // Tab clicks
    const p=SPAL[GS.season];
    const pw=580,ph=460,dpx=(W-pw)/2,dpy=(H-ph)/2;
    if(inBox(x,y,dpx+20,dpy+54,90,34)){GS.shopTab='buy';return}
    if(inBox(x,y,dpx+120,dpy+54,90,34)){GS.shopTab='sell';return}
    // Buy buttons
    if(GS._shopBtns){
      for(const b of GS._shopBtns){
        if(inRect(x,y,b)){
          const key=b.key,meta=ITEM_META[key];
          const cost=b.buy||meta?.buy||0;
          if(GS.money>=cost){GS.money-=cost;addItem(key,1);notify(`${meta?.name} 구매! (-${cost}G)`,'#4CAF50')}
          else notify('돈이 부족합니다!','#E53935');
          return;
        }
      }
    }
    // Sell buttons
    if(GS._sellBtns){
      for(const b of GS._sellBtns){
        if(inRect(x,y,b)){
          const meta=ITEM_META[b.key];
          const qty=Math.min(b.qty,GS.inv[b.key]||0);
          if(qty>0){
            const earn=(meta?.sell||0)*qty;GS.money+=earn;removeItem(b.key,qty);
            notify(`${meta?.name} ${qty}개 판매! +${earn}G`,'#FFD700');
            GS.earned+=earn;checkQuestProgress();
          }
          return;
        }
      }
    }
    GS._shopBtns=[];GS._sellBtns=[];
    return;
  }
  if(GS.invOpen){
    if(GS._closeInvBtn&&inRect(x,y,GS._closeInvBtn)){GS.invOpen=false;return}
    for(const b of(GS._invItemBtns||[])){if(inRect(x,y,b)){GS.invIdx=b.idx;return}}
    return;
  }

  // Barn clicks
  if(GS.barnOpen){
    if(GS._barnCloseBtn&&inRect(x,y,GS._barnCloseBtn)){GS.barnOpen=false;return}
    for(const b of(GS._barnBtns||[])){
      if(inRect(x,y,b)){
        if(b.type==='collect'){
          const a=GS.animals[b.animalIdx];
          if(collectBarnProduct(a)){notify(`${a.type==='chicken'?'달걀':a.type==='cow'?'우유':'양털'} 수집! 🐾`,'#FFD700');}
          else notify('아직 산물이 없습니다.','#999');
        } else if(b.type==='feed'){
          const a=GS.animals[b.animalIdx];
          if((GS.inv['animal_feed']||0)>0){removeItem('animal_feed',1);a.fed=true;notify('동물에게 먹이를 줬습니다! 🌾','#8BC34A');}
        } else if(b.type==='buy'){
          if(GS.money>=b.cost){GS.money-=b.cost;GS.animals.push({type:b.animalType,fed:true,product:false,daysToProduct:b.animalType==='cow'?2:3,dayTimer:b.animalType==='cow'?2:3});notify(`${b.animalType==='cow'?'소':'양'} 구입! (-${b.cost}G) 🐾`,'#8BC34A');}
          else notify('골드가 부족합니다!','#E53935');
        }
        return;
      }
    }
    return;
  }

  // Smith clicks
  if(GS.smithOpen){
    if(GS._smithCloseBtn&&inRect(x,y,GS._smithCloseBtn)){GS.smithOpen=false;return}
    for(const b of(GS._smithCraftBtns||[])){
      if(inRect(x,y,b)){
        if(!b.available){notify('재료 또는 골드가 부족합니다!','#E53935');return}
        const rec=SMITH_RECIPES[b.idx];
        const alreadyDone=rec.onlyOnce&&GS[rec.doneKey];
        if(alreadyDone){notify('이미 완료한 제작입니다!','#999');return}
        GS.money-=rec.cost;Object.entries(rec.need).forEach(([k,v])=>removeItem(k,v));rec.effect();
        return;
      }
    }
    return;
  }

  // Clinic clicks
  if(GS.clinicOpen){
    if(GS._clinicCloseBtn&&inRect(x,y,GS._clinicCloseBtn)){GS.clinicOpen=false;return}
    for(const b of(GS._clinicServiceBtns||[])){
      if(inRect(x,y,b)){
        if(!b.canAfford){notify('골드가 부족합니다!','#E53935');return}
        const svc=CLINIC_SERVICES[b.idx];
        GS.money-=svc.cost;svc.effect();
        return;
      }
    }
    return;
  }

  // Mayor clicks
  if(GS.mayorOpen){
    if(GS._mayorCloseBtn&&inRect(x,y,GS._mayorCloseBtn)){GS.mayorOpen=false;return}
    for(const b of(GS._mayorOrderBtns||[])){
      if(inRect(x,y,b)){
        if(!b.canSubmit){notify('납품 재료가 부족합니다!','#E53935');return}
        const order=(GS.dailyOrders||[])[b.idx];
        if(order&&!order.done){
          Object.entries(order.need).forEach(([k,v])=>removeItem(k,v));
          GS.money+=order.reward;order.done=true;
          notify(`의뢰 완료: ${order.title}! +${order.reward}G 📋`,'#FFD700');
          spawnParticles(GS.px,GS.py,'#FFD700',14);
        }
        return;
      }
    }
    return;
  }

  GS._shopBtns=[];GS._sellBtns=[];
});

function inRect(x,y,r){return x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h}
function inBox(x,y,bx,by,bw,bh){return x>=bx&&x<=bx+bw&&y>=by&&y<=by+bh}

// ── GAME LOOP ──────────────────────────────────
function loop(ts){
  const rawDt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  animFrame++;
  if(gameRunning&&GS){
    const dt=gameMode==='defense'?rawDt*defSpeedMult:rawDt;
    update(dt);
    render();
  }
  requestAnimationFrame(loop);
}

        maxEnergy:GS.maxEnergy,maxWater:GS.maxWater,
        craftedCount:GS.craftedCount||0,fishedCount:GS.fishedCount||0,
        animalProductCount:GS.animalProductCount||0,wavesCleared:GS.wavesCleared||0,
        dailyOrders:JSON.parse(JSON.stringify(GS.dailyOrders||[])),dailyOrderDay:GS.dailyOrderDay||0,
      },
      tiles:Array.from({length:WH},(_,r)=>Array.from(world.tiles[r])),
      cd:world.cd.map(row=>row.map(c=>c?{...c}:null)),
    };
    localStorage.setItem(SAVE_KEY,JSON.stringify(save));
    if(!silent)notify('💾 저장됨','#4CAF50');
  }catch(e){console.error('Save failed',e)}
}

function loadSave(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    const save=JSON.parse(raw);
    if(!save||save.v!==2)return false;
    // Restore world
    for(let r=0;r<WH;r++)for(let c=0;c<WW;c++){
      if(save.tiles[r])world.tiles[r][c]=save.tiles[r][c];
      world.cd[r][c]=save.cd[r]?save.cd[r][c]:null;
    }
    // Restore GS fields
    const g=save.g;
    Object.assign(GS,{
      hour:g.hour,minute:g.minute,day:g.day,season:g.season,year:g.year,
      px:g.px,py:g.py,dir:g.dir,
      energy:g.energy,money:g.money,waterCan:g.waterCan,
      inv:{...g.inv},bar:[...g.bar],slot:g.slot,
      harvested:g.harvested,watered:g.watered,earned:g.earned,days:g.days,
      weather:g.weather||'sunny',chestLooted:!!g.chestLooted,
      animals:g.animals||GS.animals,
      farmHP:g.farmHP||100,farmMaxHP:g.farmMaxHP||100,waveNum:g.waveNum||0,
      defenses:g.defenses||[],
      waterUpgraded:g.waterUpgraded||false,energyUpgraded:g.energyUpgraded||false,
      maxEnergy:g.maxEnergy||MAX_E,maxWater:g.maxWater||10,
      craftedCount:g.craftedCount||0,fishedCount:g.fishedCount||0,
      animalProductCount:g.animalProductCount||0,wavesCleared:g.wavesCleared||0,
      dailyOrders:g.dailyOrders||[],dailyOrderDay:g.dailyOrderDay||0,
    });
    g.quests.forEach(sq=>{const q=GS.quests.find(q=>q.id===sq.id);if(q){q.prog=sq.prog;q.done=sq.done}});
    g.npcs.forEach(sn=>{const n=GS.npcs.find(n=>n.id===sn.id);if(n){n.lineIdx=sn.lineIdx;if(sn.quest)n.quest={...sn.quest};if(sn.quest2&&n.quest2)n.quest2={...sn.quest2};if(sn.quest3&&n.quest3)n.quest3={...sn.quest3}}});
    return true;
  }catch(e){console.error('Load failed',e);return false}
}

function getSaveInfo(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return null;
    const s=JSON.parse(raw);
    if(!s||!s.g)return null;
    const g=s.g;
    const d=new Date(s.ts);
    const ds=`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
    return `${g.year}년 ${SEASONS[g.season]} ${g.day}일 · 💰${g.money}G · ${ds} 저장`;
  }catch(e){return null}
}

// ── START ──────────────────────────────────────
function startGame(fresh=false){
  gameMode='farm'; curHX=HOUSE_X; curHY=HOUSE_Y; defSpeedMult=1;
  if(fresh)localStorage.removeItem(SAVE_KEY);
  document.getElementById('title').style.display='none';
  initGS();
  gameRunning=true;
  lastTime=performance.now();
  GS._shopBtns=[];GS._sellBtns=[];
}

function continueGame(){
  gameMode='farm'; curHX=HOUSE_X; curHY=HOUSE_Y;
  document.getElementById('title').style.display='none';
  initGS();
  const ok=loadSave();
  if(!ok){initGS();notify('저장 데이터를 불러올 수 없습니다.','#E53935')}
  gameRunning=true;
  lastTime=performance.now();
  GS._shopBtns=[];GS._sellBtns=[];
}

// Show continue button if save exists
(function(){
  const info=getSaveInfo();
  if(info){
    document.getElementById('btn-continue').style.display='inline-block';
    document.getElementById('btn-new').style.marginLeft='12px';
    const si=document.getElementById('t-saveinfo');
    si.textContent=info;si.style.display='block';
  }
})();

requestAnimationFrame(loop);
</script>
