<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem('theme')=='light')document.documentElement.classList.add('light')</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 생성기 - 직장인닷컴</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .pw-display {
      background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1);
      border-radius:12px; padding:20px 24px; font-family:monospace;
      font-size:1.2rem; color:var(--white); letter-spacing:2px;
      word-break:break-all; min-height:60px; display:flex; align-items:center;
      justify-content:space-between; gap:12px; margin:16px 0;
    }
    .pw-text { flex:1; }
    .copy-btn { background:var(--primary); border:none; color:var(--white); padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:700; white-space:nowrap; }
    .option-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
    .option-row:last-of-type { border-bottom:none; }
    .option-row label { font-size:0.9rem; color:var(--text); }
    .toggle { position:relative; width:44px; height:24px; }
    .toggle input { opacity:0; width:0; height:0; }
    .slider { position:absolute; cursor:pointer; top:0;left:0;right:0;bottom:0; background:#333; border-radius:99px; transition:0.3s; }
    .slider:before { position:absolute; content:''; height:18px; width:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:0.3s; }
    input:checked + .slider { background:var(--primary); }
    input:checked + .slider:before { transform:translateX(20px); }
    .strength-bar { display:flex; gap:4px; margin:8px 0; }
    .strength-seg { flex:1; height:6px; border-radius:99px; background:rgba(255,255,255,0.1); transition:background 0.3s; }
    .strength-label { font-size:0.82rem; color:var(--text-muted); }
    .bulk-area { background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:16px; font-family:monospace; font-size:0.9rem; color:var(--text); width:100%; min-height:120px; resize:vertical; margin-top:8px; }
  </style>
</head>
<body>
<nav>
  <a href="../index.html" class="logo">💼 <span>직장인</span>닷컴</a>
  <ul class="nav-links">
    <li><a href="../index.html#calculators">계산기</a></li>
    <li><a href="../index.html#tools" class="active">업무도구</a></li>
    <li><a href="../index.html#games">루팡게임</a></li>
    <li><a href="../index.html#tests">테스트</a></li>
    <li><a href="../index.html#info">정보</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">홈</a> › 업무 도구</div>
  <h1>🔐 비밀번호 생성기</h1>
  <p>강력한 랜덤 비밀번호를 즉시 생성합니다</p>
</div>
<main>
  <div class="ad-banner">광고 영역 (Google AdSense)</div>
  <div class="tool-card">
    <label>비밀번호 길이: <strong id="lenLabel">16</strong>자</label>
    <input type="range" id="length" min="8" max="64" value="16" oninput="document.getElementById('lenLabel').textContent=this.value;generate()">

    <div class="option-row"><label>대문자 (A-Z)</label><label class="toggle"><input type="checkbox" id="upper" checked onchange="generate()"><span class="slider"></span></label></div>
    <div class="option-row"><label>소문자 (a-z)</label><label class="toggle"><input type="checkbox" id="lower" checked onchange="generate()"><span class="slider"></span></label></div>
    <div class="option-row"><label>숫자 (0-9)</label><label class="toggle"><input type="checkbox" id="numbers" checked onchange="generate()"><span class="slider"></span></label></div>
    <div class="option-row"><label>특수문자 (!@#$...)</label><label class="toggle"><input type="checkbox" id="symbols" checked onchange="generate()"><span class="slider"></span></label></div>
    <div class="option-row"><label>헷갈리는 문자 제외 (0,O,l,1)</label><label class="toggle"><input type="checkbox" id="exclude" onchange="generate()"><span class="slider"></span></label></div>

    <div class="pw-display"><span class="pw-text" id="pwText"></span><button class="copy-btn" onclick="copyPw()">복사</button></div>
    <div class="strength-bar"><div class="strength-seg" id="s1"></div><div class="strength-seg" id="s2"></div><div class="strength-seg" id="s3"></div><div class="strength-seg" id="s4"></div></div>
    <div class="strength-label" id="strengthLabel"></div>

    <button class="btn-primary" onclick="generate()">🔄 새로 생성</button>

    <label style="margin-top:24px">여러 개 한번에 생성 (개수)</label>
    <input type="number" id="bulkCount" value="5" min="1" max="20">
    <button class="btn-primary" style="margin-top:8px" onclick="generateBulk()">여러 개 생성</button>
    <textarea class="bulk-area" id="bulkArea" readonly placeholder="여러 개 생성 결과가 여기에 표시됩니다"></textarea>
  </div>
</main>
<footer><p><strong>직장인닷컴</strong></p></footer>
<script>
const CHARS = { upper:'ABCDEFGHIJKLMNOPQRSTUVWXYZ', lower:'abcdefghijklmnopqrstuvwxyz', numbers:'0123456789', symbols:'!@#$%^&*()_+-=[]{}|;:,.<>?' };
const EXCLUDE = /[0O1lI]/g;

function getPool() {
  let pool = '';
  if (document.getElementById('upper').checked)   pool += CHARS.upper;
  if (document.getElementById('lower').checked)   pool += CHARS.lower;
  if (document.getElementById('numbers').checked) pool += CHARS.numbers;
  if (document.getElementById('symbols').checked) pool += CHARS.symbols;
  if (document.getElementById('exclude').checked) pool = pool.replace(EXCLUDE, '');
  return pool || CHARS.lower + CHARS.numbers;
}

function genOne(len, pool) {
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, v => pool[v % pool.length]).join('');
}

function strength(pw) {
  let s = 0;
  if (pw.length >= 12) s++;
  if (pw.length >= 16) s++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
  if (/[0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  return Math.min(4, s);
}

function generate() {
  const len  = parseInt(document.getElementById('length').value);
  const pool = getPool();
  const pw   = genOne(len, pool);
  document.getElementById('pwText').textContent = pw;
  const s = strength(pw);
  const colors = ['#e74c3c','#e67e22','#f39c12','#2ecc71'];
  const labels = ['약함','보통','강함','매우 강함'];
  [1,2,3,4].forEach(i => {
    document.getElementById('s'+i).style.background = i <= s ? colors[s-1] : 'rgba(255,255,255,0.1)';
  });
  document.getElementById('strengthLabel').textContent = '강도: ' + (labels[s-1] || '약함');
  document.getElementById('strengthLabel').style.color = s >= 3 ? '#2ecc71' : '#e67e22';
}

function copyPw() {
  const pw = document.getElementById('pwText').textContent;
  navigator.clipboard.writeText(pw).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ 복사됨'; setTimeout(() => btn.textContent = '복사', 1500);
  });
}

function generateBulk() {
  const count = parseInt(document.getElementById('bulkCount').value) || 5;
  const len   = parseInt(document.getElementById('length').value);
  const pool  = getPool();
  const list  = Array.from({length: count}, () => genOne(len, pool));
  document.getElementById('bulkArea').value = list.join('\n');
}

generate();
</script>
<script src="../js/theme.js"></script>
</body>
</html>
