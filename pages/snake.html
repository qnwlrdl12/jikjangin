<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뱀 게임 - 월급루팡 게임 - 직장인닷컴</title>
  <meta name="description" content="월급루팡을 위한 뱀 게임. 회의 중 플레이는 자제해주세요.">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .game-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 32px 16px;
    }
    .game-info {
      display: flex;
      gap: 32px;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .game-info span { color: var(--text-muted); font-weight: 400; font-size: 0.9rem; }
    .game-info strong { color: var(--secondary); font-size: 1.4rem; }

    #gameCanvas {
      border: 2px solid rgba(255,107,53,0.5);
      border-radius: 12px;
      background: #0a0a1a;
      display: block;
      max-width: 100%;
    }

    .game-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn-game {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--white);
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-game:hover, .btn-game.active { background: var(--primary); border-color: var(--primary); }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 4px;
      margin-top: 8px;
    }
    .dpad-btn {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--white);
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active { background: var(--primary); }
    .dpad-btn.center { background: transparent; border-color: transparent; pointer-events: none; }

    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      gap: 16px;
      backdrop-filter: blur(4px);
    }
    .overlay h2 { font-size: 1.6rem; color: var(--white); }
    .overlay p { color: var(--text-muted); }
    .canvas-wrap { position: relative; }
  </style>
</head>
<body>

<nav>
  <a href="../index.html" class="logo">💼 <span>직장인</span>닷컴</a>
  <ul class="nav-links">
    <li><a href="../index.html#calculators">계산기</a></li>
    <li><a href="../index.html#tools">업무도구</a></li>
    <li><a href="../index.html#games" class="active">루팡게임</a></li>
    <li><a href="../index.html#tests">테스트</a></li>
    <li><a href="../index.html#info">정보</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">홈</a> › 월급루팡 게임</div>
  <h1>🐍 뱀 게임</h1>
  <p>먹을수록 길어지는 뱀. 회의 중 플레이는 자제해주세요 😇</p>
</div>

<main>
  <div class="ad-banner">광고 영역 (Google AdSense)</div>

  <div class="game-wrap">
    <div class="game-info">
      <div>점수 <strong id="score">0</strong></div>
      <div>최고 <strong id="best">0</strong></div>
      <div>레벨 <span>속도</span> <strong id="level">1</strong></div>
    </div>

    <div class="game-controls">
      <button class="btn-game" id="startBtn" onclick="startGame()">▶ 시작</button>
      <button class="btn-game" onclick="togglePause()">⏸ 일시정지</button>
      <button class="btn-game" id="speedBtn" onclick="cycleSpeed()">🐢 느리게</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div class="overlay" id="overlay">
        <div style="font-size:3rem">🐍</div>
        <h2>뱀 게임</h2>
        <p>방향키 또는 아래 버튼으로 조작</p>
        <button class="btn-primary" style="width:160px" onclick="startGame()">시작하기</button>
      </div>
    </div>

    <div class="dpad" id="dpad">
      <div></div>
      <button class="dpad-btn" ontouchstart="setDir(0,-1)" onclick="setDir(0,-1)">▲</button>
      <div></div>
      <button class="dpad-btn" ontouchstart="setDir(-1,0)" onclick="setDir(-1,0)">◀</button>
      <div class="dpad-btn center"></div>
      <button class="dpad-btn" ontouchstart="setDir(1,0)" onclick="setDir(1,0)">▶</button>
      <div></div>
      <button class="dpad-btn" ontouchstart="setDir(0,1)" onclick="setDir(0,1)">▼</button>
      <div></div>
    </div>
  </div>

  <div class="ad-banner">광고 영역 (Google AdSense)</div>
</main>

<footer>
  <p><strong>직장인닷컴</strong> — 직장인을 위한 올인원 도구 사이트</p>
</footer>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;

let snake, dir, nextDir, food, score, best = 0, gameLoop, running = false, paused = false;
let speeds = [180, 120, 80];
let speedIdx = 0;
let speedLabels = ['🐢 느리게', '🚶 보통', '🔥 빠르게'];

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  running = true;
  paused = false;
  placeFood();
  updateScore();
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, speeds[speedIdx]);
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function tick() {
  if (!running || paused) return;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver(); return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    if (score > best) best = score;
    updateScore();
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= COLS; i++) { ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke(); }
  for (let i = 0; i <= ROWS; i++) { ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke(); }

  // Food
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((s, i) => {
    const ratio = 1 - i / snake.length;
    ctx.fillStyle = i === 0 ? '#FF6B35' : `rgba(78,205,196,${0.4 + ratio * 0.6})`;
    ctx.shadowColor = i === 0 ? '#FF6B35' : 'transparent';
    ctx.shadowBlur = i === 0 ? 8 : 0;
    ctx.beginPath();
    ctx.roundRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2, 4);
    ctx.fill();
  });
  ctx.shadowBlur = 0;
}

function gameOver() {
  clearInterval(gameLoop);
  running = false;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <div style="font-size:2.5rem">😵</div>
    <h2>게임 오버</h2>
    <p>점수: <strong style="color:var(--secondary)">${score}</strong> | 최고: <strong style="color:var(--accent)">${best}</strong></p>
    <button class="btn-primary" style="width:160px" onclick="startGame()">다시하기</button>
  `;
  ov.style.display = 'flex';
}

function togglePause() {
  if (!running) return;
  paused = !paused;
}

function setDir(x, y) {
  if ((dir.x !== 0 && x !== 0) || (dir.y !== 0 && y !== 0)) return; // 반대방향 무시
  nextDir = {x, y};
}

function cycleSpeed() {
  speedIdx = (speedIdx + 1) % speeds.length;
  document.getElementById('speedBtn').textContent = speedLabels[speedIdx];
  if (running) { clearInterval(gameLoop); gameLoop = setInterval(tick, speeds[speedIdx]); }
}

function updateScore() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('level').textContent = speedIdx + 1;
}

document.addEventListener('keydown', e => {
  const map = { ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0] };
  if (e.key in map) { e.preventDefault(); const [x,y] = map[e.key]; setDir(x,y); }
  if (e.key === ' ') { e.preventDefault(); if (!running) startGame(); else togglePause(); }
});

draw();
</script>
</body>
</html>
