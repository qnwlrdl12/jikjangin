<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light')</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스네이크 리마스터드 - 직장인닷컴</title>
  <meta name="description" content="네온 스네이크 게임. 파티클·효과음·파워업·콤보 시스템.">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .sk-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px 16px}
    .sk-hud{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
    .sk-box{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 16px;text-align:center;min-width:76px}
    .sk-box .lbl{font-size:.7rem;color:var(--text-muted)}
    .sk-box .val{font-size:1.45rem;font-weight:900;color:var(--white)}
    .sk-box.best .val{color:#FFD700;text-shadow:0 0 8px #FFD700}
    .sk-box.lvl .val{color:#00f0ff;text-shadow:0 0 8px #00f0ff}
    .sk-box.mul .val{color:#39ff14;text-shadow:0 0 8px #39ff14}
    .sk-ctrl{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .sk-btn{background:var(--card);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:9px 18px;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:600;transition:all .2s;font-family:inherit}
    .sk-btn:hover,.sk-btn.on{background:var(--primary);color:#fff;border-color:var(--primary)}
    .cv-wrap{position:relative}
    #sc{border:2px solid rgba(0,240,255,.25);border-radius:14px;background:#050510;display:block;box-shadow:0 0 30px rgba(0,240,255,.08)}
    .sk-ov{position:absolute;inset:0;background:rgba(5,5,20,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;border-radius:14px;backdrop-filter:blur(10px)}
    .sk-ov h2{font-size:1.5rem;font-weight:900;background:linear-gradient(120deg,#00f0ff,#39ff14);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sk-ov p{color:var(--text-muted);font-size:.9rem;text-align:center;padding:0 16px;line-height:1.6}
    .sk-ov .big{font-size:2rem;font-weight:900;color:#FFD700;text-shadow:0 0 16px #FFD700}
    .s-start{background:linear-gradient(135deg,#00c8ff,#39ff14);border:none;border-radius:12px;color:#000;font-size:1rem;font-weight:800;padding:12px 28px;cursor:pointer;font-family:inherit;box-shadow:0 4px 18px rgba(0,200,255,.35);transition:all .2s}
    .s-start:hover{transform:translateY(-2px)}
    .dpad{display:grid;grid-template-columns:repeat(3,52px);gap:4px}
    .db{background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:10px;width:52px;height:52px;color:#fff;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:background .12s;user-select:none}
    .db:active{background:rgba(0,240,255,.2)}
    .snd-b{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:1rem;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .powerup-bar{width:min(400px,94vw);height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
    .powerup-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#39ff14,#00f0ff);transition:width .2s;width:0%}
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9410871181012126" crossorigin="anonymous"></script>
</head>
<body>
<nav>
  <a href="../index.html" class="logo">💼 <span>직장인</span>닷컴</a>
  <ul class="nav-links">
    <li><a href="../index.html#games" class="active">루팡게임</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">홈</a> › 루팡게임</div>
  <h1>🐍 스네이크 리마스터드</h1>
  <p>파워업 · 콤보 · 파티클 · 효과음 — 방향키 또는 스와이프</p>
</div>
<main>
  <div class="ad-banner">광고 영역 (Google AdSense)</div>
  <div class="sk-wrap">
    <div class="sk-hud">
      <div class="sk-box"><div class="lbl">점수</div><div class="val" id="skScore">0</div></div>
      <div class="sk-box best"><div class="lbl">최고</div><div class="val" id="skBest">0</div></div>
      <div class="sk-box lvl"><div class="lbl">레벨</div><div class="val" id="skLevel">1</div></div>
      <div class="sk-box mul"><div class="lbl">배율</div><div class="val" id="skMul">×1</div></div>
    </div>
    <div class="sk-ctrl">
      <button class="sk-btn" id="startBtn" onclick="startGame()">▶ 시작</button>
      <button class="sk-btn" id="pauseBtn" onclick="togglePause()">⏸ 일시정지</button>
      <button class="sk-btn on" id="speedBtn" onclick="cycleSpeed()">🚶 보통</button>
      <button class="snd-b" id="sndB" onclick="toggleSfx()" style="position:static;border-radius:8px;padding:9px 14px;width:auto;height:auto;font-size:.88rem">🔊</button>
    </div>
    <div class="powerup-bar"><div class="powerup-fill" id="pwBar"></div></div>
    <div class="cv-wrap">
      <canvas id="sc" width="400" height="400"></canvas>
      <div class="sk-ov" id="skOv">
        <div style="font-size:3rem">🐍</div>
        <h2>스네이크</h2>
        <p>먹이를 먹을수록 길어집니다<br>💛 일반(+10) · 💎 보너스(+30) · ⭐ 파워업(×2배율)</p>
        <button class="s-start" onclick="startGame()">시작하기</button>
      </div>
    </div>
    <div class="dpad">
      <div></div>
      <button class="db" ontouchstart="dTouch(0,-1,event)" onmousedown="setDir(0,-1)">▲</button>
      <div></div>
      <button class="db" ontouchstart="dTouch(-1,0,event)" onmousedown="setDir(-1,0)">◀</button>
      <div></div>
      <button class="db" ontouchstart="dTouch(1,0,event)" onmousedown="setDir(1,0)">▶</button>
      <div></div>
      <button class="db" ontouchstart="dTouch(0,1,event)" onmousedown="setDir(0,1)">▼</button>
      <div></div>
    </div>
  </div>
  <div class="ad-banner">광고 영역 (Google AdSense)</div>
</main>
<footer><p><strong>직장인닷컴</strong></p></footer>
<script src="../js/theme.js"></script>
<script>
const cv=document.getElementById('sc'),ctx=cv.getContext('2d');
const SZ=cv.width,CELL=20,COLS=SZ/CELL,ROWS=SZ/CELL;
const SPEEDS=[220,150,90];
const SLBLS=['🐢 느리게','🚶 보통','🔥 빠르게'];
let spIdx=1;

// ── AUDIO ──
let AC=null,sfxOn=true;
function iAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function tone(f,tp,d,v=.2,delay=0){
  if(!sfxOn||!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=tp;o.frequency.value=f;
  const t=AC.currentTime+delay;
  g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
  o.start(t);o.stop(t+d+.02);
}
const SFX={
  eat:()=>{tone(440,'sine',.08,.25);tone(660,'sine',.06,.2,.05);},
  bonus:()=>[660,880,1100].forEach((f,i)=>tone(f,'sine',.1,.3,i*.05)),
  power:()=>[523,659,784,1047].forEach((f,i)=>tone(f,'triangle',.15,.35,i*.06)),
  die:()=>[300,250,200,150].forEach((f,i)=>tone(f,'sawtooth',.2,.35,i*.1)),
  tick:()=>tone(200,'square',.02,.05),
};
function toggleSfx(){sfxOn=!sfxOn;document.getElementById('sndB').textContent=sfxOn?'🔊':'🔇';}

// ── PARTICLES ──
let parts=[];
function addEatPts(x,y,col){
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;
    parts.push({x:x*CELL+CELL/2,y:y*CELL+CELL/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,s:2+Math.random()*3,col,life:1,dec:.025+Math.random()*.03});
  }
}
function addDiePts(snake){
  snake.forEach(s=>{
    for(let i=0;i<4;i++){
      const a=Math.random()*Math.PI*2,sp=1+Math.random()*4;
      parts.push({x:s.x*CELL+CELL/2,y:s.y*CELL+CELL/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,s:2+Math.random()*3,col:'#ff4444',life:1,dec:.02+Math.random()*.025});
    }
  });
}
function renderPts(){
  parts=parts.filter(p=>p.life>.02);
  for(const p of parts){
    p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.vx*=.97;p.life-=p.dec;
    ctx.save();ctx.globalAlpha=p.life;ctx.shadowColor=p.col;ctx.shadowBlur=5;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

// ── GAME STATE ──
let snake,dir,nextDir,food,bonus,powerup,score,loop,running=false,paused=false;
let multiplier=1,powerTimer=0,powerMax=0;
let best=parseInt(localStorage.getItem('snake2-best')||'0');
document.getElementById('skBest').textContent=best;

function rndPos(exclude=[]){
  let p;
  do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(exclude.some(e=>e.x===p.x&&e.y===p.y));
  return p;
}
function placeFood(){food=rndPos([...snake,bonus,powerup].filter(Boolean));}
function tryBonus(){
  if(!bonus&&Math.random()<.3){
    bonus=rndPos([...snake,food].filter(Boolean));
    bonus.expires=Date.now()+6000;
  }
}
function tryPowerup(){
  if(!powerup&&Math.random()<.15){
    powerup=rndPos([...snake,food,bonus].filter(Boolean));
    powerup.expires=Date.now()+8000;
  }
}

function startGame(){
  iAC();
  document.getElementById('skOv').style.display='none';
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;running=true;paused=false;bonus=null;powerup=null;
  multiplier=1;powerTimer=0;
  placeFood();updateUI();
  clearInterval(loop);
  loop=setInterval(tick,SPEEDS[spIdx]);
}

function tick(){
  if(!running||paused)return;
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    gameOver();return;
  }
  snake.unshift(head);
  let ate=false;
  if(head.x===food.x&&head.y===food.y){
    const pts=10*multiplier;score+=pts;ate=true;
    iAC();SFX.eat();
    addEatPts(food.x,food.y,'#FFD700');
    placeFood();tryBonus();tryPowerup();
  }else if(bonus&&head.x===bonus.x&&head.y===bonus.y){
    const pts=30*multiplier;score+=pts;ate=true;
    iAC();SFX.bonus();
    addEatPts(bonus.x,bonus.y,'#bf5fff');
    bonus=null;
  }else if(powerup&&head.x===powerup.x&&head.y===powerup.y){
    iAC();SFX.power();
    addEatPts(powerup.x,powerup.y,'#39ff14');
    multiplier=2;powerTimer=Date.now();powerMax=8000;
    powerup=null;ate=true;score+=5*multiplier;
  }
  if(!ate)snake.pop();

  // Power-up expiry
  if(multiplier>1){
    const elapsed=Date.now()-powerTimer;
    if(elapsed>powerMax)multiplier=1;
    document.getElementById('pwBar').style.width=Math.max(0,(1-elapsed/powerMax)*100)+'%';
  }else{
    document.getElementById('pwBar').style.width='0%';
  }

  // Expire bonus/powerup
  if(bonus&&Date.now()>bonus.expires)bonus=null;
  if(powerup&&Date.now()>powerup.expires)powerup=null;

  if(score>best){best=score;localStorage.setItem('snake2-best',best);}
  updateUI();draw();
}

function gameOver(){
  clearInterval(loop);running=false;
  iAC();SFX.die();addDiePts(snake);
  let df=0;(function dieAnim(){draw();if(df++<50&&parts.length)requestAnimationFrame(dieAnim);else showGameOverUI();})();
}
function showGameOverUI(){
  const ov=document.getElementById('skOv');
  ov.innerHTML=`<div style="font-size:2.5rem">💥</div><h2>게임 오버</h2><div class="big">${score}</div><p>최고 기록: <strong style="color:#00f0ff">${best}</strong>${score>=best&&score>0?' · 🏆 신기록!':''}</p><button class="s-start" onclick="startGame()">다시하기</button>`;
  ov.style.display='flex';
}
function togglePause(){
  if(!running)return;paused=!paused;
  document.getElementById('pauseBtn').textContent=paused?'▶ 재개':'⏸ 일시정지';
}
function setDir(x,y){if((dir.x!==0&&x!==0)||(dir.y!==0&&y!==0))return;nextDir={x,y};}
function dTouch(x,y,e){e.preventDefault();iAC();setDir(x,y);}
function cycleSpeed(){
  spIdx=(spIdx+1)%SPEEDS.length;
  document.getElementById('speedBtn').textContent=SLBLS[spIdx];
  if(running){clearInterval(loop);loop=setInterval(tick,SPEEDS[spIdx]);}
}
function updateUI(){
  document.getElementById('skScore').textContent=score;
  document.getElementById('skBest').textContent=best;
  document.getElementById('skLevel').textContent=spIdx+1;
  document.getElementById('skMul').textContent='×'+multiplier;
}

// ── DRAW ──
let foodPulse=0;
function draw(){
  foodPulse+=.08;
  ctx.fillStyle='#050510';ctx.fillRect(0,0,SZ,SZ);
  // Grid
  ctx.strokeStyle='rgba(0,240,255,.018)';ctx.lineWidth=.5;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,SZ);ctx.stroke();}
  for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(SZ,i*CELL);ctx.stroke();}
  // Food (pulsing glow)
  if(food){
    const pulse=1+Math.sin(foodPulse)*.15;
    const r=CELL/2-2;
    ctx.save();ctx.shadowColor='#FFD700';ctx.shadowBlur=16+Math.sin(foodPulse)*6;
    ctx.fillStyle='#FFD700';
    ctx.beginPath();ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,r*pulse,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  // Bonus
  if(bonus){
    ctx.save();ctx.font=`${CELL}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='#bf5fff';ctx.shadowBlur=12;
    ctx.fillText('💎',bonus.x*CELL+CELL/2,bonus.y*CELL+CELL/2);ctx.restore();
  }
  // Powerup
  if(powerup){
    ctx.save();ctx.font=`${CELL}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='#39ff14';ctx.shadowBlur=14;
    ctx.fillText('⭐',powerup.x*CELL+CELL/2,powerup.y*CELL+CELL/2);ctx.restore();
  }
  // Snake
  snake.forEach((s,i)=>{
    const ratio=1-i/snake.length;
    const isHead=i===0;
    if(isHead){
      // Head with neon glow
      const hcol=multiplier>1?'#39ff14':'#00f0ff';
      ctx.save();ctx.shadowColor=hcol;ctx.shadowBlur=18;ctx.fillStyle=hcol;
      ctx.beginPath();ctx.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,5);ctx.fill();
      ctx.restore();
      // Eyes
      const eyeCol='#050510';
      ctx.fillStyle=eyeCol;
      if(dir.x===1){ctx.fillRect(s.x*CELL+CELL-6,s.y*CELL+3,3,3);ctx.fillRect(s.x*CELL+CELL-6,s.y*CELL+CELL-7,3,3);}
      else if(dir.x===-1){ctx.fillRect(s.x*CELL+2,s.y*CELL+3,3,3);ctx.fillRect(s.x*CELL+2,s.y*CELL+CELL-7,3,3);}
      else if(dir.y===-1){ctx.fillRect(s.x*CELL+3,s.y*CELL+2,3,3);ctx.fillRect(s.x*CELL+CELL-7,s.y*CELL+2,3,3);}
      else{ctx.fillRect(s.x*CELL+3,s.y*CELL+CELL-6,3,3);ctx.fillRect(s.x*CELL+CELL-7,s.y*CELL+CELL-6,3,3);}
    } else {
      const g=ctx.createLinearGradient(s.x*CELL,s.y*CELL,(s.x+1)*CELL,(s.y+1)*CELL);
      const alpha=.3+ratio*.7;
      g.addColorStop(0,`rgba(0,200,255,${alpha})`);
      g.addColorStop(1,`rgba(0,100,200,${alpha*.6})`);
      ctx.save();ctx.shadowColor='rgba(0,200,255,.4)';ctx.shadowBlur=ratio>0.5?8:2;
      ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,3);ctx.fill();ctx.restore();
    }
  });
  renderPts();
}

// ── INPUT ──
document.addEventListener('keydown',e=>{
  const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  if(e.key in m){e.preventDefault();const[x,y]=m[e.key];iAC();setDir(x,y);}
  if(e.key===' '){e.preventDefault();if(!running)startGame();else togglePause();}
});

// Touch swipe
let tx0=0,ty0=0;
cv.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:true});
cv.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0,dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  iAC();
  if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?1:-1,0);else setDir(0,dy>0?1:-1);
},{passive:true});

draw();
</script>
</body>
