<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem('theme')=='light')document.documentElement.classList.add('light')</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뱀 게임 - 월급루팡 게임 - 직장인닷컴</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .game-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px 16px}
    .score-bar{display:flex;gap:20px}
    .score-box{background:var(--card);border-radius:10px;padding:10px 18px;text-align:center;min-width:80px}
    .score-box .lbl{font-size:0.72rem;color:var(--text-muted)}
    .score-box .val{font-size:1.5rem;font-weight:900;color:var(--white)}
    .score-box.best .val{color:var(--secondary)}
    .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .btn-ctrl{background:var(--card);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:9px 18px;border-radius:8px;cursor:pointer;font-size:0.88rem;font-weight:600;transition:all 0.2s}
    .btn-ctrl:hover,.btn-ctrl.active{background:var(--primary);color:var(--white);border-color:var(--primary)}
    .canvas-wrap{position:relative}
    #gc{border:2px solid rgba(255,107,53,0.4);border-radius:14px;background:#080818;display:block;max-width:min(400px,95vw);max-height:min(400px,95vw)}
    .overlay{position:absolute;inset:0;background:rgba(0,0,0,0.78);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;border-radius:14px;backdrop-filter:blur(6px)}
    .overlay h2{font-size:1.5rem;color:var(--white)}
    .overlay p{color:var(--text-muted);font-size:0.9rem;text-align:center;padding:0 16px}
    .dpad{display:grid;grid-template-columns:repeat(3,52px);gap:4px}
    .db{background:var(--card);border:1px solid rgba(255,255,255,0.1);border-radius:10px;width:52px;height:52px;color:var(--white);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:background 0.12s}
    .db:active{background:var(--primary)}
  </style>
</head>
<body>
<nav>
  <a href="../index.html" class="logo">💼 <span>직장인</span>닷컴</a>
  <ul class="nav-links">
    <li><a href="../index.html#calculators">계산기</a></li>
    <li><a href="../index.html#tools">업무도구</a></li>
    <li><a href="../index.html#games" class="active">루팡게임</a></li>
    <li><a href="../index.html#tests">테스트</a></li>
    <li><a href="../index.html#info">정보</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">홈</a> › 월급루팡 게임</div>
  <h1>🐍 뱀 게임</h1>
  <p>회의 중 플레이는 삼가주세요 😇 — 방향키 또는 아래 버튼</p>
</div>
<main>
  <div class="ad-banner">광고 영역 (Google AdSense)</div>
  <div class="game-wrap">
    <div class="score-bar">
      <div class="score-box"><div class="lbl">점수</div><div class="val" id="score">0</div></div>
      <div class="score-box best"><div class="lbl">최고 기록</div><div class="val" id="best">0</div></div>
      <div class="score-box"><div class="lbl">레벨</div><div class="val" id="level">1</div></div>
    </div>
    <div class="controls">
      <button class="btn-ctrl" id="startBtn" onclick="startGame()">▶ 시작</button>
      <button class="btn-ctrl" id="pauseBtn" onclick="togglePause()">⏸ 일시정지</button>
      <button class="btn-ctrl active" id="speedBtn" onclick="cycleSpeed()">🚶 보통</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="gc" width="400" height="400"></canvas>
      <div class="overlay" id="ov">
        <div style="font-size:3rem">🐍</div>
        <h2>뱀 게임</h2>
        <p>먹이를 먹을수록 길어집니다<br>벽이나 자신에게 부딪히면 끝!</p>
        <button class="btn-primary" style="width:150px" onclick="startGame()">시작하기</button>
      </div>
    </div>
    <div class="dpad">
      <div></div>
      <button class="db" ontouchstart="dirTouch(0,-1,event)" onclick="setDir(0,-1)">▲</button>
      <div></div>
      <button class="db" ontouchstart="dirTouch(-1,0,event)" onclick="setDir(-1,0)">◀</button>
      <div></div>
      <button class="db" ontouchstart="dirTouch(1,0,event)"  onclick="setDir(1,0)">▶</button>
      <div></div>
      <button class="db" ontouchstart="dirTouch(0,1,event)"  onclick="setDir(0,1)">▼</button>
      <div></div>
    </div>
  </div>
  <div class="ad-banner">광고 영역 (Google AdSense)</div>
</main>
<footer><p><strong>직장인닷컴</strong></p></footer>
<script>
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const SIZE   = canvas.width;
const CELL   = 20;
const COLS   = SIZE/CELL, ROWS = SIZE/CELL;

const SPEEDS     = [220, 150, 90];
const SPEED_LBLS = ['🐢 느리게','🚶 보통','🔥 빠르게'];
let   speedIdx   = 1;

let snake, dir, nextDir, food, bonus, score, loop, running=false, paused=false;
let best = parseInt(localStorage.getItem('snake-best')||'0');
document.getElementById('best').textContent = best;

function startGame(){
  document.getElementById('ov').style.display='none';
  snake   = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir     = {x:1,y:0};
  nextDir = {x:1,y:0};
  score   = 0; running=true; paused=false; bonus=null;
  placeFood(); updateUI();
  clearInterval(loop);
  loop = setInterval(tick, SPEEDS[speedIdx]);
}

function placeFood(){
  let p;
  do { p={x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while(snake.some(s=>s.x===p.x&&s.y===p.y));
  food = p;
  // 가끔 보너스 먹이 (50 점마다 한 번)
  if(score>0 && score%50===0 && !bonus){
    do { bonus={x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
    while(snake.some(s=>s.x===bonus.x&&s.y===bonus.y)||(bonus.x===food.x&&bonus.y===food.y));
    setTimeout(()=>{bonus=null; draw();},5000);
  }
}

function tick(){
  if(!running||paused) return;
  dir = nextDir;
  const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  // 벽 충돌
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    gameOver(); return;
  }
  snake.unshift(head);
  let ate=false;
  if(head.x===food.x&&head.y===food.y){ score+=10; ate=true; placeFood(); }
  else if(bonus&&head.x===bonus.x&&head.y===bonus.y){ score+=30; ate=true; bonus=null; }
  if(!ate) snake.pop();
  if(score>best){ best=score; localStorage.setItem('snake-best',best); }
  updateUI(); draw();
}

function gameOver(){
  clearInterval(loop); running=false;
  document.getElementById('ov').innerHTML=`
    <div style="font-size:2.5rem">😵</div>
    <h2>게임 오버</h2>
    <p>점수: <strong style="color:var(--secondary)">${score}</strong> · 최고: <strong style="color:var(--accent)">${best}</strong></p>
    <p style="margin-top:-8px;font-size:0.82rem">${score>=best&&score>0?'🎉 신기록!':'다시 도전해보세요!'}</p>
    <button class="btn-primary" style="width:150px" onclick="startGame()">다시하기</button>`;
  document.getElementById('ov').style.display='flex';
}

function togglePause(){
  if(!running) return;
  paused=!paused;
  document.getElementById('pauseBtn').textContent = paused?'▶ 재개':'⏸ 일시정지';
}

function setDir(x,y){
  if((dir.x!==0&&x!==0)||(dir.y!==0&&y!==0)) return;
  nextDir={x,y};
}
function dirTouch(x,y,e){ e.preventDefault(); setDir(x,y); }

function cycleSpeed(){
  speedIdx=(speedIdx+1)%SPEEDS.length;
  document.getElementById('speedBtn').textContent=SPEED_LBLS[speedIdx];
  if(running){clearInterval(loop); loop=setInterval(tick,SPEEDS[speedIdx]);}
}

function updateUI(){
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent  = best;
  document.getElementById('level').textContent = speedIdx+1;
}

function draw(){
  // 배경
  ctx.fillStyle='#080818'; ctx.fillRect(0,0,SIZE,SIZE);
  // 그리드
  ctx.strokeStyle='rgba(255,255,255,0.025)'; ctx.lineWidth=0.5;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,SIZE);ctx.stroke();}
  for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(SIZE,i*CELL);ctx.stroke();}
  // 일반 먹이
  ctx.save();
  ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFD700'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // 보너스 먹이 (💎)
  if(bonus){
    ctx.save(); ctx.font=`${CELL}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('💎', bonus.x*CELL+CELL/2, bonus.y*CELL+CELL/2);
    ctx.restore();
  }
  // 뱀
  snake.forEach((s,i)=>{
    const ratio=1-i/snake.length;
    ctx.fillStyle  = i===0 ? '#FF6B35' : `rgba(78,205,196,${0.35+ratio*0.65})`;
    ctx.shadowColor= i===0 ? '#FF6B35' : 'transparent';
    ctx.shadowBlur = i===0 ? 10 : 0;
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, i===0?5:3);
    ctx.fill();
  });
  ctx.shadowBlur=0;
}

document.addEventListener('keydown',e=>{
  const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  if(e.key in m){e.preventDefault();const[x,y]=m[e.key];setDir(x,y);}
  if(e.key===' '){e.preventDefault(); if(!running)startGame(); else togglePause();}
});

draw();
</script>
<script src="../js/theme.js"></script>
</body>
</html>
