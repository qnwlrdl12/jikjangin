  <style>
    .g-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px 16px}
    .g-hud{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .g-box{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 16px;text-align:center;min-width:80px}
    .g-box .lbl{font-size:.7rem;color:var(--text-muted)}
    .g-box .val{font-size:1.45rem;font-weight:900;color:#fff}
    .g-box.best .val{color:#FFD700;text-shadow:0 0 8px #FFD700}
    .g-ctrl{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .g-btn{background:var(--card);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:9px 16px;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:600;touch-action:manipulation;transition:all .2s;font-family:inherit}
    .g-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
    .board-bg{background:#1a1a3e;border-radius:16px;padding:10px;position:relative;box-shadow:0 0 40px rgba(100,50,255,.15)}
    #g-board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:min(360px,92vw)}
    .cell{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:clamp(.9rem,3.5vw,1.4rem);background:rgba(255,255,255,.04);transition:background .12s;position:relative;overflow:hidden}
    /* Glow border on non-empty */
    .cell[data-v]:not([data-v="0"])::after{content:'';position:absolute;inset:0;border-radius:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.2),inset 0 -1px 0 rgba(0,0,0,.3);pointer-events:none}
    @keyframes appear{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes merge{0%{transform:scale(1)}40%{transform:scale(1.22)}100%{transform:scale(1)}}
    @keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-40px);opacity:0}}
    .new-t{animation:appear .15s cubic-bezier(.175,.885,.32,1.275) both}
    .mrg-t{animation:merge .2s ease both}
    .float-pts{position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:.8rem;font-weight:900;pointer-events:none;animation:floatUp .8s ease forwards;white-space:nowrap;z-index:10;text-shadow:0 0 8px currentColor}
    /* Tile colors */
    .cell[data-v="2"]   {background:#1d2035;color:#c8c8e0}
    .cell[data-v="4"]   {background:#2a1f3d;color:#d0b0f0}
    .cell[data-v="8"]   {background:#3d1f20;color:#ff8080;box-shadow:0 0 12px rgba(255,100,100,.2)}
    .cell[data-v="16"]  {background:#3d2a10;color:#ffb060;box-shadow:0 0 14px rgba(255,150,60,.25)}
    .cell[data-v="32"]  {background:#2a3d10;color:#80ff60;box-shadow:0 0 16px rgba(100,255,60,.28)}
    .cell[data-v="64"]  {background:#103d2a;color:#40ffc0;box-shadow:0 0 18px rgba(40,255,180,.3)}
    .cell[data-v="128"] {background:#10203d;color:#60a0ff;box-shadow:0 0 20px rgba(60,120,255,.35);font-size:clamp(.8rem,3vw,1.15rem)}
    .cell[data-v="256"] {background:#20103d;color:#c060ff;box-shadow:0 0 22px rgba(180,60,255,.4);font-size:clamp(.8rem,3vw,1.15rem)}
    .cell[data-v="512"] {background:#3d1040;color:#ff60e0;box-shadow:0 0 24px rgba(255,60,220,.4);font-size:clamp(.8rem,3vw,1.15rem)}
    .cell[data-v="1024"]{background:#40102a;color:#ff4080;box-shadow:0 0 28px rgba(255,40,100,.45);font-size:clamp(.7rem,2.5vw,1rem)}
    .cell[data-v="2048"]{background:#403010;color:#FFD700;box-shadow:0 0 32px rgba(255,215,0,.5);font-size:clamp(.7rem,2.5vw,1rem)}
    .cell[data-v="4096"]{background:linear-gradient(135deg,#403010,#104030);color:#fff;box-shadow:0 0 36px rgba(255,255,255,.4);font-size:clamp(.65rem,2.2vw,.9rem)}
    .cell[data-v="8192"]{background:linear-gradient(135deg,#ff4040,#4040ff);color:#fff;box-shadow:0 0 40px rgba(200,100,255,.5);font-size:clamp(.6rem,2vw,.85rem)}
    .g-msg{height:30px;text-align:center;font-size:.95rem;font-weight:700;color:var(--primary)}
    .win-banner{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,150,0,.1));border:1px solid rgba(255,215,0,.3);border-radius:12px;padding:14px 20px;text-align:center;max-width:360px}
    .win-banner h3{color:#FFD700;font-size:1.3rem;margin-bottom:8px;text-shadow:0 0 12px #FFD700}
    .win-banner p{font-size:.84rem;color:var(--text-muted)}
    .snd-b{background:var(--card);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:9px 14px;border-radius:8px;cursor:pointer;font-size:.88rem;transition:all .2s}
    html.light .g-box{border-color:rgba(0,0,0,.1)}
    html.light .g-box .val{color:#1a1a2e}
    html.light .g-btn{border-color:rgba(0,0,0,.1)}
    html.light .snd-b{border-color:rgba(0,0,0,.1)}
  </style>

<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">홈</a> › 루팡게임</div>
  <h1>🔢 2048 리마스터드</h1>
  <p>방향키 또는 스와이프로 타일 이동 · 같은 숫자끼리 합쳐 2048 만들기</p>

<main>
  <div class="ad-banner">광고 영역 (Google AdSense)</div>
  <div class="g-wrap">
    <div class="g-hud">
      <div class="g-box"><div class="lbl">점수</div><div class="val" id="g-score">0</div></div>
      <div class="g-box best"><div class="lbl">최고</div><div class="val" id="g-best">0</div></div>
    </div>
    <div class="g-ctrl">
      <button class="g-btn" onclick="newGame()">🔄 새 게임</button>
      <button class="g-btn" onclick="undoMove()">↩ 실행취소</button>
      <button class="snd-b" id="sndB" onclick="toggleSfx()">🔊</button>
    </div>
    <div class="g-msg" id="g-msg"></div>
    <div class="board-bg">
      <div id="g-board"></div>
    </div>
    <div id="winBanner" style="display:none" class="win-banner">
      <h3>🏆 2048 달성!</h3>
      <p>계속해서 더 높은 숫자에 도전하세요!</p>
      <button class="g-btn" style="margin-top:10px" onclick="document.getElementById('winBanner').style.display='none'">계속하기</button>
    </div>
    <div style="font-size:.78rem;color:var(--text-muted);text-align:center;line-height:1.7">
      방향키 또는 WASD로 이동 · 모바일: 스와이프
    </div>

<footer><p><strong>퇴근각</strong></p></footer>
<script src="../js/theme.js"></script>
<script>
const N=4;
let grid,prevGrid,prevScore,score,won;
let best=parseInt(localStorage.getItem('2048v2-best')||'0');
document.getElementById('g-best').textContent=best.toLocaleString();

// ── AUDIO ──
let AC=null,sfxOn=true;
function iAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function tone(f,tp,d,v=.2,delay=0){
  if(!sfxOn||!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=tp;o.frequency.value=f;
  const t=AC.currentTime+delay;
  g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
  o.start(t);o.stop(t+d+.02);
}
const SFX={
  slide:()=>tone(150,'sine',.06,.08),
  merge:(v)=>{
    const f=Math.min(1200,100+Math.log2(v)*60);
    tone(f,'sine',.12,.22);tone(f*1.5,'sine',.08,.1,.04);
  },
  win:()=>[523,659,784,1047,1319].forEach((f,i)=>tone(f,'triangle',.25,.35,i*.08)),
  over:()=>[300,250,200].forEach((f,i)=>tone(f,'sawtooth',.2,.3,i*.1)),
};
function toggleSfx(){sfxOn=!sfxOn;document.getElementById('sndB').textContent=sfxOn?'🔊':'🔇';}

function newGrid(){return Array.from({length:N},()=>new Array(N).fill(0));}
function cloneGrid(g){return g.map(r=>[...r]);}

function addRandom(g){
  const empty=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(!g[r][c])empty.push([r,c]);
  if(!empty.length)return false;
  const[r,c]=empty[Math.floor(Math.random()*empty.length)];
  g[r][c]=Math.random()<.85?2:4;
  return true;
}

function newGame(){
  grid=newGrid();prevGrid=null;prevScore=0;score=0;won=false;
  addRandom(grid);addRandom(grid);
  document.getElementById('g-msg').textContent='';
  document.getElementById('winBanner').style.display='none';
  render('new');updateHUD();
}

function slide(row){
  let r=row.filter(x=>x);
  const merged=new Array(N).fill(false);
  const pts=[];
  for(let i=0;i<r.length-1;i++){
    if(r[i]===r[i+1]&&!merged[i]){
      r[i]*=2;pts.push(r[i]);r.splice(i+1,1);merged[i]=true;
    }
  }
  while(r.length<N)r.push(0);
  return{row:r,pts};
}

function move(dir){
  iAC();
  prevGrid=cloneGrid(grid);prevScore=score;
  let moved=false;
  const mergedVals=[];
  if(dir==='left'||dir==='right'){
    for(let r=0;r<N;r++){
      let row=dir==='right'?[...grid[r]].reverse():grid[r];
      const{row:nr,pts}=slide(row);
      if(dir==='right')nr.reverse();
      pts.forEach(v=>mergedVals.push(v));
      if(nr.some((v,i)=>v!==grid[r][i]))moved=true;
      grid[r]=nr;
    }
  }else{
    for(let c=0;c<N;c++){
      let col=[];for(let r=0;r<N;r++)col.push(grid[r][c]);
      if(dir==='down')col.reverse();
      const{row:nc,pts}=slide(col);
      pts.forEach(v=>mergedVals.push(v));
      if(dir==='down')nc.reverse();
      for(let r=0;r<N;r++){if(nc[r]!==grid[r][c])moved=true;grid[r][c]=nc[r];}
    }
  }
  if(!moved){prevGrid=null;return;}
  mergedVals.forEach(v=>{score+=v;SFX.merge(v);});
  if(!mergedVals.length)SFX.slide();
  addRandom(grid);
  if(score>best){best=score;localStorage.setItem('2048v2-best',best);}
  render(mergedVals.length?'merge':'slide');
  updateHUD();
  // Win
  if(!won&&grid.some(r=>r.some(v=>v>=2048))){
    won=true;SFX.win();document.getElementById('winBanner').style.display='block';
  }
  if(!canMove())gameOver();
}

function undoMove(){
  if(!prevGrid)return;
  grid=prevGrid;score=prevScore;prevGrid=null;
  render('new');updateHUD();
}

function canMove(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(!grid[r][c])return true;
    if(c<N-1&&grid[r][c]===grid[r][c+1])return true;
    if(r<N-1&&grid[r][c]===grid[r+1][c])return true;
  }
  return false;
}

function gameOver(){SFX.over();document.getElementById('g-msg').textContent='게임 오버! 새 게임을 시작하세요';}

function updateHUD(){
  document.getElementById('g-score').textContent=score.toLocaleString();
  document.getElementById('g-best').textContent=best.toLocaleString();
}

// ── RENDER ──
let prevVals=newGrid();
function render(mode){
  const board=document.getElementById('g-board');
  board.innerHTML='';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const v=grid[r][c];
    const cell=document.createElement('div');
    cell.className='cell';
    if(v){
      cell.dataset.v=v;
      cell.textContent=v.toLocaleString();
      if(mode==='new'||prevVals[r][c]===0){
        cell.classList.add('new-t');
      }else if(mode==='merge'&&v!==prevVals[r][c]&&v===prevVals[r][c]*2){
        cell.classList.add('mrg-t');
        // Float +score
        const fp=document.createElement('div');
        fp.className='float-pts';fp.textContent='+'+v;fp.style.color='#FFD700';
        cell.appendChild(fp);
      }
    }
    board.appendChild(cell);
  }
  prevVals=cloneGrid(grid);
}

// ── INPUT ──
document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',a:'left',d:'right',w:'up',s:'down'};
  if(e.key in map){e.preventDefault();move(map[e.key]);}
});
let tx=0,ty=0;
document.getElementById('g-board').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('g-board').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<15&&Math.abs(dy)<15)return;
  iAC();
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');else move(dy>0?'down':'up');
},{passive:true});

newGame();
</script>
</body>
