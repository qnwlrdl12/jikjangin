<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 게임 - 월급루팡 게임 - 직장인닷컴</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .game-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; padding:24px 16px; }
    .info-bar { display:flex; gap:16px; }
    .info-box { background:var(--card); border-radius:10px; padding:10px 20px; text-align:center; min-width:90px; }
    .info-box .label { font-size:0.75rem; color:var(--text-muted); }
    .info-box .val { font-size:1.4rem; font-weight:900; color:var(--white); }
    #board { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; background:#1a1a3e; padding:12px; border-radius:16px; width:min(380px,92vw); }
    .cell {
      aspect-ratio:1; border-radius:10px; display:flex; align-items:center; justify-content:center;
      font-weight:900; font-size:clamp(1rem,4vw,1.5rem); transition:all 0.1s;
      background: rgba(255,255,255,0.06);
    }
    .cell[data-val="2"]    { background:#eee4da; color:#776e65; }
    .cell[data-val="4"]    { background:#ede0c8; color:#776e65; }
    .cell[data-val="8"]    { background:#f2b179; color:#fff; }
    .cell[data-val="16"]   { background:#f59563; color:#fff; }
    .cell[data-val="32"]   { background:#f67c5f; color:#fff; }
    .cell[data-val="64"]   { background:#f65e3b; color:#fff; }
    .cell[data-val="128"]  { background:#edcf72; color:#fff; font-size:clamp(0.85rem,3.5vw,1.2rem); }
    .cell[data-val="256"]  { background:#edcc61; color:#fff; font-size:clamp(0.85rem,3.5vw,1.2rem); }
    .cell[data-val="512"]  { background:#edc850; color:#fff; font-size:clamp(0.85rem,3.5vw,1.2rem); }
    .cell[data-val="1024"] { background:#edc53f; color:#fff; font-size:clamp(0.7rem,3vw,1rem); }
    .cell[data-val="2048"] { background:#FFD700; color:#333; font-size:clamp(0.7rem,3vw,1rem); box-shadow:0 0 20px #FFD700; }
    .overlay2 { position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border-radius:16px;backdrop-filter:blur(4px); }
    .board-wrap { position:relative; }
    .dpad { display:grid; grid-template-columns:repeat(3,52px); grid-template-rows:repeat(2,52px); gap:4px; }
    .dpad-btn { background:var(--card); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:var(--white); font-size:1.4rem; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; }
    .dpad-btn:active { background:var(--primary); }
  </style>
</head>
<body>
<nav>
  <a href="../index.html" class="logo">💼 <span>직장인</span>닷컴</a>
  <ul class="nav-links">
    <li><a href="../index.html#calculators">계산기</a></li>
    <li><a href="../index.html#tools">업무도구</a></li>
    <li><a href="../index.html#games" class="active">루팡게임</a></li>
    <li><a href="../index.html#tests">테스트</a></li>
    <li><a href="../index.html#info">정보</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">홈</a> › 월급루팡 게임</div>
  <h1>🔢 2048</h1>
  <p>같은 숫자를 합쳐 2048을 만들어라. 방향키 또는 스와이프로 조작.</p>
</div>
<main>
  <div class="ad-banner">광고 영역 (Google AdSense)</div>
  <div class="game-wrap">
    <div class="info-bar">
      <div class="info-box"><div class="label">점수</div><div class="val" id="score">0</div></div>
      <div class="info-box"><div class="label">최고</div><div class="val" id="best">0</div></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-game" style="background:var(--card);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:8px 20px;border-radius:8px;cursor:pointer;font-weight:700" onclick="newGame()">🔄 새 게임</button>
    </div>
    <div class="board-wrap">
      <div id="board"></div>
      <div class="overlay2" id="overlay2" style="display:none">
        <div style="font-size:2.5rem" id="ovEmoji"></div>
        <h2 id="ovTitle" style="color:var(--white)"></h2>
        <p id="ovSub" style="color:var(--text-muted)"></p>
        <button class="btn-primary" style="width:140px" onclick="newGame()">다시하기</button>
      </div>
    </div>
    <div class="dpad">
      <div></div>
      <button class="dpad-btn" ontouchstart="e=>{e.preventDefault();move(0)}" onclick="move(0)">▲</button>
      <div></div>
      <button class="dpad-btn" ontouchstart="e=>{e.preventDefault();move(3)}" onclick="move(3)">◀</button>
      <div></div>
      <button class="dpad-btn" ontouchstart="e=>{e.preventDefault();move(1)}" onclick="move(1)">▶</button>
      <div></div>
      <button class="dpad-btn" ontouchstart="e=>{e.preventDefault();move(2)}" onclick="move(2)">▼</button>
      <div></div>
    </div>
  </div>
  <div class="ad-banner">광고 영역 (Google AdSense)</div>
</main>
<footer><p><strong>직장인닷컴</strong></p></footer>
<script>
let grid, score, best=0, won=false;

function newGame() {
  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0; won=false;
  addRandom(); addRandom();
  document.getElementById('overlay2').style.display='none';
  render();
}

function addRandom() {
  const empty=[];
  grid.forEach((row,r)=>row.forEach((v,c)=>{if(!v)empty.push([r,c]);}));
  if(!empty.length) return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}

function slide(row) {
  let arr=row.filter(v=>v), gained=0;
  for(let i=0;i<arr.length-1;i++) {
    if(arr[i]===arr[i+1]){arr[i]*=2;gained+=arr[i];arr.splice(i+1,1);}
  }
  while(arr.length<4) arr.push(0);
  return {arr,gained};
}

function move(dir) {
  let moved=false, totalGained=0;
  const orig=grid.map(r=>[...r]);

  if(dir===0||dir===2) { // up/down
    for(let c=0;c<4;c++) {
      let col=grid.map(r=>r[c]); if(dir===2) col.reverse();
      const {arr,gained}=slide(col); totalGained+=gained;
      if(dir===2) arr.reverse();
      grid.forEach((r,ri)=>{r[c]=arr[ri];});
    }
  } else { // left/right
    grid.forEach((row,ri)=>{
      let r=[...row]; if(dir===1) r.reverse();
      const {arr,gained}=slide(r); totalGained+=gained;
      if(dir===1) arr.reverse();
      grid[ri]=arr;
    });
  }

  grid.forEach((row,r)=>row.forEach((v,c)=>{if(v!==orig[r][c])moved=true;}));
  if(!moved) return;
  score+=totalGained;
  if(score>best) best=score;
  addRandom();
  render();
  checkEnd();
}

function checkEnd() {
  const hasEmpty=grid.some(r=>r.some(v=>!v));
  const has2048=grid.some(r=>r.some(v=>v===2048));
  if(has2048&&!won) { won=true; showOverlay('🎉','2048 달성!','축하합니다! 월급 두 배도 가능할 것 같은데요?'); return; }
  if(!hasEmpty) {
    const canMove=grid.some((r,ri)=>r.some((v,ci)=>(ci<3&&v===grid[ri][ci+1])||(ri<3&&v===grid[ri+1][ci])));
    if(!canMove) showOverlay('😵','게임 오버',`최종 점수: ${score}점`);
  }
}

function showOverlay(emoji,title,sub) {
  document.getElementById('ovEmoji').textContent=emoji;
  document.getElementById('ovTitle').textContent=title;
  document.getElementById('ovSub').textContent=sub;
  document.getElementById('overlay2').style.display='flex';
}

function render() {
  document.getElementById('score').textContent=score.toLocaleString();
  document.getElementById('best').textContent=best.toLocaleString();
  document.getElementById('board').innerHTML=grid.flatMap(row=>row).map(v=>`<div class="cell" data-val="${v}">${v||''}</div>`).join('');
}

// Touch swipe
let tx,ty;
document.getElementById('board').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('board').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx<0?3:1);
  else move(dy<0?0:2);
},{passive:true});

document.addEventListener('keydown',e=>{
  const m={ArrowUp:0,ArrowRight:1,ArrowDown:2,ArrowLeft:3};
  if(e.key in m){e.preventDefault();move(m[e.key]);}
});

newGame();
</script>
</body>
</html>
