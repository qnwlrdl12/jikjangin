<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사직서 / 경위서 생성기 - 직장인닷컴</title>
  <meta name="description" content="사직서, 경위서, 시말서를 온라인에서 바로 작성하고 다운로드하세요. 서식 자동 완성.">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .tool-wrap { max-width:700px; margin:0 auto; }
    .tab-row { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .tab-btn { padding:10px 18px; border:none; border-radius:10px; font-size:0.88rem; font-weight:700; cursor:pointer; transition:all 0.2s; background:rgba(255,255,255,0.05); color:var(--text-muted); font-family:inherit; }
    .tab-btn.active { background:var(--primary); color:#fff; }
    .tab-btn:hover:not(.active) { background:rgba(255,255,255,0.1); color:var(--white); }

    .form-card { background:var(--card); border:1px solid rgba(255,255,255,0.06); border-radius:var(--radius); padding:26px; margin-bottom:14px; }
    .form-card h3 { font-size:0.95rem; font-weight:700; color:var(--white); margin-bottom:18px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
    .form-row.single { grid-template-columns:1fr; }
    .form-group label { display:block; font-size:0.82rem; color:var(--text-muted); margin-bottom:6px; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
      border-radius:10px; padding:11px 14px; color:var(--white); font-size:0.9rem;
      outline:none; font-family:inherit; transition:border-color 0.2s; resize:vertical;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--primary); }
    .form-group select option { background:#1a1a2e; color:#fff; }
    .form-group textarea { min-height:90px; }

    .preview-card { background:#fff; border-radius:var(--radius); padding:40px 44px; margin-bottom:14px; color:#222; font-family:'Noto Sans KR', sans-serif; line-height:1.85; font-size:0.95rem; }
    .preview-card .doc-title { font-size:1.5rem; font-weight:900; text-align:center; margin-bottom:28px; color:#111; letter-spacing:0.08em; }
    .preview-card .doc-body { white-space:pre-wrap; word-break:break-all; }
    .preview-card .doc-date { text-align:right; margin-top:24px; }
    .preview-card .doc-sign { display:flex; justify-content:flex-end; gap:24px; margin-top:8px; }
    .preview-card .doc-sign span { min-width:120px; }
    .preview-card .doc-sign .sig-box { border-bottom:1px solid #222; min-width:80px; display:inline-block; }
    .preview-card .doc-recipient { text-align:center; margin-top:24px; font-weight:700; font-size:1rem; }
    .preview-card table.prop-table { width:100%; border-collapse:collapse; margin-bottom:18px; }
    .preview-card table.prop-table td { padding:6px 10px; border:1px solid #ccc; font-size:0.88rem; }
    .preview-card table.prop-table td:first-child { width:100px; background:#f5f5f5; font-weight:600; text-align:center; }

    .btn-row { display:flex; gap:10px; }
    .preview-btn { flex:1; padding:13px; border:none; border-radius:10px; font-size:0.95rem; font-weight:700; cursor:pointer; font-family:inherit; transition:opacity 0.2s; }
    .preview-btn.primary { background:var(--primary); color:#fff; }
    .preview-btn.secondary { background:rgba(255,255,255,0.07); color:var(--text); }
    .preview-btn:hover { opacity:0.85; }

    @media(max-width:540px) { .form-row { grid-template-columns:1fr; } .preview-card { padding:24px 20px; } .btn-row { flex-direction:column; } }
  </style>
</head>
<body>
<nav>
  <a href="../index.html" class="logo">💼 <span>직장인</span>닷컴</a>
  <ul class="nav-links">
    <li><a href="../index.html#calculators">계산기</a></li>
    <li><a href="../index.html#tools" class="active">업무도구</a></li>
    <li><a href="../index.html#games">루팡게임</a></li>
    <li><a href="../index.html#tests">테스트</a></li>
    <li><a href="../index.html#info">정보</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">홈</a> › 업무도구</div>
  <h1>📝 사직서 / 경위서 생성기</h1>
  <p>정보를 입력하면 문서가 자동 완성 — 바로 출력하거나 복사하세요</p>
</div>

<main>
  <div class="ad-banner">광고 영역 (Google AdSense)</div>

  <div class="tool-wrap">
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchDoc('resign', this)">사직서</button>
      <button class="tab-btn" onclick="switchDoc('incident', this)">경위서</button>
      <button class="tab-btn" onclick="switchDoc('apology', this)">시말서</button>
    </div>

    <!-- 사직서 -->
    <div id="form-resign" class="doc-form">
      <div class="form-card">
        <h3>📋 사직서 정보 입력</h3>
        <div class="form-row">
          <div class="form-group">
            <label>성명</label>
            <input type="text" id="r_name" placeholder="홍길동" oninput="renderDoc()">
          </div>
          <div class="form-group">
            <label>부서명</label>
            <input type="text" id="r_dept" placeholder="마케팅팀" oninput="renderDoc()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>직위</label>
            <input type="text" id="r_pos" placeholder="대리" oninput="renderDoc()">
          </div>
          <div class="form-group">
            <label>입사일</label>
            <input type="date" id="r_joindate" oninput="renderDoc()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>퇴사 희망일</label>
            <input type="date" id="r_quitdate" oninput="renderDoc()">
          </div>
          <div class="form-group">
            <label>사직 사유</label>
            <select id="r_reason" onchange="toggleCustomReason()">
              <option value="일신상의 사유">일신상의 사유</option>
              <option value="개인 사정">개인 사정</option>
              <option value="건강상의 이유">건강상의 이유</option>
              <option value="학업">학업 (진학·자기계발)</option>
              <option value="이직">이직</option>
              <option value="custom">직접 입력</option>
            </select>
          </div>
        </div>
        <div class="form-row single" id="customReasonWrap" style="display:none">
          <div class="form-group">
            <label>사유 직접 입력</label>
            <input type="text" id="r_custom_reason" placeholder="사직 사유를 입력하세요" oninput="renderDoc()">
          </div>
        </div>
        <div class="form-row single">
          <div class="form-group">
            <label>추가 인사말 (선택)</label>
            <textarea id="r_extra" placeholder="재직 기간 동안 도움 주신 점 감사드립니다..." oninput="renderDoc()"></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>회사명</label>
            <input type="text" id="r_company" placeholder="(주)직장인닷컴" oninput="renderDoc()">
          </div>
          <div class="form-group">
            <label>제출일</label>
            <input type="date" id="r_date" oninput="renderDoc()">
          </div>
        </div>
      </div>
    </div>

    <!-- 경위서 -->
    <div id="form-incident" class="doc-form" style="display:none">
      <div class="form-card">
        <h3>📋 경위서 정보 입력</h3>
        <div class="form-row">
          <div class="form-group">
            <label>성명</label>
            <input type="text" id="i_name" placeholder="홍길동" oninput="renderDoc()">
          </div>
          <div class="form-group">
            <label>부서명</label>
            <input type="text" id="i_dept" placeholder="영업팀" oninput="renderDoc()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>직위</label>
            <input type="text" id="i_pos" placeholder="과장" oninput="renderDoc()">
          </div>
          <div class="form-group">
            <label>사건 발생일</label>
            <input type="date" id="i_incident_date" oninput="renderDoc()">
          </div>
        </div>
        <div class="form-row single">
          <div class="form-group">
            <label>사건 제목 / 유형</label>
            <input type="text" id="i_title" placeholder="예: 거래처 클레임 관련 경위" oninput="renderDoc()">
          </div>
        </div>
        <div class="form-row single">
          <div class="form-group">
            <label>경위 내용 (육하원칙으로 작성)</label>
            <textarea id="i_content" rows="5" placeholder="언제, 어디서, 무엇을, 어떻게, 왜..." oninput="renderDoc()"></textarea>
          </div>
        </div>
        <div class="form-row single">
          <div class="form-group">
            <label>향후 조치 / 재발 방지 대책</label>
            <textarea id="i_action" placeholder="향후 이런 상황이 재발하지 않도록..." oninput="renderDoc()"></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>제출일</label>
            <input type="date" id="i_date" oninput="renderDoc()">
          </div>
          <div class="form-group">
            <label>수신 (제출 대상)</label>
            <input type="text" id="i_recipient" placeholder="대표이사 귀하" oninput="renderDoc()">
          </div>
        </div>
      </div>
    </div>

    <!-- 시말서 -->
    <div id="form-apology" class="doc-form" style="display:none">
      <div class="form-card">
        <h3>📋 시말서 정보 입력</h3>
        <div class="form-row">
          <div class="form-group">
            <label>성명</label>
            <input type="text" id="a_name" placeholder="홍길동" oninput="renderDoc()">
          </div>
          <div class="form-group">
            <label>부서명</label>
            <input type="text" id="a_dept" placeholder="개발팀" oninput="renderDoc()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>직위</label>
            <input type="text" id="a_pos" placeholder="사원" oninput="renderDoc()">
          </div>
          <div class="form-group">
            <label>사건 발생일</label>
            <input type="date" id="a_incident_date" oninput="renderDoc()">
          </div>
        </div>
        <div class="form-row single">
          <div class="form-group">
            <label>시말서 사유</label>
            <input type="text" id="a_reason" placeholder="예: 업무 지각 및 무단결근에 대한 사과" oninput="renderDoc()">
          </div>
        </div>
        <div class="form-row single">
          <div class="form-group">
            <label>경위 및 사과 내용</label>
            <textarea id="a_content" rows="5" placeholder="이번 사건에 대해 깊이 반성하며..." oninput="renderDoc()"></textarea>
          </div>
        </div>
        <div class="form-row single">
          <div class="form-group">
            <label>재발 방지 서약</label>
            <textarea id="a_pledge" placeholder="이후로는 절대 이러한 일이 없도록 하겠습니다..." oninput="renderDoc()"></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>제출일</label>
            <input type="date" id="a_date" oninput="renderDoc()">
          </div>
          <div class="form-group">
            <label>수신 (제출 대상)</label>
            <input type="text" id="a_recipient" placeholder="대표이사 귀하" oninput="renderDoc()">
          </div>
        </div>
      </div>
    </div>

    <!-- 미리보기 -->
    <div class="preview-card" id="docPreview">
      <div class="doc-title">사    직    서</div>
      <div class="doc-body">정보를 입력하면 문서가 자동으로 완성됩니다.</div>
    </div>

    <div class="btn-row">
      <button class="preview-btn primary" onclick="window.print()">🖨️ 인쇄 / 저장</button>
      <button class="preview-btn secondary" onclick="copyText(this)">📋 텍스트 복사</button>
    </div>
  </div>

  <div class="ad-banner" style="margin-top:24px">광고 영역 (Google AdSense)</div>
</main>

<footer>
  <p><strong>직장인닷컴</strong> — 모든 계산은 참고용이며 법적 효력이 없습니다.</p>
</footer>

<style>
@media print {
  nav, .page-header, .ad-banner, footer, .tab-row, .doc-form, .btn-row { display:none !important; }
  body { background:#fff !important; }
  main { padding:0 !important; }
  .tool-wrap { max-width:100% !important; }
  .preview-card { border-radius:0 !important; box-shadow:none !important; }
}
</style>

<script>
let currentDoc = 'resign';

function switchDoc(type, btn) {
  currentDoc = type;
  document.querySelectorAll('.doc-form').forEach(f => f.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('form-' + type).style.display = 'block';
  btn.classList.add('active');
  renderDoc();
}

function toggleCustomReason() {
  const wrap = document.getElementById('customReasonWrap');
  wrap.style.display = document.getElementById('r_reason').value === 'custom' ? 'block' : 'none';
  renderDoc();
}

function v(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

function renderDoc() {
  const preview = document.getElementById('docPreview');
  if (currentDoc === 'resign') preview.innerHTML = buildResign();
  else if (currentDoc === 'incident') preview.innerHTML = buildIncident();
  else preview.innerHTML = buildApology();
}

function blank(val, fallback = '____________') { return val || fallback; }

function buildResign() {
  const name = blank(v('r_name'));
  const dept = blank(v('r_dept'));
  const pos = blank(v('r_pos'));
  const joindate = blank(v('r_joindate'));
  const quitdate = blank(v('r_quitdate'));
  const reasonSel = v('r_reason');
  const reason = reasonSel === 'custom' ? blank(v('r_custom_reason')) : (reasonSel || '일신상의 사유');
  const extra = v('r_extra') || '그동안 많은 가르침을 주신 임직원 여러분께 감사드립니다.';
  const company = blank(v('r_company'));
  const date = blank(v('r_date'));

  return `
    <div class="doc-title">사    직    서</div>
    <table class="prop-table">
      <tr><td>성 명</td><td>${name}</td><td>부 서</td><td>${dept}</td></tr>
      <tr><td>직 위</td><td>${pos}</td><td>입사일</td><td>${joindate}</td></tr>
    </table>
    <div class="doc-body">본인은 ${quitdate}부로 ${company}을(를) 사직하고자 이 서류를 제출합니다.

사직 사유: ${reason}

${extra}

부족한 저를 아껴주시고 이끌어주신 점 깊이 감사드리며, 앞으로도 회사의 무궁한 발전을 기원합니다.</div>
    <div class="doc-date">${date}</div>
    <div class="doc-sign">
      <span>소속: ${dept}</span>
      <span>직위: ${pos}</span>
      <span>성명: ${name} <span class="sig-box">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> (인)</span>
    </div>
    <div class="doc-recipient">${company} 귀중</div>`;
}

function buildIncident() {
  const name = blank(v('i_name'));
  const dept = blank(v('i_dept'));
  const pos = blank(v('i_pos'));
  const date = blank(v('i_incident_date'));
  const title = blank(v('i_title'), '사건 관련 경위');
  const content = v('i_content') || '경위 내용을 입력하세요.';
  const action = v('i_action') || '향후 재발 방지를 위해 최선을 다하겠습니다.';
  const submitDate = blank(v('i_date'));
  const recipient = blank(v('i_recipient'), '대표이사 귀하');

  return `
    <div class="doc-title">경    위    서</div>
    <table class="prop-table">
      <tr><td>성 명</td><td>${name}</td><td>부 서</td><td>${dept}</td></tr>
      <tr><td>직 위</td><td>${pos}</td><td>발생일</td><td>${date}</td></tr>
      <tr><td>제 목</td><td colspan="3">${title}</td></tr>
    </table>
    <div class="doc-body"><strong>【 경 위 】</strong>

${content}

<strong>【 향후 조치 및 재발 방지 】</strong>

${action}

위 내용을 사실대로 기술하였음을 확인합니다.</div>
    <div class="doc-date">${submitDate}</div>
    <div class="doc-sign">
      <span>소속: ${dept}</span>
      <span>성명: ${name} <span class="sig-box">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> (인)</span>
    </div>
    <div class="doc-recipient">${recipient}</div>`;
}

function buildApology() {
  const name = blank(v('a_name'));
  const dept = blank(v('a_dept'));
  const pos = blank(v('a_pos'));
  const date = blank(v('a_incident_date'));
  const reason = blank(v('a_reason'), '업무 관련 사안');
  const content = v('a_content') || '이번 일에 대해 깊이 반성합니다.';
  const pledge = v('a_pledge') || '이후로는 절대 이러한 일이 없도록 하겠습니다.';
  const submitDate = blank(v('a_date'));
  const recipient = blank(v('a_recipient'), '대표이사 귀하');

  return `
    <div class="doc-title">시    말    서</div>
    <table class="prop-table">
      <tr><td>성 명</td><td>${name}</td><td>부 서</td><td>${dept}</td></tr>
      <tr><td>직 위</td><td>${pos}</td><td>발생일</td><td>${date}</td></tr>
      <tr><td>사 유</td><td colspan="3">${reason}</td></tr>
    </table>
    <div class="doc-body"><strong>【 경 위 및 반 성 】</strong>

${content}

<strong>【 재 발 방 지 서 약 】</strong>

${pledge}

이에 저의 잘못을 깊이 반성하며 시말서를 제출합니다.</div>
    <div class="doc-date">${submitDate}</div>
    <div class="doc-sign">
      <span>소속: ${dept}</span>
      <span>성명: ${name} <span class="sig-box">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> (인)</span>
    </div>
    <div class="doc-recipient">${recipient}</div>`;
}

function copyText(btn) {
  const el = document.getElementById('docPreview');
  const text = el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '복사 완료!';
    setTimeout(() => btn.textContent = orig, 1500);
  }).catch(() => alert('복사 실패: 브라우저에서 직접 선택하여 복사해주세요.'));
}

// 오늘 날짜 기본값
const today = new Date().toISOString().slice(0, 10);
['r_date', 'i_date', 'a_date'].forEach(id => { const el = document.getElementById(id); if (el) el.value = today; });

renderDoc();
</script>
</body>
</html>
