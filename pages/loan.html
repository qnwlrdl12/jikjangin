<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대출 이자 계산기 - 직장인닷컴</title>
  <meta name="description" content="원리금균등, 원금균등 상환 방식 대출 이자 계산기.">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .schedule-table { width:100%; border-collapse:collapse; margin-top:16px; font-size:0.82rem; }
    .schedule-table th { background:rgba(255,255,255,0.05); padding:8px; text-align:center; color:var(--text-muted); }
    .schedule-table td { padding:8px; text-align:right; border-bottom:1px solid rgba(255,255,255,0.04); color:var(--text); }
    .schedule-table td:first-child { text-align:center; }
    .table-wrap { max-height:300px; overflow-y:auto; margin-top:16px; border-radius:10px; border:1px solid rgba(255,255,255,0.06); }
  </style>
</head>
<body>
<nav>
  <a href="../index.html" class="logo">💼 <span>직장인</span>닷컴</a>
  <ul class="nav-links">
    <li><a href="../index.html#calculators" class="active">계산기</a></li>
    <li><a href="../index.html#tools">업무도구</a></li>
    <li><a href="../index.html#games">루팡게임</a></li>
    <li><a href="../index.html#tests">테스트</a></li>
    <li><a href="../index.html#info">정보</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">홈</a> › 직장인 계산기</div>
  <h1>🏦 대출 이자 계산기</h1>
  <p>원리금균등 / 원금균등 상환 방식 비교 계산</p>
</div>
<main>
  <div class="ad-banner">광고 영역 (Google AdSense)</div>
  <div class="tool-card">
    <label>대출 원금 (만원)</label>
    <input type="number" id="principal" placeholder="예: 30000">
    <label>연 이자율 (%)</label>
    <input type="number" id="rate" placeholder="예: 4.5" step="0.1">
    <label>대출 기간 (개월)</label>
    <input type="number" id="months" placeholder="예: 120 (10년)">
    <label>상환 방식</label>
    <select id="method">
      <option value="equal">원리금균등 (매달 같은 금액)</option>
      <option value="principal">원금균등 (초반에 더 많이 상환)</option>
    </select>
    <button class="btn-primary" onclick="calculate()">계산하기</button>
    <div class="result-box" id="result">
      <div class="result-row"><span class="label">대출 원금</span><span class="value" id="r-principal"></span></div>
      <div class="result-row"><span class="label">총 이자</span><span class="value" id="r-totalInt"></span></div>
      <div class="result-row highlight"><span class="label">총 상환금액</span><span class="value" id="r-total"></span></div>
      <div class="result-row"><span class="label">첫 달 납부액</span><span class="value" id="r-first"></span></div>
    </div>
    <div id="tableWrap"></div>
  </div>
</main>
<footer>
  <p><strong>직장인닷컴</strong> — 모든 계산은 참고용입니다.</p>
</footer>
<script>
function won(n) { return Math.round(n).toLocaleString('ko-KR') + '원'; }
function calculate() {
  const P = parseFloat(document.getElementById('principal').value) * 10000;
  const r = parseFloat(document.getElementById('rate').value) / 100 / 12;
  const n = parseInt(document.getElementById('months').value);
  const method = document.getElementById('method').value;
  if (!P||!r||!n) { alert('모든 값을 입력하세요.'); return; }

  let rows = [], totalInt = 0, remaining = P;

  if (method === 'equal') {
    const monthly = P * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1);
    for (let i=1;i<=n;i++) {
      const int = remaining * r;
      const prin = monthly - int;
      totalInt += int;
      remaining -= prin;
      rows.push([i, Math.round(monthly), Math.round(prin), Math.round(int), Math.max(0,Math.round(remaining))]);
    }
    document.getElementById('r-first').textContent = won(rows[0][1]);
  } else {
    const monthlyPrin = P / n;
    for (let i=1;i<=n;i++) {
      const int = remaining * r;
      const payment = monthlyPrin + int;
      totalInt += int;
      remaining -= monthlyPrin;
      rows.push([i, Math.round(payment), Math.round(monthlyPrin), Math.round(int), Math.max(0,Math.round(remaining))]);
    }
    document.getElementById('r-first').textContent = won(rows[0][1]);
  }

  document.getElementById('r-principal').textContent = won(P);
  document.getElementById('r-totalInt').textContent = won(totalInt);
  document.getElementById('r-total').textContent = won(P + totalInt);
  document.getElementById('result').classList.add('show');

  const showRows = rows.slice(0, 24); // 최대 24개월
  document.getElementById('tableWrap').innerHTML = `
    <div class="table-wrap">
      <table class="schedule-table">
        <thead><tr><th>회차</th><th>납부액</th><th>원금</th><th>이자</th><th>잔금</th></tr></thead>
        <tbody>${showRows.map(r=>`<tr>${r.map((v,i)=>`<td>${i===0?v+'회':won(v)}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
    ${rows.length > 24 ? `<p style="font-size:0.8rem;color:var(--text-muted);margin-top:8px;text-align:center">처음 24개월만 표시됩니다</p>` : ''}
  `;
}
</script>
</body>
</html>
