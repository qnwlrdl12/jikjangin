    { type:'tech', q:'내부 프로세스를 개선한 경험이 있나요?', hint:'문제 발견 → 분석 → 개선 → 결과를 구체적으로 말하세요.' },
    { type:'tech', q:'기밀 또는 민감한 정보를 다룰 때 어떻게 관리하나요?', hint:'보안 의식과 정보 처리 원칙을 말하세요.' },
    { type:'tech', q:'상사나 타 부서의 무리한 요구를 받았을 때 어떻게 처리하나요?', hint:'거절 방법과 대안 제시 경험을 말하세요.' },
    { type:'tech', q:'엑셀이나 업무 자동화 도구를 활용한 경험이 있나요?', hint:'피벗테이블, VLOOKUP, 매크로, RPA 등 구체적 경험을 말하세요.' },
  ],
};

function renderCats() {
  document.getElementById('catGrid').innerHTML = CATS.map(c => `
    <button class="cat-btn ${c.id === selectedCat ? 'active' : ''}" onclick="selectCat('${c.id}', this)">${c.label}</button>`).join('');
}

function selectCat(id, btn) {
  selectedCat = id;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function draw() {
  const type = document.getElementById('interviewType').value;
  const count = parseInt(document.getElementById('qCount').value);

  let pool = [...QS.common];
  if (selectedCat !== 'common' && QS[selectedCat]) pool = [...pool, ...QS[selectedCat]];

  if (type === 'common') pool = pool.filter(q => q.type === 'common');
  else if (type === 'tech') pool = pool.filter(q => q.type === 'tech');

  const picked = shuffle(pool).slice(0, count);

  document.getElementById('qList').innerHTML = picked.map((q, i) => `
    <div class="q-item">
      <div class="q-num">Q${i + 1} <span class="q-tag ${q.type === 'common' ? 'tag-common' : 'tag-tech'}">${q.type === 'common' ? '인성·공통' : '직군 전문'}</span></div>
      <div class="q-text">${q.q}</div>
      <button class="toggle-btn" onclick="toggleHint(this)">💡 답변 가이드 보기 ▼</button>
      <div class="answer-box">${q.hint}</div>
    </div>`).join('');

  document.getElementById('resultWrap').style.display = 'block';
  document.getElementById('resultWrap').scrollIntoView({ behavior:'smooth' });
}

function toggleHint(btn) {
  const box = btn.nextElementSibling;
  const open = box.style.display === 'block';
  box.style.display = open ? 'none' : 'block';
  btn.textContent = open ? '💡 답변 가이드 보기 ▼' : '💡 답변 가이드 접기 ▲';
}

renderCats();
</script>
</body>
</html>
