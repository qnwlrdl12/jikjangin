<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light')</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스 - 직장인닷컴</title>
  <meta name="description" content="직장인닷컴 테트리스. 회의 중에도 한 판. 스페이스바=하드드롭, ↑=회전, ←→=이동.">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .game-wrap { max-width:560px; margin:0 auto; display:flex; gap:16px; align-items:flex-start; justify-content:center; }
    canvas#board { background:#111; border-radius:10px; display:block; touch-action:none; }
    .side-panel { display:flex; flex-direction:column; gap:12px; min-width:110px; }
    .panel-box { background:var(--card); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:14px; }
    .panel-box h4 { font-size:0.72rem; color:var(--text-muted); font-weight:700; margin-bottom:8px; letter-spacing:0.08em; text-transform:uppercase; }
    .panel-val { font-size:1.4rem; font-weight:900; color:var(--white); }
    canvas#next { background:#111; border-radius:8px; display:block; }
    .ctrl-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
    .ctrl-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:10px 16px; font-size:0.85rem; font-weight:700; color:var(--white); cursor:pointer; font-family:inherit; min-width:48px; text-align:center; user-select:none; transition:background 0.1s; }
    .ctrl-btn:active { background:rgba(255,107,53,0.2); }
    .ctrl-btn.primary { background:var(--primary); border-color:var(--primary); }
    .overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.75); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; border-radius:10px; }
    .overlay h2 { color:#fff; font-size:1.4rem; font-weight:900; }
    .overlay p { color:rgba(255,255,255,0.7); font-size:0.85rem; }
    .board-wrap { position:relative; }
    @media(max-width:500px) { .game-wrap { flex-direction:column; align-items:center; } .side-panel { flex-direction:row; flex-wrap:wrap; min-width:0; width:100%; } }
  </style>
</head>
<body>
<nav>
  <a href="../index.html" class="logo">💼 <span>직장인</span>닷컴</a>
  <ul class="nav-links">
    <li><a href="../index.html#games" class="active">루팡게임</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">홈</a> › 루팡게임</div>
  <h1>🟦 테트리스</h1>
  <p>회의 중 한 판 — 들키면 책임 못 짐 · 스페이스=하드드롭 · ↑=회전</p>
</div>

<main>
  <div class="ad-banner">광고 영역 (Google AdSense)</div>

  <div class="game-wrap">
    <div>
      <div class="board-wrap">
        <canvas id="board" width="280" height="560"></canvas>
        <div class="overlay" id="overlay">
          <h2>테트리스</h2>
          <p>키보드: ←→ 이동 / ↑ 회전 / ↓ 소프트드롭 / Space 하드드롭</p>
          <p>모바일: 화면 아래 버튼 사용</p>
          <button class="ctrl-btn primary" onclick="startGame()">게임 시작</button>
        </div>
      </div>
      <div class="ctrl-row" style="margin-top:12px">
        <button class="ctrl-btn" onpointerdown="startMv('L')" onpointerup="stopMv()" ontouchstart="e=>{e.preventDefault();startMv('L')}" ontouchend="stopMv()">◀</button>
        <button class="ctrl-btn" onclick="doRotate()">↻ 회전</button>
        <button class="ctrl-btn" onpointerdown="startMv('R')" onpointerup="stopMv()" ontouchstart="e=>{e.preventDefault();startMv('R')}" ontouchend="stopMv()">▶</button>
        <button class="ctrl-btn" onpointerdown="startMv('D')" onpointerup="stopMv()">▼</button>
        <button class="ctrl-btn" onclick="hardDrop()">⏬ Drop</button>
        <button class="ctrl-btn primary" id="pauseBtn" onclick="togglePause()" style="display:none">⏸</button>
      </div>
    </div>

    <div class="side-panel">
      <div class="panel-box">
        <h4>Score</h4>
        <div class="panel-val" id="scoreEl">0</div>
      </div>
      <div class="panel-box">
        <h4>Level</h4>
        <div class="panel-val" id="levelEl">1</div>
      </div>
      <div class="panel-box">
        <h4>Lines</h4>
        <div class="panel-val" id="linesEl">0</div>
      </div>
      <div class="panel-box">
        <h4>Next</h4>
        <canvas id="next" width="100" height="80"></canvas>
      </div>
      <div class="panel-box" style="font-size:0.72rem;color:var(--text-muted);line-height:1.7">
        ← → 이동<br>↑ 회전<br>↓ 빠른 낙하<br>Space 하드드롭<br>P 일시정지
      </div>
    </div>
  </div>

  <div class="ad-banner" style="margin-top:16px">광고 영역 (Google AdSense)</div>
</main>

<footer><p><strong>직장인닷컴</strong></p></footer>

<script src="../js/theme.js"></script>
<script>
const COLS = 10, ROWS = 20, CELL = 28;
const COLORS = ['','#FF6B35','#4ECDC4','#FFD700','#a855f7','#2ecc71','#3498db','#e74c3c'];
const PIECES = [
  [],
  [[1,1,1,1]],
  [[2,2],[2,2]],
  [[0,3,0],[3,3,3]],
  [[4,4,0],[0,4,4]],
  [[0,5,5],[5,5,0]],
  [[6,0,0],[6,6,6]],
  [[0,0,7],[7,7,7]],
];

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nctx = document.getElementById('next').getContext('2d');

let board, piece, pieceX, pieceY, pieceType, nextType, score, lines, level, running, paused, dropTimer, mvTimer;

function newBoard() { return Array.from({length:ROWS}, () => new Array(COLS).fill(0)); }

function valid(b, p, x, y) {
  for (let r = 0; r < p.length; r++)
    for (let c = 0; c < p[r].length; c++)
      if (p[r][c]) {
        const nr = y + r, nc = x + c;
        if (nr >= ROWS || nc < 0 || nc >= COLS || (nr >= 0 && b[nr][nc])) return false;
      }
  return true;
}

function spawn() {
  pieceType = nextType || (Math.floor(Math.random() * 7) + 1);
  nextType = Math.floor(Math.random() * 7) + 1;
  piece = PIECES[pieceType].map(r => [...r]);
  pieceX = Math.floor((COLS - piece[0].length) / 2);
  pieceY = -1;
  if (!valid(board, piece, pieceX, pieceY + 1)) { gameOver(); return false; }
  pieceY++;
  drawNext();
  return true;
}

function lock() {
  for (let r = 0; r < piece.length; r++)
    for (let c = 0; c < piece[r].length; c++)
      if (piece[r][c] && pieceY + r >= 0) board[pieceY + r][pieceX + c] = piece[r][c];
  clearLines();
  spawn();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c)) {
      board.splice(r, 1);
      board.unshift(new Array(COLS).fill(0));
      cleared++; r++;
    }
  }
  if (cleared) {
    lines += cleared;
    score += [0, 100, 300, 500, 800][cleared] * level;
    level = Math.floor(lines / 10) + 1;
    document.getElementById('scoreEl').textContent = score.toLocaleString();
    document.getElementById('linesEl').textContent = lines;
    document.getElementById('levelEl').textContent = level;
    resetDropTimer();
  }
}

function drawCell(c, r, color, context = ctx) {
  context.fillStyle = color;
  context.fillRect(c * CELL + 1, r * CELL + 1, CELL - 2, CELL - 2);
  context.fillStyle = 'rgba(255,255,255,0.15)';
  context.fillRect(c * CELL + 1, r * CELL + 1, CELL - 2, 4);
}

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Ghost
  let gy = pieceY;
  while (valid(board, piece, pieceX, gy + 1)) gy++;
  for (let r = 0; r < piece.length; r++)
    for (let c = 0; c < piece[r].length; c++)
      if (piece[r][c]) {
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect((pieceX + c) * CELL + 1, (gy + r) * CELL + 1, CELL - 2, CELL - 2);
      }

  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) drawCell(c, r, COLORS[board[r][c]]);

  for (let r = 0; r < piece.length; r++)
    for (let c = 0; c < piece[r].length; c++)
      if (piece[r][c] && pieceY + r >= 0) drawCell(pieceX + c, pieceY + r, COLORS[piece[r][c]]);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,ROWS*CELL); ctx.stroke(); }
  for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(COLS*CELL,r*CELL); ctx.stroke(); }
}

function drawNext() {
  nctx.fillStyle = '#111';
  nctx.fillRect(0, 0, 100, 80);
  const p = PIECES[nextType];
  const offX = Math.floor((5 - p[0].length) / 2);
  const offY = Math.floor((3 - p.length) / 2);
  for (let r = 0; r < p.length; r++)
    for (let c = 0; c < p[r].length; c++)
      if (p[r][c]) {
        nctx.fillStyle = COLORS[p[r][c]];
        nctx.fillRect((offX+c)*20+1, (offY+r)*20+1, 18, 18);
      }
}

function gameLoop() {
  if (!running || paused) return;
  if (valid(board, piece, pieceX, pieceY + 1)) pieceY++;
  else lock();
  draw();
}

function resetDropTimer() {
  clearInterval(dropTimer);
  dropTimer = setInterval(gameLoop, Math.max(100, 1000 - (level - 1) * 80));
}

function startGame() {
  board = newBoard(); score = 0; lines = 0; level = 1; running = true; paused = false;
  nextType = Math.floor(Math.random() * 7) + 1;
  document.getElementById('scoreEl').textContent = '0';
  document.getElementById('linesEl').textContent = '0';
  document.getElementById('levelEl').textContent = '1';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('pauseBtn').style.display = '';
  spawn(); resetDropTimer();
}

function gameOver() {
  running = false; clearInterval(dropTimer);
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `<h2>GAME OVER</h2><p>Score: ${score.toLocaleString()}</p><p>Lines: ${lines} · Level: ${level}</p><button class="ctrl-btn primary" onclick="startGame()">다시 시작</button>`;
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶' : '⏸';
  if (!paused) resetDropTimer();
}

function hardDrop() {
  if (!running || paused) return;
  while (valid(board, piece, pieceX, pieceY + 1)) pieceY++;
  lock(); draw();
}

let mvDir = null;
function startMv(dir) {
  if (!running || paused) return;
  mvDir = dir;
  doMove();
  mvTimer = setInterval(doMove, 120);
}
function stopMv() { clearInterval(mvTimer); mvDir = null; }
function doMove() {
  if (!mvDir || !running || paused) return;
  if (mvDir === 'L' && valid(board, piece, pieceX - 1, pieceY)) { pieceX--; draw(); }
  if (mvDir === 'R' && valid(board, piece, pieceX + 1, pieceY)) { pieceX++; draw(); }
  if (mvDir === 'D') { if (valid(board, piece, pieceX, pieceY + 1)) { pieceY++; draw(); } else { lock(); draw(); } }
}

function doRotate() {
  if (!running || paused) return;
  const rot = rotatePiece(piece);
  if (valid(board, rot, pieceX, pieceY)) { piece = rot; draw(); }
  else if (valid(board, rot, pieceX + 1, pieceY)) { piece = rot; pieceX++; draw(); }
  else if (valid(board, rot, pieceX - 1, pieceY)) { piece = rot; pieceX--; draw(); }
}

function rotatePiece(p) {
  const rows = p.length, cols = p[0].length;
  const r = Array.from({length:cols}, () => new Array(rows).fill(0));
  for (let i = 0; i < rows; i++) for (let j = 0; j < cols; j++) r[j][rows-1-i] = p[i][j];
  return r;
}

document.addEventListener('keydown', e => {
  if (!running) return;
  if (e.key === 'ArrowLeft') { if (valid(board, piece, pieceX-1, pieceY)) { pieceX--; draw(); } }
  else if (e.key === 'ArrowRight') { if (valid(board, piece, pieceX+1, pieceY)) { pieceX++; draw(); } }
  else if (e.key === 'ArrowDown') { if (valid(board, piece, pieceX, pieceY+1)) { pieceY++; draw(); } else { lock(); draw(); } }
  else if (e.key === 'ArrowUp') { doRotate(); }
  else if (e.key === ' ') { e.preventDefault(); hardDrop(); }
  else if (e.key === 'p' || e.key === 'P') { togglePause(); }
});

// init draw
ctx.fillStyle = '#111';
ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
